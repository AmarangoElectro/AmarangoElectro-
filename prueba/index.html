function descargarBackup(){
  var cliente=null;
  try{ cliente=JSON.parse(localStorage.getItem(lsKey('ae_cliente'))||'null'); }catch(e){}
  var banco={};
  try{ banco=cargarBancoFotos(); }catch(e){}
  var data={
    version: 2,
    tienda: TIENDA,
    fecha: Date.now(),
    fechaLegible: new Date().toLocaleString('es-AR'),
    config: CONFIG,
    productos: PRODUCTOS,
    pedidos: PEDIDOS||[],
    clientes: (typeof CLIENTES!=='undefined') ? CLIENTES : [],   // рҹ”§ faltaba
    bancoFotos: banco,                                            // рҹ”§ faltaba
    subs: (typeof SUBS!=='undefined') ? SUBS : []
  };
  var txt=JSON.stringify(data, null, 2);
  var blob=new Blob([txt], {type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var neg=(CONFIG.negocio||'tienda').replace(/[^a-zA-Z0-9]/g,'-').toLowerCase();
  var f=new Date();
  var fecha=f.getFullYear()+'-'+String(f.getMonth()+1).padStart(2,'0')+'-'+String(f.getDate()).padStart(2,'0');
  a.href=url;
  a.download='backup-'+neg+'-'+fecha+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  try{ localStorage.setItem(lsKey('ae_ultimo_backup'), String(Date.now())); }catch(e){}
  alert('вң… Copia descargada.\n\nGuardala en un lugar seguro (Drive, mail, lo que uses). Si algo sale mal, con este archivo recuperГЎs todo. рҹҗқ');
  abrirBackup();
}

function restaurarBackup(ev){
  var file=ev.target.files && ev.target.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var data;
    try{ data=JSON.parse(e.target.result); }
    catch(err){ alert('вқҢ Ese archivo no es una copia vГЎlida.'); return; }
    if(!data || !data.productos){ alert('вқҢ Ese archivo no parece una copia de tu tienda.'); return; }

    var f=data.fechaLegible || new Date(data.fecha||0).toLocaleString('es-AR');
    var msg='вҡ пёҸ ATENCIГ“N\n\nVas a REEMPLAZAR todo lo que tenГ©s ahora por esta copia:\n\n'
      +'рҹ“… Fecha: '+f+'\n'
      +'рҹҸӘ Tienda: '+(data.tienda||'?')+'\n'
      +'рҹ“Ұ '+(data.productos?data.productos.length:0)+' productos\n'
      +'рҹ“Ӣ '+(data.pedidos?data.pedidos.length:0)+' pedidos\n\n'
      +'ВҝSeguro?';
    if(!confirm(msg)) return;
    if(!confirm('Гҡltima confirmaciГіn:\n\nLo que tenГ©s ahora se va a la papelera.\nВҝRestaurar esta copia?')) return;

    // respaldo de lo actual antes de pisar
    guardarEnPapelera(PRODUCTOS);

    if(data.config){ CONFIG=data.config; guardarConfig(); }
    PRODUCTOS=data.productos;
    guardarCatalogo();
    if(data.pedidos){ PEDIDOS=data.pedidos; guardarPedidos(); }
    if(data.clientes && typeof CLIENTES!=='undefined'){ CLIENTES=data.clientes; guardarClientes(); }
    if(data.bancoFotos){ try{ guardarBancoFotos(data.bancoFotos); }catch(e){} }
    if(data.subs && typeof SUBS!=='undefined'){ SUBS=data.subs; subsGuardar(); }

    aplicarConfig();
    render();
    alert('вң… Copia restaurada.\n\nTu tienda volviГі al estado del '+f+'. рҹҗқ');
    cerrarAdmin();
  };
  reader.readAsText(file);
}

function generarPDF(){
  var cat=(document.getElementById('pdfCat')||{}).value||'';
  var soloFoto=(document.getElementById('pdfSoloFoto')||{}).checked;
  var lista=PRODUCTOS.filter(function(p){
    if(p.visible===false || p.sinStock) return false;
    if(cat && catProd(p)!==cat) return false;
    if(soloFoto && !p.foto) return false;
    return true;
  });
  if(!lista.length){ alert('No hay productos con ese filtro.'); return; }

  var neg=(CONFIG.negocio||'Mi Tienda');
  var ig=(CONFIG.instagram||'');
  var wa=(CONFIG.whatsapp||'');
  var logo=CONFIG.logo||'';

/* в•җв•җв•җв•җв•җв•җв•җ рҹ“Ҡ ESTADГҚSTICAS вҖ” que el dueГұo vea cГіmo anda su negocio в•җв•җв•җв•җв•җв•җв•җ */
function abrirEstadisticas(){ cargarPedidos(renderEstadisticas); }
function renderEstadisticas(){
  var ahora=Date.now();
  var mes=30*86400000, semana=7*86400000;

  var vendidos=PEDIDOS.filter(function(p){return p.estado==='vendido';});
  var totalMes=vendidos.filter(function(p){return ahora-p.fecha<mes;}).reduce(function(s,p){return s+p.total;},0);
  var totalSem=vendidos.filter(function(p){return ahora-p.fecha<semana;}).reduce(function(s,p){return s+p.total;},0);
  var pedidosMes=PEDIDOS.filter(function(p){return ahora-p.fecha<mes;}).length;
  var vendMes=vendidos.filter(function(p){return ahora-p.fecha<mes;}).length;
  var conversion = pedidosMes ? Math.round(vendMes/pedidosMes*100) : 0;
  var ticket = vendMes ? Math.round(totalMes/vendMes) : 0;

  // productos mГЎs pedidos
  var conteo={};
  PEDIDOS.forEach(function(p){
    p.items.forEach(function(it){
      if(!conteo[it.nombre]) conteo[it.nombre]={n:0, plata:0};
      conteo[it.nombre].n += (it.cant||1);
      conteo[it.nombre].plata += it.venta*(it.cant||1);
    });
  });
  var top=Object.keys(conteo).map(function(k){ return {nombre:k, n:conteo[k].n, plata:conteo[k].plata}; })
    .sort(function(a,b){ return b.n-a.n; }).slice(0,6);

  // quiГ©n vende mГЎs del equipo
  var porVend={};
  vendidos.forEach(function(p){
    var v=p.atendio||'(sin asignar)';
    if(!porVend[v]) porVend[v]={n:0, plata:0};
    porVend[v].n++; porVend[v].plata+=p.total;
  });
  var equipo=Object.keys(porVend).map(function(k){ return {nombre:k, n:porVend[k].n, plata:porVend[k].plata}; })
    .sort(function(a,b){ return b.plata-a.plata; });

  var html='<div style="font-weight:900;color:var(--az);font-size:1.05rem;margin-bottom:12px">рҹ“Ҡ EstadГӯsticas</div>';

  if(!PEDIDOS.length){

      +'<button onclick="abrirPanelDueno()" style="width:100%;background:none;border:1.5px solid var(--line);color:var(--az);border-radius:11px;padding:11px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px">вҖ№ Volver al panel</button>';
    document.getElementById('adminBody').innerHTML=html;
    document.getElementById('adminOverlay').classList.add('on'); empujarPantalla('admin', cerrarAdmin);
    return;
  }

  // в”Җв”Җ plata
  html+='<div style="background:linear-gradient(160deg,var(--az-osc),var(--az));border-radius:16px;padding:16px;color:#fff;margin-bottom:12px">'
    +'<div style="font-size:.62rem;font-weight:800;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.6px">Vendiste este mes</div>'
    +'<div style="font-size:1.9rem;font-weight:900;line-height:1.1;margin:2px 0 8px">'+fmt(totalMes)+'</div>'
    +'<div style="display:flex;gap:14px;font-size:.72rem;color:rgba(255,255,255,.75)">'
      +'<span>рҹ“… Esta semana: <b style="color:#ffb968">'+fmt(totalSem)+'</b></span>'
    +'</div></div>';

  // в”Җв”Җ nГәmeros clave
  html+='<div style="display:flex;gap:7px;margin-bottom:14px">'
    +'<div style="flex:1;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;text-align:center"><div style="font-size:1.2rem;font-weight:900;color:var(--az)">'+vendMes+'</div><div style="font-size:.56rem;color:var(--sub);font-weight:800">VENTAS (30d)</div></div>'

    +'</div>';

  if(top.length){

  // в”Җв”Җ quiГ©n vende mГЎs
  if(equipo.length){
    html+='<div style="font-weight:900;color:var(--az);font-size:.88rem;margin:14px 0 8px">рҹӨқ Tu equipo</div>';
    equipo.forEach(function(e,i){
      var medalla = i===0?'рҹҘҮ':(i===1?'рҹҘҲ':(i===2?'рҹҘү':'  '));
      html+='<div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:6px;display:flex;align-items:center;gap:9px">'
        +'<span style="font-size:1.1rem">'+medalla+'</span>'
        +'<span style="flex:1;font-size:.82rem;font-weight:800;color:var(--az)">'+e.nombre+'</span>'
        +'<span style="text-align:right"><span style="display:block;font-size:.86rem;font-weight:900;color:var(--az)">'+fmt(e.plata)+'</span>'
        +'<span style="display:block;font-size:.62rem;color:var(--sub)">'+e.n+' venta'+(e.n===1?'':'s')+'</span></span>'
        +'</div>';
    });

  // в”Җв”Җ catГЎlogo
  var conFoto=PRODUCTOS.filter(function(p){return p.foto;}).length;
  var ocultos=PRODUCTOS.filter(function(p){return p.visible===false;}).length;
  var viejos=PRODUCTOS.filter(function(p){return p.fechaPrecio && (ahora-p.fechaPrecio)>30*86400000;}).length;
  html+='<div style="font-weight:900;color:var(--az);font-size:.88rem;margin:14px 0 8px">рҹ“Ұ Tu catГЎlogo</div>'
    +'<div style="background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px;font-size:.78rem;color:var(--sub);line-height:1.9">'
      +'рҹ“Ұ <b style="color:var(--az)">'+PRODUCTOS.length+'</b> productos cargados<br>'

      +(ocultos?'рҹҷҲ <b style="color:var(--az)">'+ocultos+'</b> ocultos de la tienda<br>':'')

  var n=(PEDIDOS||[]).filter(function(p){return p.remito;}).length + 1;

  guardarPedidos();
  return ped.remito;
}

/* в•җв•җв•җв•җв•җв•җв•җ HISTORIAL DE PEDIDOS в•җв•җв•җв•җв•җв•җв•җ
   Cada vez que un cliente toca Comprar o pide del carrito, se guarda acГЎ.
   Es el cimiento de las estadГӯsticas y del algoritmo de sugeridos. */
function keyPedidos(){ return TIENDA==='amarango' ? 'pedidos' : 'pedidos_'+TIENDA; }
var PEDIDOS=[];

function guardarPedido(items, total, contacto){
  var cli=null;
  // рҹ‘” si un asesor estГЎ armando el pedido, va a nombre de SU cliente
  if(typeof _clienteDelPedido!=='undefined' && _clienteDelPedido){ cli=_clienteDelPedido; }
  else { try{ cli=JSON.parse(localStorage.getItem(lsKey('ae_cliente'))||'null'); }catch(e){} }
  var ped={
    id:'ped'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    fecha: Date.now(),
    items: items,                          // [{nombre, venta, cant}]
    total: total,
    cliente: cli ? {nombre:cli.nombre, wa:cli.wa, loc:cli.loc, dir:cli.dir} : null,
    atendio: contacto || '',               // con quiГ©n hablГі
    estado: 'nuevo'                        // nuevo В· vendido В· perdido
  };
  PEDIDOS.unshift(ped);
  _mapaJuntos=null;   // el algoritmo aprende del pedido nuevo
  try{ localStorage.setItem(lsKey('ae_pedidos'), JSON.stringify(PEDIDOS)); }catch(e){}
  if(sb){ sb.from('tienda_catalogo').upsert({id:keyPedidos(), datos:PEDIDOS}).then(function(){}).catch(function(){}); }
}
function cargarPedidos(cb){
  try{ PEDIDOS=JSON.parse(localStorage.getItem(lsKey('ae_pedidos'))||'[]'); }catch(e){ PEDIDOS=[]; }
  if(cb) cb();
  if(sb){
    sb.from('tienda_catalogo').select('datos').eq('id',keyPedidos()).maybeSingle()
      .then(function(r){ if(r&&r.data&&r.data.datos){ PEDIDOS=r.data.datos; try{localStorage.setItem(lsKey('ae_pedidos'),JSON.stringify(PEDIDOS));}catch(e){} if(cb)cb(); } })
      .catch(function(){});
  }
}
function guardarPedidos(){
  try{ localStorage.setItem(lsKey('ae_pedidos'), JSON.stringify(PEDIDOS)); }catch(e){}
  if(sb){ sb.from('tienda_catalogo').upsert({id:keyPedidos(), datos:PEDIDOS}).then(function(){}).catch(function(){}); }
}

/* Panel de gestiГіn de STOCK: de a uno o todos a la vez */
/* в•җв•җв•җв•җв•җв•җв•җ рҹ“Ҡ CONTROL DE STOCK CON ALERTAS в•җв•җв•җв•җв•җв•җв•җ
   Para el dueГұo y quien arma los pedidos: quГ© falta, quГ© estГЎ por faltar,
   y quГ© se estГЎ pidiendo mucho. */
function analizarStock(){
  var sinStock=[], pedidosPorProd={}, mes=30*86400000, ahora=Date.now();
  // cuГЎnto se pidiГі de cada producto en el Гәltimo mes
  (PEDIDOS||[]).forEach(function(ped){
    if(ahora - ped.fecha > mes) return;
    (ped.items||[]).forEach(function(it){
      var n = String(it.nombre||'').replace(/\s*\([^)]*\)\s*$/,'').trim();
      pedidosPorProd[n] = (pedidosPorProd[n]||0) + (it.cant||1);
    });
  });
  (PRODUCTOS||[]).forEach(function(p){
    if(p.visible===false) return;
    var pedido = pedidosPorProd[p.nombre] || 0;
    if(p.sinStock) sinStock.push({p:p, pedido:pedido});
  });
  // los mГЎs pedidos (para saber quГ© NO puede faltar)
  var top = Object.keys(pedidosPorProd)
    .map(function(n){ return {nombre:n, cant:pedidosPorProd[n]}; })
    .sort(function(a,b){ return b.cant-a.cant; }).slice(0,10);
  // sin stock ordenados por demanda (los que mГЎs duelen primero)
  sinStock.sort(function(a,b){ return b.pedido-a.pedido; });
  return { sinStock:sinStock, top:top };
}

function opcProd(idx,k,ico,txt,on,peligro){
  var colOn = peligro ? '#DC2626' : 'var(--nar)';
  var bgOn  = peligro ? '#FEF2F2' : '#FFF0E0';
  return '<button onclick="toggleOpcProd('+idx+',\''+k+'\')" style="width:100%;text-align:left;border:1.5px solid '+(on?colOn:'var(--line)')+';background:'+(on?bgOn:'#fff')+';color:'+(on?colOn:'var(--sub)')+';border-radius:11px;padding:12px 14px;font-size:.82rem;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:7px;display:flex;align-items:center;gap:9px">'
    +'<span style="font-size:1rem">'+(on?'вң…':ico)+'</span><span>'+txt+'</span></button>';
}
function toggleOpcProd(idx,k){
  var p=PRODUCTOS[idx]; if(!p)return;
  if(k==='destacado'){ p.destacado=!p.destacado; }
  else if(k==='delDia'){
    var era=p.delDia;
    PRODUCTOS.forEach(function(x){ x.delDia=false; });   // solo puede haber uno
    p.delDia=!era;
  }
  else if(k==='ultimas'){ p.ultimas=!p.ultimas; }
  else if(k==='sinInteres'){ p.sinInteres=!p.sinInteres; }
  else if(k==='sinStock'){ p.sinStock=!p.sinStock; }
  else if(k==='oculto'){
    p.visible = (p.visible===false) ? true : false;
  }
  else if(k==='oferta'){
    var enOferta = p.precioAntes && p.precioAntes>p.venta;
    if(enOferta){ delete p.precioAntes; }
    else {
      var sug=Math.round(p.venta*1.25/500)*500;
      var v=prompt('рҹ”Ҙ Precio ANTES (el que se muestra tachado):\n\nEl precio actual es '+fmt(p.venta)+'.\nPonГ© uno mГЎs alto para que se vea la rebaja.', sug);
      if(v===null) return;
      var pa=parseFloat(v)||0;
      if(pa<=p.venta){ alert('El precio tachado tiene que ser MГҒS ALTO que '+fmt(p.venta)+'.'); return; }
      p.precioAntes=pa;
    }
  }
  guardarCatalogo();
  render();
  // si el panel de opciones estГЎ abierto, lo refresca ahГӯ mismo
  var adminAbierto = document.getElementById('adminOverlay').classList.contains('on');
  if(adminAbierto){ abrirOpcionesRapidas(idx); }
  else { verDetalle(idx); setTimeout(toggleCajonOpciones, 50); }
}

/* Sube el logo, lo achica automГЎticamente (mГЎx 240px) y lo guarda */
function subirLogo(ev){
  var file = ev.target.files && ev.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var max=240, w=img.width, h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>max){ w=Math.round(w*max/h); h=max; }
      var canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      var data=canvas.toDataURL('image/png');
      CONFIG.logo = data;
      // preview al toque
      var pv=document.getElementById('logoPreview');
      if(pv){ pv.style.background='url('+data+') center/cover'; pv.textContent=''; }
      alert('вң… Logo cargado. TocГЎ В«Guardar cambiosВ» para aplicarlo.');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function quitarLogo(){
  CONFIG.logo = '';
  abrirConfig();
}
/* рҹ“Ұ Prender/apagar el modo mayorista */
function toggleMayorista(){
  if(!CONFIG.mayorista) CONFIG.mayorista={on:false, palabraBulto:'Bulto', minimoUnidades:0, mostrarUnitario:true};
  CONFIG.mayorista.on = !CONFIG.mayorista.on;

}
/* Al elegir un rubro, carga sus categorГӯas sugeridas en el textarea */
function aplicarPresetRubro(k){
  var ta=document.getElementById('cf_categorias'); if(!ta) return;
  var preset=PRESETS_RUBRO[k];
  if(!preset || !preset.cats.length){ return; }
  var actual=(ta.value||'').trim();
  if(actual && !confirm('ВҝReemplazar tus categorГӯas por las de '+preset.nombre+'?')) return;
  ta.value = preset.cats.join('\n');
  // рҹҸ·пёҸ armo la estructura vacГӯa por categorГӯa, lista para que el dueГұo la llene
  CONFIG.porCategoria = CONFIG.porCategoria || {};
  var nuevo={};
  preset.cats.forEach(function(cat){
    nuevo[cat] = CONFIG.porCategoria[cat] || {markup:0, porBulto:0, minCant:0};
  });
  CONFIG.porCategoria = nuevo;
  // рҹ“Ұ si el rubro es mayorista, prende el modo automГЎticamente
  if(preset.mayorista){
    if(!CONFIG.mayorista) CONFIG.mayorista={palabraBulto:'Bulto', minimoUnidades:0, mostrarUnitario:true};
    CONFIG.mayorista.on = true;
    try{ toastCarrito('рҹ“Ұ Modo mayorista activado'); }catch(e){}
  }
  try{ toastCarrito('CategorГӯas de '+preset.nombre+' cargadas'); }catch(e){}
}

function guardarConfigDesdeForm(){
  var g=function(id){ var e=document.getElementById(id); return e?e.value.trim():''; };
  CONFIG.negocio = g('cf_negocio')||'Mi Tienda';
  CONFIG.eslogan = g('cf_eslogan');
  // рҹҸ·пёҸ categorГӯas propias del dueГұo (una por lГӯnea) вҖ” sirven para cualquier rubro
  var cats=g('cf_categorias');
  CONFIG.categorias = cats ? cats.split('\n').map(function(x){return x.trim();}).filter(Boolean) : [];
  var rb=document.getElementById('cf_rubro'); if(rb) CONFIG.rubro = rb.value||'';
  // рҹ“Ҳ markup general por tramos (editable por el dueГұo)
  var mkBase=(CONFIG.markup&&CONFIG.markup.length)?CONFIG.markup:CONFIG_DEFAULT.markup;
  var mkNuevo=[];
  mkBase.forEach(function(t,i){
    var e=document.getElementById('cf_mk_'+i);
    mkNuevo.push({ hasta:t.hasta, pct: e?(parseFloat(e.value)||t.pct):t.pct });
  });
  // рҹ”’ si el markup Amarango estГЎ bloqueado, no lo tocamos
  if(!(CONFIG.markupAmarango===true && !markupDesbloqueado())) CONFIG.markup = mkNuevo;
  // рҹ“Ұ mayorista
  if(!CONFIG.mayorista) CONFIG.mayorista={on:false};
  var mp=document.getElementById('cf_mayPalabra'); if(mp) CONFIG.mayorista.palabraBulto = mp.value.trim()||'Bulto';
  var mu=document.getElementById('cf_mayMinUnid'); if(mu) CONFIG.mayorista.minimoUnidades = parseInt(mu.value)||0;
  // рҹҡҡ envГӯos
  var num=function(id){ var e=document.getElementById(id); return e?(parseFloat(e.value)||0):0; };
  CONFIG.envio = {
    on: (num('cf_envioCosto')>0 || num('cf_envioMinimo')>0 || !!g('cf_envioZonas')),
    costo: num('cf_envioCosto'),
    gratisDesde: num('cf_envioGratis'),
    minimo: num('cf_envioMinimo'),
    zonas: g('cf_envioZonas')
  };
  CONFIG.instagram = g('cf_instagram');
  CONFIG.whatsapp = g('cf_whatsapp');
  CONFIG.colorPrincipal = g('cf_color1')||'#0B2D6B';
  CONFIG.colorAcento = g('cf_color2')||'#FF7A00';
  // las cuotas y planes se guardan al vuelo desde los botones de arriba
  CONFIG.confianza = {
    on: true,
    envios: g('cf_envios'),
    garantia: g('cf_garantia'),
    pago: g('cf_pago'),
    desde: g('cf_desde')
  };
  CONFIG.banner = g('cf_banner');
  var pr=g('cf_premios');
  if(pr) CONFIG.ruletaPremios = pr.split('\n').map(function(x){return x.trim();}).filter(Boolean);
  CONFIG.pin = g('cf_pin')||'2580';
  CONFIG.pinRev = g('cf_pinRev')||'1234';
  // dos listas: quiГ©nes cobran (admins) y quiГ©nes atienden (vendedores)
  function parseLista(txt){
    return txt ? txt.split('\n').map(function(l){
      var partes=l.split(','); if(partes.length<2) return null;
      var nom=partes[0].trim(); var wa=partes[1].replace(/[^0-9]/g,'');
      return (nom && wa) ? {nombre:nom, wa:wa} : null;
    }).filter(Boolean) : [];
  }
  CONFIG.admins = parseLista(g('cf_admins'));
  CONFIG.vendedores = parseLista(g('cf_vendedores'));
  guardarConfig();
  // рҹҺЁ aplicar YA los colores, logo y textos (antes habГӯa que guardar dos veces)
  try{ aplicarConfig(); }catch(e){}
  try{ actualizarBeeFab(); }catch(e){}
  render();
  try{ sonar('exito'); }catch(e){}
  toastCarrito('вң… Guardado, tu tienda se actualizГі');
  abrirPanelDueno();
}

var _placaModo='costo', _placaDesc=0;
function markupDeCosto(costo){
  var mk=CONFIG.markup||CONFIG_DEFAULT.markup;
  for(var i=0;i<mk.length;i++){ if(costo<=mk[i].hasta) return Math.round(costo*(1+mk[i].pct/100)/500)*500; }
  return costo;
}

function detectarPrecioPlaca(txt){ var m=(txt||'').replace(/\./g,'').match(/\$?\s*(\d{3,})/); return m?parseInt(m[1],10):0; }
function detectarNombrePlaca(txt){
  var ls=(txt||'').split('\n').map(function(l){return l.replace(/[*_#рҹ”Ҙвҳ•пёҸрҹ’°рҹ’өрҹҸ·пёҸ]/g,'').trim();}).filter(Boolean);
  for(var i=0;i<ls.length;i++){ var l=ls[i]; if(/[a-zГЎГ©ГӯГіГәГұ]/i.test(l) && !/^\W*\$?\s*\d/.test(l) && l.length>3 && l.length<55) return l; }
  return 'Producto';
}
function armarPlaca(){
  var lbls={costo:'рҹҺЁ PegГЎ el producto (con el COSTO)', venta:'рҹҺЁ PegГЎ el producto (con la VENTA)', usd:'рҹҺЁ PegГЎ el producto (con el precio en USD)'};
  var lblEl=document.getElementById('placaLbl'); if(lblEl) lblEl.textContent=lbls[_placaModo];
  var txt=document.getElementById('placaTxt').value;
  var precio=detectarPrecioPlaca(txt);
  var cont=document.getElementById('placaResultado');
  if(!precio){ cont.innerHTML='<div style="text-align:center;color:var(--sub);padding:20px;font-size:.82rem">PegГЎ un producto con el precio (marcado con $) y armo la placa.</div>'; return; }

  var costo=null, venta, usoDolar=false, usd=null, cot=null;
  if(_placaModo==='costo'){ costo=precio; venta=markupDeCosto(costo); }
  else if(_placaModo==='venta'){ venta=precio; }

    usd=precio; costo=Math.round(usd*cot); venta=markupDeCosto(costo); usoDolar=true;
  }
  var ventaFull=venta;
  if(_placaDesc>0) venta=Math.round(venta*(1-_placaDesc/100)/500)*500;

  var nombre=detectarNombrePlaca(txt);
  var cuotasHtml='', waLines=[];
  cuotasActivas().forEach(function(n){
    var vc=valorCuota(venta,n);
    cuotasHtml+='<div style="background:rgba(255,255,255,.09);border-left:3px solid var(--nar);border-radius:10px;padding:10px 13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><span style="font-size:.8rem;font-weight:800;color:#fff">'+n+' cuotas fijas</span><span style="font-size:1.05rem;font-weight:900;color:#ffb968">'+fmt(vc)+'</span></div>';

    : fmt(venta)+'<div style="font-size:.62rem;color:rgba(255,255,255,.6);font-weight:700;margin-top:2px">PRECIO CONTADO</div>';

  var costoBox='';

  else if(costo!==null){ costoBox='<div style="background:#FFF9F0;border:1px dashed var(--nar);border-radius:11px;padding:10px 13px;margin-top:10px;display:flex;justify-content:space-between;font-size:.72rem;color:var(--sub)"><span>рҹ‘ҒпёҸ Solo vos вҖ” costo</span><span style="font-weight:900;color:var(--az)">'+fmt(costo)+'</span></div>'; }

  cont.innerHTML=
     '<div style="background:linear-gradient(160deg,var(--az-osc),var(--az));border-radius:16px;padding:18px;color:#fff">'
    +'<div style="text-align:center;font-size:.9rem;font-weight:900;margin-bottom:8px">'+nombre+'</div>'

  window._placaMsg='*'+nombre.toUpperCase()+'*\n\n'+waLines.join('\n')+'\n\n'+lineaC+'\n'+firmaTienda()+' рҹҗқ';

function subirFotoCatalogo(ev){
  var file=ev.target.files&&ev.target.files[0]; if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var max=900,w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>max){w=Math.round(w*max/h);h=max;}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
      _catFoto=cv.toDataURL("image/jpeg",0.88);
      var pv=document.getElementById('catFotoPrev');
      if(pv){ pv.style.cssText='width:80px;height:80px;margin:0 auto 8px;border-radius:10px;background:#fff url('+_catFoto+') center/contain no-repeat;border:1.5px solid var(--line)'; }
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* Parser: Nombre | Precio  (lo que sigue a la barra es el precio, lo demГЎs se descarta) */
var _catParsed=[];
function parsearCatalogo(){
  var txt=document.getElementById('catTxt'); if(!txt)return;
  var cot=parseFloat((document.getElementById('catDolar')||{}).value)||CONFIG.dolar||1500;
  var esUSD = _catModo==='usd';
  _catParsed=[];

  // рҹ§  usa el parser inteligente: une lГӯneas partidas, salta encabezados, etc.
  var lineas = preprocesarLineas(txt.value||'');

  lineas.forEach(function(raw){
    var linea=raw.replace(/[*_#]/g,'').trim();
    if(!linea) return;
    var nombre='', precio=0, desc='', categoria='';

    // formato con barra: Nombre | Precio | DescripciГіn(opc) | CategorГӯa(opc)
    if(linea.indexOf('|')>=0){
      var partes=linea.split('|');
      nombre=partes[0].trim();
      var mp=(partes[1]||'').match(/(\d[\d\.]*)/);
      if(mp) precio=parseInt(mp[1].replace(/\./g,''),10);
      if(partes.length>=3) desc=(partes[2]||'').trim();
      if(partes.length>=4) categoria=(partes[3]||'').trim();
    } else {
      precio = detectarPrecioLinea(linea, esUSD) || 0;
      nombre = detectarNombreLinea(linea);
    }
    if(!precio || !nombre || nombre.length<3) return;

    var costo, venta;
    if(esUSD){ costo=Math.round(precio*cot); venta=markupDeCosto(costo); }
    else if(_catModo==='costo'){ costo=precio; venta=markupDeCosto(costo); }
    else { costo=null; venta=precio; }
    _catParsed.push({ nombre:nombre, costo:costo, venta:venta, usd:(esUSD?precio:null), desc:desc, categoria:categoria });
  });
  renderCatPreview();
}
function renderCatPreview(){
  var c=document.getElementById('catPreview'); if(!c)return;
  if(!_catParsed.length){ c.innerHTML=''; return; }
  var html='<div style="font-weight:900;color:var(--az);font-size:.86rem;margin-bottom:7px">вң… '+_catParsed.length+' producto'+(_catParsed.length===1?'':'s')+' detectado'+(_catParsed.length===1?'':'s')+'</div>';
  _catParsed.slice(0,8).forEach(function(p){
    html+='<div style="background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 11px;margin-bottom:5px">'
      +'<div style="font-size:.76rem;font-weight:700;color:var(--txt)">'+p.nombre+'</div>'
      +'<div style="font-size:.66rem;color:var(--sub)">'+(p.usd?'U$'+p.usd+' вҶ’ ':'')+'Vende: <b style="color:var(--az)">'+fmt(p.venta)+'</b> В· 6 cuotas '+fmt(valorCuota(p.venta,6))+'</div>'
      +(p.desc?'<div style="font-size:.62rem;color:#2e7d32;margin-top:3px">рҹ“Ӣ '+p.desc+'</div>':'')
      +'</div>';
  });
  if(_catParsed.length>8) html+='<div style="text-align:center;font-size:.72rem;color:var(--sub);padding:4px">вҖҰy '+(_catParsed.length-8)+' mГЎs</div>';
  c.innerHTML=html;
}

function guardarCatalogoPegado(){
  if(!_catParsed.length){ alert('PegГЎ al menos un producto.'); return; }
  var reemplazar=document.getElementById('catReemplazar') && document.getElementById('catReemplazar').checked;

  // вҡ пёҸ avisos de coherencia de memoria (mГЎs GB вүӨ menos GB = precio raro)
  var avisos=chequearCoherenciaMemoria(_catParsed);
  if(avisos.length){
    var txt='вҡ пёҸ PRECIOS RAROS\n\nEncontrГ© '+avisos.length+' modelo(s) donde MГҒS memoria sale IGUAL o MENOS:\n\n';
    txt+=avisos.slice(0,5).join('\n\n');
    if(avisos.length>5) txt+='\n\nвҖҰy '+(avisos.length-5)+' mГЎs';
    txt+='\n\nВҝCargar igual?';
    if(!confirm(txt)) return;
  }

  if(reemplazar){
    if(!confirm('вҡ пёҸ ATENCIГ“N\n\nVas a BORRAR los '+PRODUCTOS.length+' productos que ya tenГ©s y dejar solo estos '+_catParsed.length+'.\n\nВҝEstГЎs seguro?')) return;
    if(!confirm('Гҡltima confirmaciГіn:\n\nВҝSeguro que querГ©s reemplazar TODO el catГЎlogo?\n\n(Los viejos van a la papelera)')) return;
    guardarEnPapelera(PRODUCTOS);
    PRODUCTOS=[];
  }

  // рҹ”„ ACTUALIZACIГ“N INTELIGENTE:
  // В· si el producto YA existe вҶ’ le actualiza el precio (y le deja la foto)
  // В· si es nuevo вҶ’ lo agrega
  // В· los que NO vinieron en la lista вҶ’ los marca SIN STOCK
  var vinieron={};
  var actualizados=0, agregados=0, sinStock=0;

  _catParsed.forEach(function(np, i){
    var k=claveModelo(np.nombre);
    vinieron[k]=true;
    var existente=PRODUCTOS.find(function(p){ return claveModelo(p.nombre)===k; });
    if(existente){
      // ya existe: actualizo precio, dejo la foto y las marcas
      existente.venta=np.venta;
      if(np.costo) existente.costo=np.costo;
      if(np.desc && !existente.desc) existente.desc=np.desc;  // completa specs si no tenГӯa
      if(np.categoria && !existente.categoria) existente.categoria=np.categoria;  // completa categorГӯa si no tenГӯa
      existente.fechaPrecio=Date.now();
      existente.sinStock=false;          // volviГі a estar en la lista вҶ’ hay stock
      actualizados++;
    } else {
      var prod={
        id:'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
        nombre:np.nombre, venta:np.venta, foto:(i===0?_catFoto:''), categoria:(np.categoria||''),
        visible:true, fechaPrecio:Date.now(), desc:(np.desc||'')
      };
      if(np.costo) prod.costo=np.costo;
      PRODUCTOS.push(prod);
      agregados++;
    }
  });

  // los que NO vinieron вҶ’ SIN STOCK (solo si NO es reemplazo total)
  if(!reemplazar){
    PRODUCTOS.forEach(function(p){
      var k=claveModelo(p.nombre);
      if(!vinieron[k] && !p.sinStock){
        p.sinStock=true;
        sinStock++;
      }
    });
  }

  // рҹ–јпёҸ reasigna las fotos guardadas
  reasignarFotosDesdeBanco(PRODUCTOS);

  guardarCatalogo();
  var msg='вң… LISTO\n\n';
  if(agregados) msg+='вһ• '+agregados+' productos nuevos\n';
  if(actualizados) msg+='рҹ”„ '+actualizados+' precios actualizados\n';
  if(sinStock) msg+='вӣ” '+sinStock+' marcados SIN STOCK (no vinieron en la lista)\n';
  var conFoto=PRODUCTOS.filter(function(p){return p.foto;}).length;
  msg+='\nрҹ–јпёҸ '+conFoto+' con foto';
  alert(msg);
  _catParsed=[]; _catFoto='';
  render();
  abrirPanelDueno();
}

function subirFotoProd(ev){
  var file=ev.target.files&&ev.target.files[0]; if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var max=900,w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>max){w=Math.round(w*max/h);h=max;}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
      _cargaFoto=cv.toDataURL("image/jpeg",0.88);
      var pv=document.getElementById('cargaFotoPrev'); if(pv){pv.style.background='url('+_cargaFoto+') center/cover';pv.textContent='';}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   рҹ“ұ PARSER INTELIGENTE DE LISTAS (traГӯdo de la tienda vieja)
   Une lГӯneas partidas, reconoce colores, ignora precios tachados,
   salta encabezados, y no confunde 128GB con el precio.
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function limpiarTextoLista(s){
  if(!s) return '';
  s=s.replace(/\uFFFD/g,'');
  s=s.replace(/[\uD800-\uDBFF](?![\uDC00-\uDFFF])/g,'');
  s=s.replace(/(^|[^\uD800-\uDBFF])[\uDC00-\uDFFF]/g,'$1');
  s=s.replace(/^(?:\s|\*|гҖҪпёҸ|гҖҪ|рҹ”ұ|рҹ“ұ|рҹҚҺ|вңіпёҸ|вңі|в–ӘпёҸ|в–Ә|в—ҫ|вҖў|[-вҖ“вҖ”>В»В·\uFE0F])+/,'');
  s=s.replace(/рҹҮҰрҹҮ·|рҹҮәрҹҮё|вң…|вңЁ|рҹ”Ҙ|вӯҗпёҸ|вӯҗ|вқ—|вқ•|рҹ’Ј|рҹҢң|рҹ’°|рҹ’ө/g,'');
  s=s.replace(/\s*[!ВЎ]{1,}\s*$/,'');
  s=s.replace(/\s+(oferta|promo|nacional|liquidaci[oГі]n|[uГә]ltim[ao]s?|hay stock|sim f[iГӯ]sica|racing edition|precio\s*costo)\b[^]*$/i,'');
  s=s.replace(/[ \t]{2,}/g,' ');
  s=s.replace(/[\s\-вҖ“вҖ”,]+$/,'');
  return s.trim();
}

/* Une las lГӯneas partidas (nombre arriba, precio o color abajo) */
function preprocesarLineas(txt){
  var crudas=(txt||'').split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});
  function tienePrecio(l){ return /\$\s*\d|[-вҖ“]\s*\$?\s*\d|\d{3,}/.test(l); }
  function esContinuacion(l){
    if(/^[-вҖ“$(]/.test(l) || /^\d/.test(l)) return true;
    if(!/\d/.test(l) && /^[a-zA-ZГЎГ©ГӯГіГә][a-zA-ZГЎГ©ГӯГіГә \-\/,]*$/.test(l) && l.length<40){
      var pal=l.toLowerCase().split(/[-\/,\s]+/);
      var col=['silver','blue','orange','black','white','yellow','green','red','purple','lavander','lavender','gold','gray','grey','pink','desert','natural','titanium','graphite','sage','mint','celeste','negro','blanco','azul','rojo','verde','dorado','plata','gris','rosa','violeta','lila','naranja'];
      if(pal.every(function(p){ return !p || col.indexOf(p)>=0; })) return true;
    }
    return false;
  }
  function tieneNombre(l){
    if(esContinuacion(l)) return false;
    var limpio=l.replace(/\([^)]*\)/g,'').replace(/\$?\s*\d[\d.,]*/g,'').replace(/[^a-zA-Z0-9 ]/g,'').trim();
    return limpio.length>=3;
  }
  function esEncabezado(l){
    return !tienePrecio(l) && /(sellado|gtia|garant|oficial|meses|^lista|precios|hay stock|consult|entraron|modelos de)/i.test(l);
  }
  var out=[];
  for(var i=0;i<crudas.length;i++){
    var l=crudas[i];
    if(esEncabezado(l)) continue;
    if(tieneNombre(l)){
      var j=i+1;
      while(j<crudas.length && esContinuacion(crudas[j]) && !tieneNombre(crudas[j])){
        l=l+' '+crudas[j]; j++;
        if(tienePrecio(crudas[j-1]) && /\)/.test(crudas[j-1])) break;
      }
      i=j-1;
      out.push(l);
    }
  }
  return out;
}

/* Saca nombre + precio de una lГӯnea (inteligente) */
function parsearLineaLista(linea){
  // ignorar precios tachados de WhatsApp (~precio viejo~)
  linea=linea.replace(/\*?~[^~]*~\*?/g,' ').replace(/\s{2,}/g,' ').trim();
  var precio=0, esUsd=false;

  // 1) precio con usd/u$s pegado
  var mu=linea.match(/(?:usd|u\$s|us\$|d[oГі]lares?)\s*\$?\s*([\d][\d.,]*)/i) || linea.match(/([\d][\d.,]*)\s*(?:usd|u\$s|us\$|d[oГі]lares?)/i);
  if(mu){ precio=parseFloat(mu[1].replace(/\./g,'').replace(/,/g,'.')); esUsd=true; }

  // 2) precio con $
  if(!precio){
    var m=linea.match(/рҹ’І\s*\$?\s*([\d][\d.,]*)/) || linea.match(/\$\s*([\d][\d.,]*)/) || linea.match(/([\d][\d.,]*)\s*\$/);
    if(m){
      precio=parseFloat(m[1].replace(/\./g,'').replace(/,/g,'.'));
      esUsd = precio<3000;   // si tiene $ y es chico вҶ’ es dГіlar (ningГәn electro cuesta $185)
    }
  }

  // 3) sin sГӯmbolo: el nГәmero MГҒS GRANDE (no confunde 128GB con el precio)
  if(!precio){
    var nums=linea.match(/[\d][\d.]*/g)||[];
    var cand=[];
    nums.forEach(function(x){ var v=parseFloat(x.replace(/\./g,'')); if(!isNaN(v)) cand.push(v); });
    if(cand.length) precio=Math.max.apply(null,cand);
    esUsd = precio<3000 && precio>=20;
  }

  var minimo = esUsd ? 20 : 1000;
  if(!precio || precio<minimo) return null;

  // colores entre parГ©ntesis
  var colores=[];
  var mc=linea.match(/\(([^)]*)\)/);
  if(mc){
    mc[1].split(/[-,\/]/).forEach(function(c){
      c=c.trim();
      if(c && /[a-zA-ZГЎГ©ГӯГіГәГұ]{2,}/.test(c)) colores.push(c);
    });
  }

  var nombre=linea
    .replace(/\([^)]*\)/g,'')
    .replace(/(?:usd|u\$s|us\$|d[oГі]lares?)\s*\$?\s*[\d][\d.,]*/i,'')
    .replace(/[\d][\d.,]*\s*(?:usd|u\$s|us\$|d[oГі]lares?)/i,'')
    .replace(/\$\s*[\d][\d.,]*/,'')
    .replace(/[\d][\d.,]*\s*\$/,'')
    .replace(/[*_вҖўв–ӘпёҸрҹ“ұрҹҚҺ]/g,'')
    .replace(/[-вҖ“вҖ”]\s*$/,'')
    .replace(/\s{2,}/g,' ').trim();
  nombre=limpiarTextoLista(nombre);
  if(!nombre || nombre.length<2) return null;

  return { nombre:nombre.substring(0,60), precio:precio, esUsd:esUsd, colores:colores };
}

/* Al reemplazar el catГЎlogo: actualiza precios de los repetidos
   y marca SIN STOCK los que no vinieron en la lista nueva */
function fusionarConStock(nuevos, viejos){
  var mapaViejo={};
  (viejos||[]).forEach(function(v){ mapaViejo[claveModelo(v.nombre)]=v; });

  var resultado=[];
  var vistos={};

  // 1) los que vinieron en la lista nueva вҶ’ precio actualizado, CON stock
  nuevos.forEach(function(n){
    var k=claveModelo(n.nombre);
    vistos[k]=true;
    var viejo=mapaViejo[k];
    if(viejo){
      // ya existГӯa: actualizo precio, mantengo foto/destacado/etc
      viejo.venta = n.venta;
      viejo.fechaPrecio = Date.now();
      viejo.sinStock = false;
      viejo.visible = true;
      if(!viejo.foto && n.foto) viejo.foto = n.foto;
      resultado.push(viejo);
    } else {
      resultado.push(n);
    }
  });

  // 2) los que NO vinieron вҶ’ los dejo pero SIN STOCK
  var sinStock=0;
  (viejos||[]).forEach(function(v){
    var k=claveModelo(v.nombre);
    if(!vistos[k]){
      v.sinStock = true;
      resultado.push(v);
      sinStock++;
    }
  });

  return { productos:resultado, sinStock:sinStock, actualizados:Object.keys(vistos).length };
}

  if(!precio){
    var m=linea.match(/рҹ’І\s*\$?\s*([\d][\d.,]*)/) || linea.match(/\$\s*([\d][\d.,]*)/) || linea.match(/([\d][\d.,]*)\s*\$/);
    if(m) precio=parseFloat(m[1].replace(/\./g,'').replace(/,/g,'.'));
  }
  if(!precio){
    var nums=linea.match(/[\d][\d.]*/g)||[];
    var cand=[];
    nums.forEach(function(s){ var v=parseFloat(s.replace(/\./g,'')); if(!isNaN(v)) cand.push(v); });
    if(cand.length) precio=Math.max.apply(null, cand);
  }
  var minimo = esUSD ? 20 : 1000;
  if(!precio || precio<minimo) return null;
  return precio;
}

/* Saca el nombre de la lГӯnea (le quita el precio y la basura) */
function detectarNombreLinea(linea){
  return (linea||'')
    .replace(/\*?~[^~]*~\*?/g,' ')
    .replace(/(?:usd|u\$s|us\$)\s*\$?\s*[\d][\d.,]*/ig,' ')
    .replace(/[\d][\d.,]*\s*(?:usd|u\$s|us\$)/ig,' ')
    .replace(/рҹ’І\s*\$?\s*[\d][\d.,]*/g,' ')
    .replace(/[-вҖ“]?\s*\$\s*[\d][\d.,]*/g,' ')
    .replace(/[\d][\d.,]*\s*\$/g,' ')
    .replace(/oferta\s*!*/ig,' ')
    .replace(/nacional|racing edition|precio\s*costo/ig,' ')
    .replace(/рҹҮҰрҹҮ·|рҹ“ұ|гҖҪпёҸ|рҹ”ұ|вқ—|рҹ’Ј|рҹҢң|вң…|рҹ’°|вқ„пёҸ|рҹҚі|рҹ“ә|рҹ§ә|вҳ•|рҹ”Ҙ|\*/g,' ')
    .replace(/\(\s*\)/g,' ')
    .replace(/\s{2,}/g,' ')
    .replace(/[-вҖ“,]\s*$/,'')
    .trim();
}

/* в•җв•җв•җв•җв•җв•җв•җ вҡ пёҸ COHERENCIA DE MEMORIA в•җв•җв•җв•җв•җв•җв•җ
   Avisa si un modelo con MГҒS memoria sale igual o menos que uno con MENOS. */
function chequearCoherenciaMemoria(lista){
  var avisos=[];
  function memGB(nombre){
    var m=(nombre||'').match(/(\d+)\s*(tb|gb)/i);
    if(!m) return null;
    var n=parseInt(m[1],10);
    if(/tb/i.test(m[2])) n=n*1024;
    return n;
  }
  function baseModelo(nombre){
    return (nombre||'').toLowerCase().replace(/\d+\s*(tb|gb)/ig,'').replace(/\d+\s*\/\s*\d+/g,'').replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
  }
  var grupos={};
  lista.forEach(function(c){
    var mem=memGB(c.nombre);
    if(mem===null) return;
    var base=baseModelo(c.nombre);
    if(!grupos[base]) grupos[base]=[];
    grupos[base].push({nombre:c.nombre, precio:c.venta, mem:mem});
  });
  for(var base in grupos){
    var arr=grupos[base];
    if(arr.length<2) continue;
    arr.sort(function(a,b){ return a.mem-b.mem; });
    for(var i=1;i<arr.length;i++){
      if(arr[i].precio<=arr[i-1].precio){
        avisos.push(arr[i].nombre+' ('+fmt(arr[i].precio)+') sale igual o menos que '+arr[i-1].nombre+' ('+fmt(arr[i-1].precio)+'), teniendo mГЎs memoria');
      }
    }
  }
  return avisos;
}


/* в•җв•җв•җв•җв•җв•җв•җ рҹ–јпёҸ BANCO DE FOTOS вҖ” las fotos sobreviven a la actualizaciГіn de precios в•җв•җв•җв•җв•җв•җв•җ
   Guarda las fotos POR MODELO, aparte del catГЎlogo.
   ActualizГЎs precios 100 veces y las fotos se reasignan solas. */
function claveModelo(n){
  return (n||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
}
function keyBanco(){ return TIENDA==='amarango' ? 'banco_fotos' : 'banco_fotos_'+TIENDA; }
function cargarBancoFotos(){
  try{ var g=localStorage.getItem(lsKey('ae_banco_fotos')); if(g) return JSON.parse(g); }catch(e){}
  return {};
}
function guardarBancoFotos(banco){
  try{ localStorage.setItem(lsKey('ae_banco_fotos'), JSON.stringify(banco)); }catch(e){}
  if(sb){ sb.from('tienda_catalogo').upsert({id:keyBanco(), datos:banco}).then(function(){}).catch(function(){}); }
}
function bajarBancoFotos(){
  if(!sb) return;
  sb.from('tienda_catalogo').select('datos').eq('id',keyBanco()).maybeSingle()
    .then(function(r){ if(r && r.data && r.data.datos){ try{ localStorage.setItem(lsKey('ae_banco_fotos'), JSON.stringify(r.data.datos)); }catch(e){} } })
    .catch(function(){});
}
/* Cada vez que se pone una foto, se guarda en el banco */
function guardarFotoEnBanco(nombre, foto){
  if(!nombre) return;
  var banco=cargarBancoFotos();
  var k=claveModelo(nombre);
  if(foto){ banco[k]=foto; } else { delete banco[k]; }
  guardarBancoFotos(banco);
}
/* Reasigna las fotos guardadas a los productos que no tienen */
function reasignarFotosDesdeBanco(lista){
  var banco=cargarBancoFotos();
  var claves=Object.keys(banco);
  if(!claves.length) return lista;
  (lista||[]).forEach(function(p){
    if(!p || p.foto) return;
    var k=claveModelo(p.nombre);
    // 1) coincidencia exacta
    if(banco[k]){ p.foto=banco[k]; return; }
    // 2) coincidencia parcial (la mГЎs especГӯfica gana)
    var mejor='', mejorLen=0;
    for(var i=0;i<claves.length;i++){
      var kb=claves[i];
      if(!kb || kb.length<5) continue;
      if(k.indexOf(kb)!==-1 || kb.indexOf(k)!==-1){
        var largo=Math.min(k.length, kb.length);
        if(largo>mejorLen){ mejorLen=largo; mejor=kb; }
      }
    }
    if(mejor && banco[mejor]){ p.foto=banco[mejor]; }
  });
  return lista;
}
/* CuГЎntas fotos hay guardadas */
function cuantasFotosBanco(){ return Object.keys(cargarBancoFotos()).length; }

/* в•җв•җв•җв•җв•җв•җв•җ PEGADO MASIVO вҖ” cargar muchos productos de una lista в•җв•җв•җв•җв•җв•җв•җ */
/* рҹ“„ Leer un PDF de lista de precios y volcar su texto en el cuadro.
   Funciona si el PDF tiene texto seleccionable (no si son fotos escaneadas). */
function cargarScriptPDF(url){
  return new Promise(function(res, rej){
    var s=document.createElement('script'); s.src=url;
    s.onload=res; s.onerror=function(){ rej(new Error('no se pudo cargar')); };
    document.head.appendChild(s);
  });
}
async function leerPDFLista(input){
  var f = input.files && input.files[0];
  if(!f) return;
  var est = document.getElementById('pdfEstado');
  var poner = function(t){ if(est) est.innerHTML = t; };
  poner('вҸі Leyendo el PDFвҖҰ');
  try{
    if(typeof pdfjsLib === 'undefined'){
      await cargarScriptPDF('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
      if(window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
    var buf = await f.arrayBuffer();
    var pdf = await pdfjsLib.getDocument({data:buf}).promise;
    var todo = '';
    for(var i=1; i<=pdf.numPages; i++){
      poner('вҸі Leyendo pГЎgina '+i+' de '+pdf.numPages+'вҖҰ');
      var pg = await pdf.getPage(i);
      var tc = await pg.getTextContent();
      // рҹ“җ CatГЎlogos en 2 columnas: separo por posiciГіn X para no mezclar
      var vp = pg.getViewport({scale:1});
      var medio = vp.width/2;
      var izq = {}, der = {};
      tc.items.forEach(function(it){
        var x = it.transform[4], y = Math.round(it.transform[5]/6)*6;
        var caja = (x < medio) ? izq : der;
        (caja[y] = caja[y] || []).push({x:x, t:it.str});
      });
      var armar = function(caja){
        var out = [];
        Object.keys(caja).sort(function(a,b){ return b-a; }).forEach(function(y){
          var l = caja[y].sort(function(a,b){ return a.x-b.x; })
                    .map(function(o){ return o.t; }).join(' ').replace(/\s+/g,' ').trim();
          if(l) out.push(l);
        });
        return out;
      };
      // primero toda la columna izquierda, despuГ©s la derecha
      todo += armar(izq).join('\n') + '\n' + armar(der).join('\n') + '\n';
    }
    var ta = document.getElementById('masivoTxt');
    if(ta){ ta.value = todo; parsearMasivo(); }
    var lineasN = todo.split('\n').filter(Boolean).length;
    if(!lineasN){
      poner('<span style="color:#DC2626;font-weight:800">вҡ пёҸ El PDF no tiene texto (parece escaneado). ProbГЎ copiando y pegando.</span>');
    } else {
      poner('<span style="color:#059669;font-weight:800">вң… '+lineasN+' lГӯneas leГӯdas de '+pdf.numPages+' pГЎgina(s)</span>');
      try{ sonar('exito'); }catch(e){}
    }
  }catch(e){
    console.warn('PDF:', e);
    poner('<span style="color:#DC2626;font-weight:800">вҡ пёҸ No se pudo leer. NecesitГЎs internet la primera vez.</span>');
  }
  input.value='';
}

/* Parser: cada lГӯnea que tenga un precio es un producto */
function parsearMasivo(){
  var txt=document.getElementById('masivoTxt').value||'';
  var cot=parseFloat(document.getElementById('masivoDolar').value)||1500;
  var lineas=txt.split('\n');
  _masivoParsed=[];

  // рҹ“Ұ FORMATO CATГҒLOGO MAYORISTA: una lГӯnea con el precio ($unit/$bulto o $precio)
  //    y en la lГӯnea siguiente el nombre. Se detecta solo.
  var esLineaPrecio = function(l){ return /^\$[\d.,\/$\s]+$/.test(l.trim()) || /^agotado$/i.test(l.trim()); };
  var precioSueltos = lineas.filter(function(l){ return esLineaPrecio(l); }).length;
  if(precioSueltos >= 4){
    var lim = lineas.map(function(l){ return l.replace(/[*_#]/g,'').trim(); }).filter(Boolean);
    for(var i=0; i<lim.length-1; i++){
      if(!esLineaPrecio(lim[i])) continue;
      var nom = lim[i+1];
      if(!nom || esLineaPrecio(nom)) continue;
      if(nom.toUpperCase()===nom && nom.length>4 && !/\d/.test(nom)) continue;  // tГӯtulo de marca
      if(/^agotado$/i.test(lim[i])) { i++; continue; }                            // sin stock: se saltea
      // "$1170/$23407" вҶ’ me quedo con el precio de BULTO (el segundo). Si hay uno solo, ese.
      var nums = lim[i].split('/').map(function(x){
        var v = x.replace(/[^\d.,]/g,'').replace(/\./g,'').replace(',','.');
        return parseFloat(v)||0;
      }).filter(function(v){ return v>0; });
      if(!nums.length) { i++; continue; }
      var precio = Math.round(nums.length>1 ? nums[1] : nums[0]);
      if(precio>0){ pushProd(nom, precio, false, false, false, cot); }
      i++;
    }
    if(_masivoParsed.length){ marcarSospechosos(); renderMasivoPreview(); return; }
  }

  lineas.forEach(function(raw){
    var linea=raw.replace(/[*_#]/g,'').trim();
    if(!linea) return;
    var precio=0, esUsd=false, nombre='', dudoso=false;

    // ===== FORMATO BARRITA: Nombre | Precio =====
    // REGLA DE MAX: lo que sigue a la PRIMERA barra es el precio.
    // Todo lo que venga despuГ©s del precio se descarta.
    if(linea.indexOf('|')>=0){
      var partes=linea.split('|');
      nombre=partes[0].trim();
      var precioStr=(partes[1]||'').trim();   // вҶҗ el que sigue a la barra, siempre
      var mu=precioStr.match(/(\d[\d\.]*)\s*usd/i);
      if(mu){ precio=parseInt(mu[1].replace(/\./g,''),10); esUsd=true; }
      else { var mp=precioStr.match(/(\d[\d\.]*)/); if(mp){ precio=parseInt(mp[1].replace(/\./g,''),10); esUsd=/usd/i.test(precioStr); } }
      if(!precio || !nombre) return;
      pushProd(nombre, precio, esUsd, /oferta/i.test(linea), false, cot); return;
    }

    // ===== USD explГӯcito (celulares mayorista): "110usd" =====
    var mUsd=linea.match(/(\d{2,4})\s*usd/i);
    if(mUsd){
      precio=parseInt(mUsd[1],10); esUsd=true;
      nombre=limpiarNombre(linea.replace(/\d{2,4}\s*usd/i,''));
      if(nombre.length>=3) pushProd(nombre, precio, esUsd, /oferta/i.test(linea), false, cot);
      return;
    }

    // ===== PRECIO CON $ (la regla principal de Max): $27.000, $ 27.000, 27.000$ =====
    // busca un nГәmero pegado a un $ (antes o despuГ©s, con espacio opcional)
    var mDolar = linea.match(/\$\s*(\d[\d\.]{2,})/) || linea.match(/(\d[\d\.]{2,})\s*\$/);
    if(mDolar){
      precio=parseInt(mDolar[1].replace(/\./g,''),10);
      // en celulares "-$185" es USD; en electro "$195000" es pesos. Distingo por tamaГұo:
      esUsd = precio < 3000;  // menos de 3000 con $ = dГіlar (ningГәn electro cuesta $185 pesos)
      nombre=limpiarNombre(linea.replace(mDolar[0],''));
      if(nombre.length>=3) pushProd(nombre, precio, esUsd, /oferta/i.test(linea), false, cot);
      return;
    }

    // ===== sin $ ni usd: no hay precio confiable, salteo (es tГӯtulo o medida suelta) =====
  });
  marcarSospechosos();
  renderMasivoPreview();
}
/* helpers del parser */
function limpiarNombre(s){
  return (s||'').replace(/oferta\s*!*/i,'').replace(/nacional/i,'').replace(/racing edition/i,'')
    .replace(/precio\s*costo/i,'').replace(/colores?\s+disponibles?.*/i,'')
    .replace(/рҹҮҰрҹҮ·|рҹ“ұ|гҖҪпёҸ|рҹ”ұ|вқ—|рҹ’Ј|рҹҢң|вң…|рҹ’°|вқ„пёҸ|рҹҚі|рҹ“ә|рҹ§ә|вҳ•|!/g,'')
    .replace(/\(\s*\)/g,'')          // parГ©ntesis vacГӯos ()
    .replace(/\s{2,}/g,' ').replace(/[-вҖ“,]\s*$/,'').replace(/\s+$/,'').trim();
}
function pushProd(nombre, precio, esUsd, oferta, dudoso, cot){
  var costo = esUsd ? Math.round(precio*cot) : precio;
  var venta = markupDeCosto(costo);
  _masivoParsed.push({ nombre:nombre, costo:costo, venta:venta, esUsd:esUsd, usd:esUsd?precio:null, oferta:oferta, sospechoso:dudoso });
}
function marcarSospechosos(){
  // marca precios muy fuera del rango del resto (probable error de tipeo)
  if(_masivoParsed.length>3){
    var ventas=_masivoParsed.map(function(p){return p.venta;}).sort(function(a,b){return a-b;});
    var mediana=ventas[Math.floor(ventas.length/2)];
    _masivoParsed.forEach(function(p){ if(p.venta > mediana*5) p.sospechoso=true; });
  }
}

var PLANES = {};   // se arma en aplicarConfig() segГәn el sistema elegido
/* в•җв•җв•җв•җв•җв•җв•җ рҹҗқ SISTEMA AMARANGO вҖ” tabla propietaria (no exhibida) в•җв•җв•җв•җв•җв•җв•җ
   Los valores del sistema Amarango no se guardan como nГәmero directo.
   _ax() los reconstruye al vuelo; la tienda cliente ve el RESULTADO
   (la cuota final), nunca el porcentaje. Control: Maxi + ГҒngela. */
var _AX = { 2:[3,5], 3:[5,5], 4:[11,5], 5:[13,5], 6:[13,6], 9:[22,5], 12:[29,5] };
function _ax(n){ var p=_AX[n]; return p ? (p[0]*p[1]) : 0; }   // 2вҶ’15, 4вҶ’55, 6вҶ’78, вҖҰ
function pctPlan(n){
  // el sistema es siempre Amarango (oculto). Se ignora cualquier % guardado antes.
  return _ax(n);
}
function valorCuota(venta,n){ return Math.round(venta*(1+pctPlan(n)/100)/n/1000)*1000; }
function fmt(n){ return '$'+Math.round(n).toLocaleString('es-AR'); }
function cuotasActivas(){
  if(typeof tieneCuotas==='function' && !tieneCuotas()) return [];  // рҹ”’ plan BГЎsico: solo contado
  if(CONFIG && CONFIG.modoVenta==='contado') return [];   // sin cuotas: solo contado
  return Object.keys(PLANES).map(Number).filter(function(n){ return PLANES[n] && PLANES[n].on; }).sort(function(a,b){return a-b;});
}
function mejorCuota(venta){ var a=cuotasActivas(); if(!a.length)return null; var n=a[a.length-1]; return {n:n, valor:valorCuota(venta,n)}; }

/* Devuelve las categorГӯas a mostrar: las del dueГұo (cualquier rubro) o las de electro */
/* рҹҸӯ MARCAS вҖ” se detectan solas de la primera palabra del producto */
var marcaActiva='';
function marcaDe(p){
  var n=(p && p.nombre ? p.nombre : '').trim();
  if(!n) return '';
  // saco emojis y sГӯmbolos del principio
  n=n.replace(/^[^\p{L}\p{N}]+/u,'').trim();
  var prim=n.split(/[\s\-|]/)[0] || '';
  if(prim.length<3) return '';
  return prim.charAt(0).toUpperCase()+prim.slice(1).toLowerCase();
}
function marcasTienda(){
  var cuenta={};
  (PRODUCTOS||[]).forEach(function(p){
    if(p.visible===false) return;
    var m=marcaDe(p); if(!m) return;
    cuenta[m]=(cuenta[m]||0)+1;
  });
  // solo marcas con 2 o mГЎs productos (si no, se llena de ruido)
  return Object.keys(cuenta).filter(function(m){ return cuenta[m]>=2; })
    .sort(function(a,b){ return cuenta[b]-cuenta[a]; }).slice(0,14);
}
function setMarca(m){ sonar('tap'); marcaActiva=(marcaActiva===m?'':m); render(); }
function catsActuales(){
  var propias = (typeof CONFIG!=='undefined' && CONFIG && Array.isArray(CONFIG.categorias)) ? CONFIG.categorias.filter(Boolean) : [];
  if(!propias.length) return CATS_ELECTRO;
  var out=[{k:'', ico:'рҹ”Ҙ', txt:'Todos'}];
  propias.forEach(function(c){
    // si la categorГӯa empieza con un emoji, lo usamos de Гӯcono
    var m=String(c).trim().match(/^(\p{Extended_Pictographic}\uFE0F?)\s*(.*)$/u);
    if(m) out.push({k:c, ico:m[1], txt:(m[2]||c)});
    else out.push({k:c, ico:'рҹҸ·пёҸ', txt:c});
  });
  out.push({k:'Sin categorГӯa', ico:'рҹ“Ұ', txt:'Otros'});
  return out;
}
/* рҹҸ·пёҸ DETECCIГ“N DE CATEGORГҚA вҖ” reconoce marcas, modelos y palabras clave */
function categoriaDe(nombre){
  var n=(nombre||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');   // saca acentos

  // в”Җв”Җ рҹ“ұ CELULARES (todas las marcas y modelos que maneja Max)
  if(/samsung|galaxy|\bs2[0-9]\b|\ba[0-9]{2}\b|\bm[0-9]{2}\b/.test(n)) return 'рҹ“ұ Celulares';
  if(/motorola|\bmoto\b|\bg[0-9]{2}\b|\be[0-9]{2}\b|edge/.test(n)) return 'рҹ“ұ Celulares';
  if(/xiaomi|redmi|\bpoco\b|\bnote 1[0-9]/.test(n)) return 'рҹ“ұ Celulares';
  if(/iphone|\bipad\b|apple/.test(n)) return 'рҹ“ұ Celulares';
  if(/infinix|tecno|realme|honor|huawei|oppo|vivo|zte|nokia|alcatel|tcl.*(?:5g|movil)/.test(n)) return 'рҹ“ұ Celulares';
  if(/celular|smartphone|\b5g\b.*\bgb\b|\bgb\b.*\b5g\b/.test(n)) return 'рҹ“ұ Celulares';
  // patrГіn tГӯpico de celu: "128/8gb", "256/12gb"
  if(/\d{2,4}\s*\/\s*\d{1,2}\s*gb/.test(n)) return 'рҹ“ұ Celulares';

  // в”Җв”Җ вқ„пёҸ HELADERAS
  if(/heladera|freezer|frigorific|no frost|cava|conservadora/.test(n)) return 'вқ„пёҸ Heladeras';

  // в”Җв”Җ рҹҚі COCINA
  if(/cocina|anafe|horno|microonda|multigas|parrilla|grill|campana/.test(n)) return 'рҹҚі Cocina';

  // в”Җв”Җ рҹ“ә TV
  if(/\btv\b|televis|smart\s*tv|\boled\b|\bqled\b|\bled\b.*pulg|\d{2}\s*(pulg|")|monitor|proyector/.test(n)) return 'рҹ“ә TV';

  // в”Җв”Җ рҹҢҖ CLIMATIZACIГ“N
  if(/ventilador|turbo|aire acond|split|calefact|estufa|caloventor|calorific|panel calefac|radiador|deshumid|purificador/.test(n)) return 'рҹҢҖ ClimatizaciГіn';

  // в”Җв”Җ рҹ§ә LAVADO
  if(/lavarrop|secarrop|lavavaj|lavaseca|centrifug/.test(n)) return 'рҹ§ә Lavado';

  // в”Җв”Җ вҳ• ELECTRO HOGAR
  if(/termo|pava|cafeter|licuad|batidor|mixer|procesador|freidora|air ?fryer|yogurt|tostad|sandwich|waflera|exprimidor|juguera|multiprocesador|minipimer|olla|vaporera|plancha|aspirador|robot/.test(n)) return 'вҳ• Electro hogar';

  // в”Җв”Җ рҹӣҸпёҸ OTROS (sommier, colchones, bicis, etc)
  return 'рҹ“Ұ Otros';
}
/* CategorГӯa de un producto:
   1) la que el dueГұo le puso a mano (siempre manda)
   2) si el dueГұo definiГі SUS categorГӯas, no adivinamos вҶ’ "Sin categorГӯa"
   3) si no definiГі ninguna (ej: Amarango), usamos la detecciГіn automГЎtica de electro */
/* рҹҡҰ SEMГҒFORO DEL PRECIO вҖ” solo lo ve el admin
   Verde: hasta 2 semanas В· Amarillo: 2 a 4 В· Rojo: 4+ (revisar) */
function badgePrecioFecha(p){
  if(rolEfectivo()!=='admin') return '';
  var ts = p.fechaPrecio || p.precioActualizado || 0;
  if(!ts) return '<div style="background:#F7F8FA;border-radius:5px;padding:3px 6px;font-size:.55rem;color:var(--sub);font-weight:700;text-align:center;margin-bottom:4px">рҹ•җ Sin fecha</div>';
  var dias = Math.floor((Date.now()-ts)/86400000);
  var col,bg,ico,txt;
  if(dias>=28){ col='#DC2626'; bg='#FEF2F2'; ico='рҹ”ҙ'; txt=' В· REVISAR'; }
  else if(dias>=14){ col='#D97706'; bg='#FFFBEB'; ico='рҹҹЎ'; txt=''; }
  else { col='#059669'; bg='#F0FDF4'; ico='рҹҹў'; txt=''; }
  var cuando = dias===0?'hoy':(dias===1?'ayer':'hace '+dias+'d');
  return '<div style="background:'+bg+';border-radius:5px;padding:3px 6px;font-size:.55rem;color:'+col+';font-weight:800;text-align:center;margin-bottom:4px">'+ico+' '+cuando+txt+'</div>';
}
function catProd(p){
  if(p.categoria) return p.categoria;
  var propias = (CONFIG && Array.isArray(CONFIG.categorias)) ? CONFIG.categorias : [];
  if(propias.length) return 'Sin categorГӯa';
  return categoriaDe(p.nombre);
}
/* Lista de categorГӯas que se muestran en la tienda */
function categoriasTienda(){
  var propias = (CONFIG && Array.isArray(CONFIG.categorias)) ? CONFIG.categorias.filter(Boolean) : [];
  if(propias.length) return propias;
  // sin categorГӯas propias вҶ’ las que salgan de los productos (modo automГЎtico)
  var set={};
  (PRODUCTOS||[]).forEach(function(p){ var c=catProd(p); if(c) set[c]=1; });
  return Object.keys(set);
}
function marcaDe(nombre){
  var n=(nombre||'').toLowerCase();
  if(/samsung|galaxy/.test(n))return 'Samsung';
  if(/motorola|moto|edge/.test(n))return 'Motorola';
  if(/xiaomi|redmi|poco/.test(n))return 'Xiaomi';
  if(/iphone|apple/.test(n))return 'Apple';

}
/* bГәsqueda tolerante a acentos */
function normTxt(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,''); }

/* ===== ConexiГіn Supabase ===== */
function conectar(){
  if(!SB_KEY){ cargarConfig(); mostrarSetup(); return; }
  try{
    sb = window.supabase.createClient(SB_URL, SB_KEY);
    // рҹҡҰ EL PORTERO: primero verifica si la tienda estГЎ habilitada
    verificarSuscripcion(function(habilitada){
      if(!habilitada){ bloquearTienda(); return; }
      cargarConfig();
      bajarCatalogo();
    });
  }catch(e){ mostrarError('No pude conectar. RevisГЎ que la key estГ© bien pegada.'); }
}
function bajarCatalogo(){
  // 1) muestra lo que haya en el telГ©fono (rГЎpido) вҖ” pero solo si es de ESTA tienda
  try{
    var local=JSON.parse(localStorage.getItem(lsKey('ae_tienda_catalogo'))||'[]');
    if(local.length){ PRODUCTOS=local; render(); }
  }catch(e){}
  // 2) baja lo Гәltimo de la nube
  sb.from('tienda_catalogo').select('datos').eq('id',keyCatalogo()).maybeSingle()
    .then(function(r){
      if(r && r.data && r.data.datos){
        var datos=r.data.datos;
        // рҹ”’ verifica que el catГЎlogo sea de ESTA tienda (el bug viejo cruzaba datos)
        if(datos._tienda && datos._tienda!==TIENDA){
          console.warn('CatГЎlogo en nube contaminado. Ignorado.');
          PRODUCTOS=[];
          render();
          return;
        }
        var arr = Array.isArray(datos) ? datos : (datos.productos||[]);
        try{ bajarBancoFotos(); reasignarFotosDesdeBanco(arr); }catch(e){}
        PRODUCTOS = arr.filter(function(p){ return p.visible!==false || rolActual()==='admin'; });
        try{ localStorage.setItem(lsKey('ae_tienda_catalogo'), JSON.stringify(arr)); }catch(e){}
        actualizarFavCount(); actualizarBadgeCarrito(); actualizarBeeFab();
        setTimeout(function(){ try{ mostrarBienvenida(); }catch(e){} }, 1200);
        try{ cargarPedidos(function(){ _mapaJuntos=null; try{ mandarSenal(); }catch(e){} }); }catch(e){}
        render();
      } else if(!PRODUCTOS.length){
        mostrarError('Tu tienda estГЎ vacГӯa. EntrГЎ como admin y cargГЎ tus productos. рҹҗқ');
      }
    })
    .catch(function(){ if(!PRODUCTOS.length) mostrarError('No pude bajar el catГЎlogo. RevisГЎ tu conexiГіn.'); });
}

function idProd(p){ return p.id!=null ? String(p.id) : (p.nombre||''); }

function guardarFavs(a){ try{ localStorage.setItem(lsKey('ae_favoritos'), JSON.stringify(a)); }catch(e){} }

  var wrap=document.getElementById('saludo-wrap');
  if(!mostrar){ wrap.innerHTML=''; return; }
  var h=new Date().getHours();
  var emo, hola, sub;
  if(h>=6 && h<13){ emo='рҹҢ…'; hola='ВЎBuenos dГӯas!'; }
  else if(h>=13 && h<20){ emo='вҳҖпёҸ'; hola='ВЎBuenas tardes!'; }
  else { emo='рҹҢҷ'; hola='ВЎBuenas noches!'; }

  var pdd=PRODUCTOS.find(function(p){ return p.delDia; });

      +(mc?'<div class="cv">'+fmt(mc.valor)+'</div><div class="cn">en '+mc.n+' cuotas fijas</div>':'')
      +'<div class="ct">Contado: '+fmt(pdd.venta)+'</div></div></div>';

        +'</div></div>';
    }).join('')+'</div>';
  }

  wrap.innerHTML=html;
}

function calcSimulador(){
  var s=document.getElementById('simSlider'); if(!s)return;
  var tope=parseInt(s.value,10);
  document.getElementById('simValor').textContent=fmt(tope);

  // busca quГ© se puede llevar con ese pago mensual
  var opciones=[];
  PRODUCTOS.forEach(function(p,idx){
    if(p.visible===false || p.sinStock) return;
    // Вҝen quГ© plan de cuotas le entra?
    var planes=cuotasActivas();
    for(var i=planes.length-1; i>=0; i--){   // empieza por el de mГЎs cuotas (la mГЎs baja)
      var n=planes[i];
      var vc=valorCuota(p.venta, n);
      if(vc<=tope){
        opciones.push({ p:p, idx:idx, n:n, cuota:vc });
        break;   // se queda con el plan mГЎs conveniente que le entra
      }
    }
  });

  var cont=document.getElementById('simResultado');
  if(!opciones.length){
    // рҹҺҜ neuroventa: nunca decir "no alcanza". Mostrar lo mГЎs cerca y el camino.
    var masBarato=null;
    PRODUCTOS.forEach(function(p){
      if(p.visible===false || p.sinStock) return;
      var act=cuotasActivas();
      if(!act.length) return;
      var n=act[act.length-1];
      var c=valorCuota(p.venta, n);

        +'<div onclick="cerrarConsulta();verDetalle('+PRODUCTOS.indexOf(masBarato.p)+')" style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px;cursor:pointer;display:flex;gap:10px;align-items:center;text-align:left">'
          +'<div style="width:48px;height:48px;flex:0 0 auto;border-radius:9px;background:'+(masBarato.p.foto?'#fff url('+masBarato.p.foto+') center/contain no-repeat':'#F5F8FF')+';border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:1.3rem">'+(masBarato.p.foto?'':'рҹ“Ұ')+'</div>'
          +'<div style="flex:1;min-width:0"><div style="font-size:.76rem;font-weight:700;color:var(--txt);line-height:1.25">'+masBarato.p.nombre+'</div>'
          +'<div style="font-size:.86rem;font-weight:900;color:var(--nar);margin-top:2px">'+fmt(masBarato.cuota)+'<span style="font-size:.64rem;color:var(--sub);font-weight:600"> x '+masBarato.n+' cuotas</span></div></div>'
          +'<span style="color:var(--sub)">вҖә</span>'
        +'</div>'
        +'<div style="font-size:.72rem;color:var(--sub);margin-top:10px">рҹ’¬ ВҝNecesitГЎs un plan a tu medida? Escribinos рҹҗқ</div>'
        +'</div>';
    } else {
      cont.innerHTML='<div style="text-align:center;color:var(--sub);padding:30px 20px;font-size:.86rem">'
        +'<div style="font-size:2.4rem;margin-bottom:8px">рҹҗқ</div>'

    }

  // ordena: primero lo mГЎs caro que se pueda llevar (le muestra lo mejor)

/* в•җв•җв•җв•җв•җв•җв•җ рҹ§  ALGORITMO DE SUGERIDOS в•җв•җв•җв•җв•җв•җв•җ
   Ya no adivina: APRENDE de los pedidos reales.
   1) QuГ© se compra JUNTO (lo mГЎs fuerte)
   2) QuГ© es lo mГЎs pedido en general
   3) Si no hay datos, cae a categorГӯa + precio parecido */

/* Construye el mapa de "quГ© se lleva con quГ©" a partir de los pedidos */
var _mapaJuntos=null;
function construirMapaJuntos(){
  _mapaJuntos={};
  (PEDIDOS||[]).forEach(function(ped){
    if(!ped.items || ped.items.length<2) return;   // solo sirven los pedidos con 2+ productos
    var nombres=ped.items.map(function(it){ return it.nombre; });
    // por cada par de productos del mismo pedido, suma un punto
    nombres.forEach(function(a){
      nombres.forEach(function(b){
        if(a===b) return;
        if(!_mapaJuntos[a]) _mapaJuntos[a]={};
        _mapaJuntos[a][b]=(_mapaJuntos[a][b]||0)+1;
      });
    });
  });
  return _mapaJuntos;
}
/* CuГЎntas veces se pidiГі cada producto (popularidad) */
function popularidad(){
  var pop={};
  (PEDIDOS||[]).forEach(function(ped){
    (ped.items||[]).forEach(function(it){
      pop[it.nombre]=(pop[it.nombre]||0)+(it.cant||1);
    });
  });
  return pop;
}

function renderSugeridos(idx){
  var cont=document.getElementById('d-sugeridos'); if(!cont)return;
  var p=PRODUCTOS[idx]; if(!p){ cont.innerHTML=''; return; }

  var candidatos=[];
  var motivo='';

  // в”Җв”Җ 1) LO QUE SE COMPRA JUNTO (aprendido de los pedidos reales)
  if(!_mapaJuntos) construirMapaJuntos();
  var juntos=_mapaJuntos[p.nombre];
  if(juntos){
    var conJuntos=Object.keys(juntos).map(function(nom){
      var prod=PRODUCTOS.find(function(x){ return x.nombre===nom && x.visible!==false && !x.sinStock; });
      return prod ? {p:prod, score:juntos[nom]*100} : null;   // peso ALTO: es dato real
    }).filter(Boolean);
    if(conJuntos.length){
      candidatos=candidatos.concat(conJuntos);
      motivo='Quienes lo compraron, tambiГ©n se llevaron';
    }
  }

  // в”Җв”Җ 2) LO MГҒS PEDIDO (si falta completar)
  if(candidatos.length<4){
    var pop=popularidad();
    var populares=PRODUCTOS.filter(function(x,i){
      return i!==idx && x.visible!==false && !x.sinStock && pop[x.nombre] &&
             !candidatos.some(function(c){ return c.p.nombre===x.nombre; });
    }).map(function(x){ return {p:x, score:pop[x.nombre]*10}; });   // peso medio
    candidatos=candidatos.concat(populares);
    if(!motivo && populares.length) motivo='Lo mГЎs pedido';
  }

  // в”Җв”Җ 3) MISMA CATEGORГҚA + PRECIO PARECIDO (el respaldo de siempre)
  if(candidatos.length<4){
    var cat=catProd(p);
    var similares=PRODUCTOS.filter(function(x,i){
      return i!==idx && x.visible!==false && !x.sinStock &&
             !candidatos.some(function(c){ return c.p.nombre===x.nombre; });
    }).map(function(x){
      var s=0;
      if(catProd(x)===cat) s+=5;                                    // misma categorГӯa
      var dif=Math.abs(x.venta-p.venta)/Math.max(p.venta,1);
      s += Math.max(0, 4-dif*4);                                     // precio parecido
      if(x.destacado) s+=1;
      if(x.precioAntes && x.precioAntes>x.venta) s+=1;               // en oferta
      return {p:x, score:s};
    });
    candidatos=candidatos.concat(similares);
    if(!motivo) motivo='TambiГ©n te puede interesar';
  }

  // ordena por puntaje y saca los mejores
  candidatos.sort(function(a,b){ return b.score-a.score; });
  var top=[];
  var vistos={};
  candidatos.forEach(function(c){
    if(top.length>=8) return;
    if(vistos[c.p.nombre]) return;
    vistos[c.p.nombre]=true;
    top.push(c.p);
  });
  if(!top.length){ cont.innerHTML=''; return; }

  var html='<div style="border-top:1px solid var(--line);padding-top:16px">'
    +'<div style="font-weight:900;color:var(--az);font-size:.92rem;margin-bottom:10px">рҹӣҚпёҸ '+motivo+'</div>'
    +'<div class="sug-row">';
  top.forEach(function(s){
    var si=PRODUCTOS.indexOf(s);
    var mc=mejorCuota(s.venta);
    html+='<div class="sug-card" onclick="verDetalle('+si+')">'
      +'<div class="sf" style="padding:0">'+(s.foto?'<img src="'+s.foto+'">':ilustracion(s, '92px'))+'</div>'
      +'<div class="sb"><div class="sn">'+s.nombre+'</div>'
      +'<div class="sp">'+fmt(s.venta)+'</div>'
      +(mc?'<div class="sc">рҹ’і '+mc.n+' cuotas de '+fmt(mc.valor)+'</div>':'')
      +'</div></div>';
  });
  html+='</div></div>';
  cont.innerHTML=html;
}

/* ADMIN: cambiar/poner la foto de un producto */
function cambiarFotoProducto(idx){
  var inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange=function(ev){
    var file=ev.target.files&&ev.target.files[0]; if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var max=900,w=img.width,h=img.height;
        if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>max){w=Math.round(w*max/h);h=max;}
        var cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        var data=cv.toDataURL('image/jpeg',0.88);
        // sube a la nube (asГӯ no se pierde ni llena el espacio)
        toastCarrito('рҹ“ё Guardando fotoвҖҰ');
        comprimirFoto(data, function(chica){
          PRODUCTOS[idx].foto=chica;
          guardarFotoEnBanco(PRODUCTOS[idx].nombre, chica);   // рҹ–јпёҸ al banco
          guardarCatalogo();
          render();
          verDetalle(idx);
          toastCarrito('вң… Foto guardada');
        });
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

    +'<select id="ed_categoria" style="width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px;font-family:inherit;font-size:.88rem;outline:none;margin-bottom:12px;background:#fff">'
      +cats.map(function(c){ return '<option value="'+c+'"'+(c===catActual?' selected':'')+'>'+c+'</option>'; }).join('')
    +'</select>'
    // caracterГӯsticas
    +'<div style="font-size:.66rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">CaracterГӯsticas (pegГЎ acГЎ)</div>'
    +'<textarea id="ed_desc" placeholder="PegГЎ las caracterГӯsticas del producto..." style="width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px;font-family:inherit;font-size:.86rem;min-height:100px;outline:none;resize:vertical;margin-bottom:14px">'+(p.desc||'')+'</textarea>'
    +'<button onclick="guardarEdicion('+idx+')" style="width:100%;background:#10B981;color:#fff;border:none;border-radius:13px;padding:15px;font-size:.95rem;font-weight:900;cursor:pointer;font-family:inherit">вң… Guardar</button>'
    +'<button onclick="cerrarAdmin();verDetalle('+idx+')" style="width:100%;background:none;border:1.5px solid var(--line);color:var(--sub);border-radius:12px;padding:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px">Cancelar</button>';
  document.getElementById('adminOverlay').classList.add('on'); empujarPantalla('admin', cerrarAdmin);
}
function convCostoVenta(){
  var c=parseFloat(document.getElementById('ed_costo').value)||0;
  if(!c){ alert('PonГ© el costo primero.'); return; }
  document.getElementById('ed_venta').value=markupDeCosto(c);
}
function convVentaCosto(){
  var v=parseFloat(document.getElementById('ed_venta').value)||0;
  if(!v){ alert('PonГ© la venta primero.'); return; }
  // busca quГ© costo, con el markup, darГӯa esa venta
  var mk=CONFIG.markup||CONFIG_DEFAULT.markup;
  for(var i=0;i<mk.length;i++){
    var estimado=Math.round(v/(1+mk[i].pct/100));
    if(estimado<=mk[i].hasta){ document.getElementById('ed_costo').value=estimado; return; }
  }
  document.getElementById('ed_costo').value=Math.round(v/1.3);
}
function guardarEdicion(idx){
  var p=PRODUCTOS[idx]; if(!p)return;
  var g=function(id){var e=document.getElementById(id);return e?e.value.trim():'';};
  var nom=g('ed_nombre'); if(!nom){ alert('PonГ© el nombre.'); return; }
  var venta=parseFloat(g('ed_venta'))||p.venta;
  var costo=parseFloat(g('ed_costo'))||null;
  var cambiГіPrecio = venta!==p.venta;
  p.nombre=nom;
  p.venta=venta;
  if(costo) p.costo=costo;
  p.categoria=g('ed_categoria');
  p.desc=g('ed_desc');
  if(cambiГіPrecio) p.fechaPrecio=Date.now();   // precio nuevo = fecha nueva
  guardarCatalogo();
  render();
  cerrarAdmin();
  verDetalle(idx);
  alert('вң… Guardado. Ya se ve en la tienda.');
}
/* в•җв•җв•җв•җв•җв•җв•җ рҹ—‘пёҸ BORRAR VARIOS PRODUCTOS в•җв•җв•җв•җв•җв•җв•җ
   SeleccionГЎs de a uno, varios o todos, y borrГЎs de una vez. */
var _selBorrar = [];
function abrirBorrarVarios(){
  _selBorrar = [];
  pintarBorrarVarios();
}
function pintarBorrarVarios(){
  var ps = PRODUCTOS || [];
  if(!ps.length){
    document.getElementById('adminBody').innerHTML =
      '<div style="text-align:center;padding:26px 10px"><div style="font-size:2.4rem;margin-bottom:8px">рҹ“Ұ</div>'
      +'<div style="font-weight:900;color:var(--az)">No hay productos cargados</div></div>'
      +'<button onclick="abrirPanelSegunRol()" style="width:100%;background:none;border:1.5px solid var(--line);color:var(--sub);border-radius:11px;padding:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px">вҖ№ Volver</button>';
    return;
  }
  var filas = ps.map(function(p, i){
    var sel = _selBorrar.indexOf(i) >= 0;
    return '<div onclick="toggleSelBorrar('+i+')" style="display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--line);cursor:pointer;background:'+(sel?'#FEF2F2':'#fff')+'">'
      +'<div style="width:22px;height:22px;border-radius:6px;border:2px solid '+(sel?'#DC2626':'var(--line)')+';background:'+(sel?'#DC2626':'#fff')+';display:flex;align-items:center;justify-content:center;flex:0 0 auto;color:#fff;font-weight:900;font-size:.8rem">'+(sel?'вң“':'')+'</div>'
      +(p.foto?'<div style="width:38px;height:38px;border-radius:8px;background:url('+p.foto+') center/cover;flex:0 0 auto"></div>':'<div style="width:38px;height:38px;border-radius:8px;background:#F5F8FF;display:flex;align-items:center;justify-content:center;flex:0 0 auto">рҹ“Ұ</div>')
      +'<div style="flex:1;min-width:0"><div style="font-size:.8rem;font-weight:700;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.nombre+'</div>'
      +'<div style="font-size:.7rem;color:var(--sub)">'+fmt(p.venta||0)+'</div></div>'
      +'</div>';
  }).join('');
  var n = _selBorrar.length;
  document.getElementById('adminBody').innerHTML =
     '<div style="font-weight:900;color:var(--az);font-size:1.05rem;margin-bottom:4px">рҹ—‘пёҸ Borrar productos</div>'
    +'<div style="font-size:.78rem;color:var(--sub);line-height:1.5;margin-bottom:12px">TocГЎ los que querГ©s borrar. PodГ©s elegir de a uno, varios o todos.</div>'
    +'<div style="display:flex;gap:7px;margin-bottom:10px">'
      +'<button onclick="selBorrarTodos()" style="flex:1;background:#F5F8FF;border:1.5px solid var(--az);color:var(--az);border-radius:10px;padding:10px;font-size:.78rem;font-weight:800;cursor:pointer;font-family:inherit">вҳ‘пёҸ Todos</button>'
      +'<button onclick="selBorrarNinguno()" style="flex:1;background:#fff;border:1.5px solid var(--line);color:var(--sub);border-radius:10px;padding:10px;font-size:.78rem;font-weight:800;cursor:pointer;font-family:inherit">вң–пёҸ Ninguno</button>'
    +'</div>'
    +'<div style="background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;max-height:360px;overflow-y:auto;margin-bottom:12px">'+filas+'</div>'
    +'<button onclick="confirmarBorrarVarios()" style="width:100%;background:'+(n?'#DC2626':'#F1F3F7')+';color:'+(n?'#fff':'var(--sub)')+';border:none;border-radius:13px;padding:15px;font-size:.95rem;font-weight:900;cursor:'+(n?'pointer':'default')+';font-family:inherit">'
      +(n? 'рҹ—‘пёҸ Borrar '+n+' producto'+(n>1?'s':'') : 'ElegГӯ al menos uno')+'</button>'
    +'<button onclick="abrirPanelSegunRol()" style="width:100%;background:none;border:1.5px solid var(--line);color:var(--sub);border-radius:11px;padding:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px">вҖ№ Volver</button>';
}
function toggleSelBorrar(i){
  var k = _selBorrar.indexOf(i);
  if(k>=0) _selBorrar.splice(k,1); else _selBorrar.push(i);
  try{ sonar('tap'); }catch(e){}
  pintarBorrarVarios();
}
function selBorrarTodos(){ _selBorrar = (PRODUCTOS||[]).map(function(p,i){ return i; }); pintarBorrarVarios(); }
function selBorrarNinguno(){ _selBorrar = []; pintarBorrarVarios(); }
function confirmarBorrarVarios(){
  var n = _selBorrar.length;
  if(!n) return;
  var nombres = _selBorrar.slice(0,3).map(function(i){ return 'вҖў '+PRODUCTOS[i].nombre; }).join('\n');
  if(n>3) nombres += '\nвҖў вҖҰy '+(n-3)+' mГЎs';
  if(!confirm('ВҝBorrar '+n+' producto'+(n>1?'s':'')+'?\n\n'+nombres+'\n\nEsto no se puede deshacer.')) return;
  // borrar de mayor a menor Гӯndice para no correr las posiciones
  _selBorrar.sort(function(a,b){ return b-a; }).forEach(function(i){ PRODUCTOS.splice(i,1); });
  guardarCatalogo();
  try{ render(); }catch(e){}
  try{ sonar('exito'); }catch(e){}
  toastCarrito('рҹ—‘пёҸ '+n+' producto'+(n>1?'s':'')+' borrado'+(n>1?'s':''));
  _selBorrar = [];
  pintarBorrarVarios();
}

/* рҹ“‘ Duplicar un producto вҖ” para cargar variantes rГЎpido
   (mismo producto en otro color, otra medida, otro sabor) */
function duplicarProducto(idx){
  var p = PRODUCTOS[idx]; if(!p) return;
  var copia = JSON.parse(JSON.stringify(p));
  copia.id = 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  copia.nombre = p.nombre + ' (copia)';
  copia.fechaPrecio = Date.now();
  delete copia.delDia;      // que no queden dos productos del dГӯa
  PRODUCTOS.splice(idx+1, 0, copia);
  guardarCatalogo();
  try{ render(); }catch(e){}
  try{ sonar('agregar'); }catch(e){}
  toastCarrito('рҹ“‘ Duplicado вҖ” editalo y cambiale el nombre');
  setTimeout(function(){ try{ editarProducto(idx+1); }catch(e){} }, 400);
}

function borrarProducto(idx){
  var p=PRODUCTOS[idx]; if(!p)return;
  if(!confirm('ВҝBorrar "'+p.nombre+'" de la tienda?')) return;
  PRODUCTOS.splice(idx,1);
  guardarCatalogo();
  cerrar();
  render();
  alert('рҹ—‘пёҸ Producto borrado de la tienda.');
}
function cerrar(){ document.getElementById('overlay').classList.remove('on'); }

/* ===== Compartir con foto (misma lГіgica que tu tienda) ===== */
function armarMensaje(p){
  var lines=cuotasActivas().map(function(n){ return 'рҹ’і '+n+' cuotas fijas de '+fmt(valorCuota(p.venta,n)); });
  return '*'+(p.nombre||'PRODUCTO').toUpperCase()+'*\n\n'+lines.join('\n')+'\n\nвһЎпёҸ Contado: '+fmt(p.venta)+'\n@AmarangoElectro рҹҗқ';
}
function compartir(idx){
  var p=PRODUCTOS[idx]; if(!p)return;
  var msg=armarMensaje(p);
  if(p.foto && navigator.share){
    fetch(p.foto).then(function(r){return r.blob();}).then(function(blob){
      var file=new File([blob],'producto.jpg',{type:blob.type||'image/jpeg'});
      if(navigator.canShare && navigator.canShare({files:[file]})){ return navigator.share({files:[file], text:msg}); }
      return navigator.share({text:msg});
    }).catch(function(){ soloTexto(msg); });
    return;
  }
  if(navigator.share){ navigator.share({title:p.nombre, text:msg}).catch(function(){soloTexto(msg);}); }
  else soloTexto(msg);
}
function compartirActual(){ if(actualIdx!=null) compartir(actualIdx); }
function soloTexto(msg){ window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'); }

/* ===== Estados vacГӯos ===== */
function mostrarSetup(){
  document.getElementById('cats').innerHTML='';
  document.getElementById('section-h').textContent='';
  document.getElementById('grid-wrap').innerHTML='<div class="setup">'
    +'<div style="font-size:1rem;font-weight:900;margin-bottom:4px">рҹ”‘ Un solo paso para conectar tu tienda</div>'
    +'<div style="margin:10px 0">PegГЎ acГЎ abajo tu clave de Supabase (la copiГЎs de tu <b>calculadora.html</b>, lГӯnea que dice <code>SB_KEY</code>). Queda guardada en este telГ©fono, no la tenГ©s que poner nunca mГЎs.</div>'
    +'<input id="keyInput" placeholder="PegГЎ tu key acГЎ (empieza con eyJ...)" style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-family:inherit;font-size:.82rem;outline:none;margin-bottom:10px">'
    +'<button onclick="guardarKey()" style="width:100%;background:var(--nar);color:#fff;border:none;border-radius:11px;padding:13px;font-size:.9rem;font-weight:900;cursor:pointer;font-family:inherit">вң… Conectar tienda</button>'
    +'<div style="font-size:.66rem;color:var(--sub);margin-top:10px;text-align:center">La key es la misma que ya usГЎs en tu calculadora рҹҗқ</div>'
    +'</div>';
}
function guardarKey(){
  var v=(document.getElementById('keyInput').value||'').trim();
  if(!v){ alert('PegГЎ la key primero.'); return; }
  if(v.indexOf('eyJ')!==0){ if(!confirm('Esa key no parece del formato habitual (suele empezar con "eyJ"). ВҝLa pego igual?')) return; }
  try{ localStorage.setItem('ae_sb_key', v); }catch(e){}
  SB_KEY=v;
  document.getElementById('grid-wrap').innerHTML='<div class="estado"><div class="e-i">рҹҗқ</div>Conectando y bajando tus productosвҖҰ</div>';
  conectar();
}
function mostrarError(txt){
  var esAdmin = rolActual()==='admin';
  document.getElementById('grid-wrap').innerHTML='<div class="estado" style="padding:50px 24px">'
    +'<div class="e-i">рҹҗқ</div>'
    +'<div style="font-weight:900;color:var(--az);font-size:1rem;margin-bottom:6px">'+txt+'</div>'
    +(esAdmin
      ? '<button onclick="abrirCargarDirecto()" style="background:var(--nar);color:#fff;border:none;border-radius:12px;padding:13px 22px;font-weight:900;cursor:pointer;font-family:inherit;margin-top:14px">рҹ“Ұ Cargar mis productos</button>'
      : '<div style="font-size:.82rem;color:var(--sub);margin-top:6px">VolvГ© en un rato рҹҗқ</div>')
    +'</div>';
}

/* arranque */
conectar();

</script>
