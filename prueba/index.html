<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Tienda AmarangoElectro рҹҗқ</title>
<meta name="theme-color" content="#0B2D6B">
<!-- PWA: se instala como app, con el logo de cada tienda -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" id="appleIcon" href="">
<link rel="icon" id="favIcon" href="">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   TIENDA NUEVA вҖ” Bloque 1 (catГЎlogo prolijo, diseГұo sobrio)
   Header con degradГ© Amarango (como pidiГі Max).
   Cuotas 15/55/78 В· categorГӯas reales В· compartir con foto.
   ============================================================ */
:root{
  --az:#0B2D6B; --az2:#1e5bc8; --nar:#FF7A00;
  --bg:#F7F8FA; --wh:#fff; --txt:#141824; --sub:#7A8291; --line:#ECEEF2; --gr:#10B981;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);padding-bottom:78px}

/* BARRA INFERIOR fija (estilo Mercado Libre) */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:350;background:#fff;border-top:1px solid var(--line);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.tabbar button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-family:inherit;color:var(--sub);font-size:.6rem;font-weight:700;padding:4px 0}
.tabbar button .i{font-size:1.3rem;line-height:1}
.tabbar button.on{color:var(--nar)}

/* filas del menГә MГЎs */
.mas-row{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.mas-row span.ic{font-size:1.3rem;width:26px;text-align:center}
.mas-row span.tx{flex:1;font-size:.88rem;font-weight:600;color:var(--txt)}
.mas-row span.ar{color:var(--sub)}
.mas-sec{font-size:.68rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 4px}

/* SISTEMA DE VISTAS (una puerta a la vez) */
.vista{display:none}
.vista.on{display:block}

/* BARRA INFERIOR вҖ” las puertas grandes tipo app */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid var(--line);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 14px rgba(0,0,0,.06)}
.tabbar button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:inherit;color:var(--sub);font-size:.62rem;font-weight:700;padding:4px 0}
.tabbar button .i{font-size:1.35rem;line-height:1}
.tabbar button.on{color:var(--nar)}
.tabbar button.admin-tab{color:#c0c6d0}

/* pantalla "en construcciГіn" para las puertas que faltan */
.construccion{text-align:center;padding:70px 24px;color:var(--sub)}
.construccion .ci{font-size:3.2rem;margin-bottom:14px}
.construccion .ct{font-size:1.05rem;font-weight:900;color:var(--az);margin-bottom:6px}
.construccion .cs{font-size:.82rem;line-height:1.5}

/* HEADER con degradГ© (identidad Amarango, se mantiene) */
.top{position:sticky;top:0;z-index:100;background:linear-gradient(160deg,var(--az-osc) 0%,var(--az) 55%,var(--az2) 100%);padding:13px 16px 15px;box-shadow:0 2px 12px rgba(11,45,107,.2)}
.brand{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.brand .bee{font-size:1.35rem}
.brand h1{color:#fff;font-size:1.05rem;font-weight:900;letter-spacing:.2px}
.brand .tag{color:#ffb968;font-size:.6rem;font-weight:600;margin-left:auto;font-style:italic}
.searchbar{display:flex;align-items:center;gap:9px;background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.searchbar span{font-size:1rem;opacity:.5}
.searchbar input{flex:1;border:none;outline:none;font-size:.9rem;font-family:inherit;background:transparent;color:var(--txt)}

/* CATEGORГҚAS */
.cats{display:flex;gap:10px;overflow-x:auto;padding:14px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;min-width:62px}
.cat .ico{width:54px;height:54px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:1.55rem;border:1.5px solid var(--line);transition:all .18s}
.cat.on .ico{border-color:var(--az);box-shadow:0 0 0 3px rgba(11,45,107,.08)}
.cat span{font-size:.63rem;font-weight:700;color:var(--sub);text-align:center}
.cat.on span{color:var(--az)}

.section-h{padding:4px 16px 10px;font-size:.72rem;font-weight:900;color:var(--az);letter-spacing:.5px;text-transform:uppercase}

/* BARRA DE FILTROS */
.filtros{display:flex;gap:8px;padding:2px 14px 10px;align-items:center}
.filtros select,.filtros input{border:1.5px solid var(--line);border-radius:10px;padding:10px 11px;font-family:inherit;font-size:.76rem;color:var(--txt);outline:none;background:#fff}
.filtros select{flex:1.3;font-weight:600}
.filtros input{flex:1;min-width:0}
.filtros input:focus,.filtros select:focus{border-color:var(--nar)}
.f-oferta{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:10px 12px;font-size:.74rem;font-weight:800;color:var(--sub);cursor:pointer;font-family:inherit;white-space:nowrap}
.f-oferta.on{background:#FFF0E0;border-color:var(--nar);color:var(--nar)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px}

/* SALUDO por hora */
.saludo{margin:8px 14px 2px;display:flex;align-items:center;gap:10px}
.saludo .emo{font-size:1.6rem}
.saludo .txt .hola{font-size:1.02rem;font-weight:900;color:var(--az);line-height:1.1}
.saludo .txt .sub{font-size:.68rem;color:var(--sub);font-weight:600;margin-top:1px}

/* PRODUCTO DEL DГҚA вҖ” tarjeta grande destacada */
.pdd{margin:6px 14px 4px;background:linear-gradient(160deg,#0a1a3a,var(--az));border-radius:18px;padding:16px;display:flex;gap:14px;align-items:center;position:relative;overflow:hidden;cursor:pointer;box-shadow:0 4px 16px rgba(11,45,107,.22)}
.pdd .tag{position:absolute;top:0;right:0;background:var(--nar);color:#fff;font-size:.56rem;font-weight:900;padding:5px 12px;border-radius:0 0 0 12px;letter-spacing:.5px}
.pdd .foto{width:96px;height:96px;flex:0 0 auto;border-radius:12px;background:#fff center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:2.4rem}
.pdd .info{flex:1;min-width:0}
.pdd .info .n{color:#fff;font-size:.92rem;font-weight:800;line-height:1.2;margin-bottom:6px}
.pdd .info .cv{color:#ffb968;font-size:1.5rem;font-weight:900;line-height:1}
.pdd .info .cn{color:var(--gr);font-size:.66rem;font-weight:700;margin-top:1px}
.pdd .info .ct{color:rgba(255,255,255,.55);font-size:.62rem;margin-top:3px}

/* DESTACADOS вҖ” fila horizontal */
.dest-row{display:flex;gap:11px;overflow-x:auto;padding:2px 14px 6px;scrollbar-width:none}
.dest-row::-webkit-scrollbar{display:none}
.dest-card{flex:0 0 auto;width:140px;background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;cursor:pointer}
.dest-card .dfoto{height:96px;background:#FAFBFC center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:2rem;border-bottom:1px solid var(--line);position:relative}
.dest-card .dstar{position:absolute;top:5px;left:5px;background:var(--nar);color:#fff;font-size:.5rem;font-weight:900;padding:2px 6px;border-radius:5px}
.dest-card .dbody{padding:8px 10px 10px}
.dest-card .dn{font-size:.68rem;font-weight:700;color:var(--txt);line-height:1.25;height:34px;overflow:hidden;margin-bottom:4px}
.dest-card .dcv{font-size:.9rem;font-weight:900;color:var(--nar)}
.dest-card .dcn{font-size:.55rem;color:var(--gr);font-weight:700}

/* TARJETA (sobria) */
.card{background:#fff;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--line);transition:transform .15s}
.card:active{transform:scale(.985)}
.card .ph{aspect-ratio:1/1;background:#fff;display:flex;align-items:center;justify-content:center;font-size:3.2rem;position:relative;border-bottom:1px solid var(--line);cursor:pointer;background-size:contain;background-repeat:no-repeat;background-position:center}
.card .fav{position:absolute;top:6px;right:6px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);border:none;font-size:.9rem;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.15);line-height:1}
.card .badge{position:absolute;top:6px;left:6px;background:var(--nar);color:#fff;font-size:.52rem;font-weight:800;padding:3px 7px;border-radius:6px;letter-spacing:.2px}
.card .body{padding:10px 12px 12px;display:flex;flex-direction:column;flex:1}
.card .marca{font-size:.55rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.card .nom{font-size:.76rem;font-weight:700;color:var(--txt);line-height:1.25;margin:2px 0 6px;min-height:30px;cursor:pointer;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .cuota-v{font-size:1.15rem;font-weight:900;color:var(--nar);line-height:1.05}
.card .cuota-n{font-size:.6rem;font-weight:700;color:var(--gr);margin-bottom:2px}
.card .contado{font-size:.64rem;color:var(--sub);margin-bottom:8px}
.card .share{margin-top:auto;width:100%;background:#25D366;color:#fff;border:none;border-radius:9px;padding:9px;font-size:.72rem;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}

.estado{text-align:center;padding:44px 20px;color:var(--sub)}
.estado .e-i{font-size:2.6rem;margin-bottom:10px}
.setup{margin:14px;background:#FFF9F0;border:1.5px dashed var(--nar);border-radius:14px;padding:16px;font-size:.78rem;color:var(--az);line-height:1.55}
.setup b{color:var(--nar)}
.setup code{background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:.72rem}

/* DETALLE */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(2,8,20,.55);backdrop-filter:blur(3px);align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:520px;border-radius:22px 22px 0 0;max-height:88vh;overflow-y:auto;animation:up .28s cubic-bezier(.2,.9,.3,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-head{background:linear-gradient(160deg,var(--az-osc),var(--az));padding:18px;position:sticky;top:0;z-index:2}
/* botГіn cerrar BIEN VISIBLE (antes nadie sabГӯa dГіnde tocar) */
.sheet-head .x{position:absolute;top:12px;right:12px;width:40px;height:40px;border-radius:50%;background:#fff;border:none;color:var(--az);font-size:1.25rem;font-weight:900;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.3);z-index:6;line-height:1;display:flex;align-items:center;justify-content:center}
.sheet-head .ph-big{width:100%;height:180px;border-radius:14px;background:#0a1a3a center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:3.5rem;margin-bottom:10px}
.sheet-head .nom{color:#fff;font-size:1.15rem;font-weight:900;text-align:center}

/* FOTO GRANDE del producto (estilo Mercado Libre) вҖ” entera, sin recortar, en alta */
.foto-big{width:100%;height:290px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.foto-big img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.foto-big .sinfoto{font-size:4rem;opacity:.25}

/* Productos sugeridos */
.sug-row{display:flex;gap:10px;overflow-x:auto;padding:2px 0 6px;scrollbar-width:none}
.sug-row::-webkit-scrollbar{display:none}
.sug-card{flex:0 0 auto;width:132px;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer}
.sug-card .sf{height:92px;background:#FAFBFC;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line);overflow:hidden}
.sug-card .sf img{max-width:100%;max-height:100%;object-fit:contain}
.sug-card .sb{padding:8px 9px 10px}
.sug-card .sn{font-size:.66rem;font-weight:700;color:var(--txt);line-height:1.25;height:32px;overflow:hidden;margin-bottom:3px}
.sug-card .sp{font-size:.82rem;font-weight:900;color:var(--nar)}
.sug-card .sc{font-size:.56rem;color:var(--gr);font-weight:700}
.sheet-body{padding:16px 16px 22px}
.precio-box{background:#fff;border-radius:14px;padding:14px;text-align:center;border:1px solid var(--line);margin-bottom:8px}
.precio-box .lbl{font-size:.62rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px}
.precio-box .val{font-size:1.7rem;font-weight:900;color:var(--az);margin-top:2px}
.cuota-title{font-size:.66rem;font-weight:900;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin:14px 2px 8px}
.cuota-card{border-radius:13px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cuota-card.c2{background:#FEF9C3;border-left:4px solid #EAB308}
.cuota-card.c4{background:#FFF0E0;border-left:4px solid var(--nar)}
.cuota-card.c6{background:#EDE9FE;border-left:4px solid #7C3AED}
.cuota-card .c-n{font-size:.88rem;font-weight:900;color:var(--az)}
.cuota-card .c-v{font-size:1.12rem;font-weight:900;color:var(--az)}
.retira{background:#EEF2FF;border-radius:11px;padding:11px 13px;font-size:.68rem;color:var(--az);font-weight:700;margin-top:6px;display:flex;gap:7px;align-items:flex-start}
.wa-btn{width:100%;margin-top:14px;background:#25D366;color:#fff;border:none;border-radius:13px;padding:14px;font-size:.9rem;font-weight:900;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
@keyframes latir{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
</style>
</head>
<body>
<!-- в•җв•җв•җ VERSIГ“N: tienda-nueva В· 15-jul-2026 В· base membresГӯa в•җв•җв•җ -->

<!-- Panel de AYUDA -->
<div class="overlay" id="ayudaOverlay" onclick="if(event.target===this)cerrarAyuda()">
  <div class="sheet">
    <div class="sheet-head">
      <button class="x" onclick="cerrarAyuda()">вң•</button>
      <div class="nom">вқ“ Ayuda</div>
    </div>
    <div class="sheet-body" id="ayudaBody"></div>
  </div>
</div>

<div class="top">
  <div class="brand">
    <span class="bee" id="beeLogo" onclick="toqueAbeja()" style="cursor:pointer">рҹҗқ</span>
    <h1>AmarangoElectro</h1>
    <button id="favBtn" onclick="verFavoritos()" style="margin-left:auto;background:rgba(255,255,255,.15);border:none;border-radius:20px;padding:6px 12px;color:#fff;font-size:.8rem;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px">вқӨпёҸ <span id="favCount">0</span></button>
  </div>
  <div class="searchbar">
    <span>рҹ”Қ</span>
    <input id="buscador" placeholder="Buscar productos..."  oninput="render()">
  </div>
</div>

<div class="vista on" id="vista-tienda">
<div class="cats" id="cats"></div>
<div class="filtros" id="filtros" style="display:none">
  <select id="orden" onchange="render()">
    <option value="">Ordenar porвҖҰ</option>
    <option value="barato">рҹ’ө Cuota mГЎs baja primero</option>
    <option value="caro">рҹ’° Cuota mГЎs alta primero</option>
    <option value="oferta">рҹ”Ҙ Ofertas primero</option>
  </select>
  <input id="tope" type="number" inputmode="numeric" placeholder="Cuota hasta $" oninput="render()">
  <button id="btnOfertas" class="f-oferta" onclick="toggleSoloOfertas()">рҹ”Ҙ Ofertas</button>
</div>
<div id="progreso-wrap"></div>
<div id="banner-wrap"></div>
<div id="saludo-wrap"></div>
<div id="destacados-wrap"></div>
<div class="section-h" id="section-h">CargandoвҖҰ</div>
<div id="grid-wrap"></div>
</div><!-- fin vista-tienda -->

<!-- PANEL DEL DUEГ‘O (oculto вҖ” se entra tocando 5 veces la abeja + clave) -->
<div class="overlay" id="adminOverlay" onclick="if(event.target===this)cerrarAdmin()">
  <div class="sheet">
    <div class="sheet-head">
      <button class="x" onclick="cerrarAdmin()">вң•</button>
      <div class="nom">рҹ”’ Panel del dueГұo</div>
    </div>
    <div class="sheet-body" id="adminBody"></div>
  </div>
</div>

<!-- DETALLE -->
<div class="overlay" id="overlay" onclick="if(event.target===this)cerrar()">
  <div class="sheet">
    <div style="position:sticky;top:0;z-index:3;background:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)">
      <button onclick="cerrar()" style="width:38px;height:38px;border-radius:50%;background:#F0F2F5;border:none;color:var(--az);font-size:1.2rem;cursor:pointer;font-weight:900;display:flex;align-items:center;justify-content:center;flex:0 0 auto">вҶҗ</button>
      <span style="flex:1;font-size:.78rem;font-weight:700;color:var(--sub)">Volver a la tienda</span>
      <button onclick="cerrar()" style="width:38px;height:38px;border-radius:50%;background:#FEF2F2;border:1.5px solid #FECACA;color:#DC2626;font-size:1.05rem;cursor:pointer;font-weight:900;flex:0 0 auto">вң•</button>
    </div>
    <div style="background:#fff;padding:0 0 6px">
      <div id="d-ph"></div>
    </div>
    <div class="sheet-body">
      <div id="d-nom" style="font-size:1.15rem;font-weight:900;color:var(--az);line-height:1.25;margin-bottom:8px"></div>
      <div class="precio-box"><div class="lbl">рҹ’° Precio contado</div><div class="val" id="d-precio"></div></div>
      <div class="cuota-title">рҹ“… Planes de cuotas</div>
      <div id="d-cuotas"></div>
      <div class="retira"><span>вӯҗ</span><span>RetirГЎs pagando solo la 1ra cuota ese mismo dГӯa.</span></div>
      <div id="d-acciones" style="margin-top:14px"></div>
      <div id="d-sugeridos" style="margin-top:20px"></div>
      <div id="d-sugeridos" style="margin-top:22px"></div>
    </div>
  </div>
</div>

<!-- Panel MГҒS (menГә, estilo Mercado Libre) -->
<div class="overlay" id="masOverlay" onclick="if(event.target===this)cerrarMas()">
  <div class="sheet">
    <div class="sheet-head">
      <button class="x" onclick="cerrarMas()">вң•</button>
      <div class="nom">вҳ° MГЎs</div>
    </div>
    <div class="sheet-body" id="masBody"></div>
  </div>
</div>

<!-- BOTГ“N FLOTANTE рҹҗқ вҖ” atajo a cargar productos. SOLO lo ve el admin. -->
<button id="beeFab" onclick="abrirCargarDirecto()" style="display:none;position:fixed;bottom:88px;right:16px;z-index:340;width:60px;height:60px;border-radius:50%;background:#fff;border:3px solid var(--nar);font-size:1.9rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);padding:0;line-height:1">рҹҗқ</button>

<!-- VISOR DE FOTO a pantalla completa (tocГЎs la foto y se ve entera) -->
<div id="fotoZoom" onclick="cerrarZoom()" style="display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.93);align-items:center;justify-content:center;flex-direction:column;padding:16px">
  <button onclick="cerrarZoom()" style="position:absolute;top:16px;right:16px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.4rem;font-weight:900;cursor:pointer;z-index:2">вң•</button>
  <img id="fotoZoomImg" src="" style="max-width:100%;max-height:82vh;object-fit:contain;border-radius:8px">
  <div id="fotoZoomNom" style="color:#fff;font-size:.86rem;font-weight:700;text-align:center;margin-top:14px;max-width:90%"></div>
  <div style="color:rgba(255,255,255,.5);font-size:.72rem;margin-top:6px">TocГЎ en cualquier lado para cerrar</div>
</div>

<!-- Panel CARRITO -->
<div class="overlay" id="carritoOverlay" onclick="if(event.target===this)cerrarCarrito()">
  <div class="sheet">
    <div class="sheet-head">
      <button class="x" onclick="cerrarCarrito()">вң•</button>
      <div class="nom">рҹӣ’ Mi carrito</div>
    </div>
    <div class="sheet-body" id="carritoBody"></div>
  </div>

/* в•җв•җв•җв•җв•җв•җв•җ рҹ“ё FOTOS вҖ” comprimidas para que entren muchas y no se pierdan в•җв•җв•җв•җв•җв•җв•җ
   Se guardan con el catГЎlogo (en la nube de Supabase, tabla tienda_catalogo).
   EstГЎn MUY comprimidas para que entren cientos de productos sin llenar el espacio. */
var FOTO_MAX_PX = 520;      // tamaГұo mГЎximo (suficiente para verse bien)
var FOTO_CALIDAD = 0.72;    // calidad (se ve bien y pesa poco)

/* Comprime una foto para guardarla */
function comprimirFoto(dataUrl, cb){
  var img=new Image();
  img.onload=function(){
    var w=img.width, h=img.height;
    if(w>h && w>FOTO_MAX_PX){ h=Math.round(h*FOTO_MAX_PX/w); w=FOTO_MAX_PX; }
    else if(h>FOTO_MAX_PX){ w=Math.round(w*FOTO_MAX_PX/h); h=FOTO_MAX_PX; }
    var cv=document.createElement('canvas');
    cv.width=w; cv.height=h;
    var ctx=cv.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);   // fondo blanco (los PNG con transparencia pesan mГЎs)
    ctx.drawImage(img,0,0,w,h);
    cb(cv.toDataURL('image/jpeg', FOTO_CALIDAD));
  };
  img.onerror=function(){ cb(dataUrl); };
  img.src=dataUrl;
}

/* CuГЎnto pesa el catГЎlogo (para avisar antes de que se llene) */
function pesoCatalogo(){
  try{
    var txt=JSON.stringify(PRODUCTOS);
    return Math.round(txt.length/1024/1024*10)/10;   // en MB
  }catch(e){ return 0; }
}
/* Achica TODAS las fotos que estГ©n pesadas */

  if(!confirm('рҹ“ё EncontrГ© '+pesadas.length+' fotos pesadas.\n\nLas voy a achicar para que tu catГЎlogo no se llene y no pierdas nada.\n\nSe van a ver igual de bien. ВҝDale?')) return;

  var hechas=0, total=pesadas.length;
  var antes=pesoCatalogo();

    if(!pesadas.length){
      sonar('exito');
  guardarCatalogo();

    }
    var p=pesadas.shift();
    if(box) box.innerHTML='<div style="text-align:center;padding:50px 20px"><div style="font-size:2.6rem;margin-bottom:12px">рҹ“ё</div>'
      +'<div style="font-weight:900;color:var(--az);font-size:1rem;margin-bottom:6px">Optimizando fotosвҖҰ</div>'
      +'<div style="font-size:.86rem;color:var(--sub)">'+(hechas+1)+' de '+total+'</div>'
      +'<div style="background:#F0F4FF;border-radius:6px;height:8px;margin-top:14px;overflow:hidden"><div style="width:'+Math.round((hechas/total)*100)+'%;height:100%;background:var(--nar);transition:width .3s"></div></div>'
      +'<div style="font-size:.72rem;color:var(--sub);margin-top:10px">No cierres esta pantalla рҹҗқ</div></div>';
    comprimirFoto(p.foto, function(nueva){
      p.foto=nueva;

      if(hechas%5===0) guardarCatalogo();

/* в•җв•җв•җв•җв•җв•җв•җ рҹ“ұ PWA вҖ” que se instale como app, con el logo de cada tienda в•җв•җв•җв•җв•җв•җв•җ
   Chrome exige DOS cosas para instalar una app de verdad:
   1) un manifest vГЎlido (no blob)
   2) un Service Worker registrado
   Sin el service worker, solo hace un "acceso directo" con el Гӯcono de Chrome. */
function registrarServiceWorker(){
  // вҡ пёҸ NO registramos sw.js: ese archivo no existe (daba 404) y era la causa
  // de que la tienda se quedara con versiones viejas. Sin Service Worker,
  // la tienda carga SIEMPRE la Гәltima versiГіn directo del servidor.
  if(!('serviceWorker' in navigator)) return;
  // Limpieza: si un intento anterior dejГі un SW roto instalado, lo damos de baja
  // y borramos su cachГ©. Esto libera a los celulares que quedaron "atascados".
  try{
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){ r.unregister(); });
    }).catch(function(){});
    if('caches' in window){
      caches.keys().then(function(keys){
        keys.forEach(function(k){ caches.delete(k); });
      }).catch(function(){});
    }
  }catch(e){}
}
registrarServiceWorker();

    + 'рҹ‘ү ' + url;

  if(navigator.share){

}

/* рҹ”„ BotГіn manual "Actualizar app" вҖ” red de seguridad definitiva.
   Borra TODO el cachГ©, da de baja el SW y recarga limpio. Nunca mГЎs reinstalar. */
async function forzarActualizacion(){
  try{ toastCarrito && toastCarrito('рҹ”„ ActualizandoвҖҰ'); }catch(e){}
  try{
    if('caches' in window){
      const claves = await caches.keys();
      await Promise.all(claves.map(k => caches.delete(k)));
    }
  }catch(e){ console.warn(e); }
  try{
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
  }catch(e){ console.warn(e); }
  // recarga saltando la cachГ© del navegador
  location.reload(true);
}

function armarManifest(){
  if(!CONFIG) return;
  var neg=CONFIG.negocio||'Mi Tienda';
  var col=CONFIG.colorPrincipal||'#0B2D6B';
  var icono=CONFIG.logo || iconoAbeja(col, CONFIG.colorAcento||'#FF7A00');

  // los Гӯconos visuales (iOS y favicon)
  var ai=document.getElementById('appleIcon'); if(ai) ai.href=icono;
  var fi=document.getElementById('favIcon'); if(fi) fi.href=icono;
  var tc=document.querySelector('meta[name="theme-color"]'); if(tc) tc.setAttribute('content', col);
  document.title=neg;

  // вҡ пёҸ El manifest REAL es manifest.json (archivo en el servidor).
  // Chrome NO acepta manifests generados al vuelo (data: o blob:) para instalar apps.
}

/* Si no cargГі logo, dibuja una abeja con los colores de la tienda */
function iconoAbeja(col1, col2){
  var c=document.createElement('canvas');
  c.width=512; c.height=512;
  var x=c.getContext('2d');
  x.fillStyle=col1; x.fillRect(0,0,512,512);
  x.font='300px serif'; x.textAlign='center'; x.textBaseline='middle';
  x.fillText('рҹҗқ', 256, 276);
  return c.toDataURL('image/png');
}

/* рҹ”’ Plan de esta tienda: 'basico' (solo contado) o 'full' (con cuotas Amarango).
   ADEMГҒS: las cuotas estГЎn OCULTAS por defecto en todas las tiendas.
   Solo se muestran si alguien las activГі con el PIN de dueГұo. */
var PLAN_TIENDA = 'full';
function tieneCuotas(){
  // рҹ“Ұ en modo MAYORISTA no hay cuotas: se vende al contado
  if(typeof esMayorista==='function' && esMayorista()) return false;
  // el plan tiene que permitirlo...
  var planOk = (TIENDA==='amarango') || (CONFIG && CONFIG.duenoPlataforma===true) || (PLAN_TIENDA==='full');
  if(!planOk) return false;
  // ...y ademГЎs el dueГұo tiene que haberlas activado con la clave
  return (CONFIG && CONFIG.cuotasActivadas===true);
}

function verificarSuscripcion(cb){
  // la tienda de Max nunca se bloquea
  if(TIENDA==='amarango'){ cb(true); return; }
  if(!sb){ cb(true); return; }   // sin conexiГіn: la deja pasar (no la castigues por mala seГұal)

  sb.from('amarango_subs').select('datos').eq('id','lista').maybeSingle()
    .then(function(r){
      var lista=(r && r.data && r.data.datos) ? r.data.datos : [];
      var mia=lista.find(function(s){
        return String(s.tienda||'').toLowerCase()===TIENDA;
      });
      // si no estГЎ en la lista вҶ’ la deja pasar (todavГӯa no la diste de alta)
      if(!mia){ cb(true); return; }
      // рҹ”’ guardo quГ© plan tiene esta tienda (basico = solo contado, full = con cuotas)
      try{
        var planAntes = PLAN_TIENDA;
        PLAN_TIENDA = mia.plan || 'basico';
        // si cambiГі respecto de lo que asumimos, recalculo planes y repinto
        if(planAntes !== PLAN_TIENDA){
          try{ aplicarConfig(); }catch(e){}
          try{ render(); }catch(e){}
        }
      }catch(e){}
      // si estГЎ y figura como vencida вҶ’ BLOQUEAR
      cb(mia.estado==='ok');
    })
    .catch(function(){ cb(true); });   // ante la duda, la deja pasar
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   рҹҸӘ MULTI-TIENDA вҖ” el motor de Amarango
   Cada tienda tiene su CГ“DIGO, y sus datos se guardan separados.
   Se elige con la direcciГіn:  ...tienda-nueva.html?t=marcelo
   Sin cГіdigo = 'amarango' (la tienda de Max, por compatibilidad).
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function tiendaID(){
  // рҹ”’ La tienda se detecta SOLA. Dos formas, en este orden:
  //    1) Por la CARPETA:  /marcelo/  вҶ’  tienda "marcelo"   (asГӯ cada una es app propia)
  //    2) Por el ?t=:      ?t=marcelo вҶ’  tienda "marcelo"   (compatibilidad)
  // El MISMO archivo funciona en todas las carpetas. No hay que editarlo nunca.
  try{
    // 1) la carpeta manda
    var ruta = window.location.pathname.split('/').filter(Boolean);
    // saca el nombre del archivo (index.html, tienda-nueva.htmlвҖҰ)
    if(ruta.length && /\.html?$/i.test(ruta[ruta.length-1])) ruta.pop();
    var carpeta = ruta.length ? ruta[ruta.length-1].toLowerCase().replace(/[^a-z0-9_-]/g,'') : '';
    // ignoro carpetas tГ©cnicas
    if(carpeta && ['docs','assets','img','js','css','public'].indexOf(carpeta)<0) return carpeta;

    // 2) si no hay carpeta, el ?t=
    var p=new URLSearchParams(window.location.search);
    var t=(p.get('t')||'').toLowerCase().replace(/[^a-z0-9_-]/g,'');
    if(t) return t;
  }catch(e){}
  return 'amarango';   // raГӯz sin nada вҶ’ la tienda de Max
}

/* в•җв•җв•җв•җв•җв•җв•җ рҹ”Ҡ SONIDOS DE LA TIENDA в•җв•җв•җв•җв•җв•җв•җ
   4 sonidos generados al vuelo (no pesan nada, no necesitan internet).
   El cliente los puede apagar. */
var _audioCtx = null;
function _ctx(){
  try{
    if(!_audioCtx){ _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    if(_audioCtx.state==='suspended') _audioCtx.resume();
    return _audioCtx;
  }catch(e){ return null; }
}
function sonidoActivo(){
  try{ return localStorage.getItem(lsKey('ae_sonido'))!=='off'; }catch(e){ return true; }
}
function toggleSonido(){
  var on = sonidoActivo();
  try{ localStorage.setItem(lsKey('ae_sonido'), on?'off':'on'); }catch(e){}
  if(!on) sonar('tap');    // al prenderlo, suena para confirmar
  return !on;
}
/* Toca una nota simple */
function _nota(freq, dur, tipo, vol, delay){
  var ctx=_ctx(); if(!ctx) return;
  var o=ctx.createOscillator(), g=ctx.createGain();
  o.type = tipo||'sine';
  o.frequency.value = freq;
  var t0 = ctx.currentTime + (delay||0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol||0.14, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+(dur||0.12));
  o.connect(g); g.connect(ctx.destination);
  o.start(t0); o.stop(t0+(dur||0.12)+0.02);
}
/* Los 4 sonidos de la tienda */
function sonar(cual){
  if(!sonidoActivo()) return;
  try{
    switch(cual){
      // 1) TAP вҖ” toque suave, para navegar (categorГӯas, tabs, abrir cosas)
      case 'tap':
        _nota(660, 0.07, 'sine', 0.10);
        break;
      // 2) AGREGAR вҖ” dos notas que suben, para sumar al carrito / favoritos
      case 'agregar':
        _nota(587, 0.09, 'triangle', 0.13);
        _nota(880, 0.13, 'triangle', 0.12, 0.07);
        break;
      // 3) ГүXITO вҖ” acorde alegre, para guardar / pedido enviado / listo
      case 'exito':
        _nota(523, 0.11, 'sine', 0.13);
        _nota(659, 0.11, 'sine', 0.12, 0.09);
        _nota(784, 0.20, 'sine', 0.13, 0.18);
        break;
      // 4) ERROR вҖ” dos notas bajas, para avisos y cosas que no se pueden
      case 'error':
        _nota(330, 0.10, 'square', 0.09);
        _nota(220, 0.18, 'square', 0.09, 0.09);
        break;
    }
  }catch(e){}
}

/* рҹ”ў Cantidad desde la tarjeta (para llevar varios de una) */
function cantTarjeta(idx, delta, ev){
  if(ev) ev.stopPropagation();
  var i=document.getElementById('qt'+idx); if(!i) return;
  var p=PRODUCTOS[idx];
  var paso = (p && p.porBulto>1) ? 1 : 1;
  var min = (p ? minimoProducto(p) : 1) || 1;
  var v = (parseInt(i.value)||min) + (delta*paso);
  if(v < min) v = min;
  i.value = v;
  try{ sonar('tap'); }catch(e){}
}
function agregarConCantidad(idx, ev){
  if(ev) ev.stopPropagation();
  var i=document.getElementById('qt'+idx);
  var n=parseInt(i?i.value:1)||1;
  var p=PRODUCTOS[idx];
  var min=minimoProducto(p)||1;
  if(n<min) n=min;
  for(var k=0;k<n;k++){ agregarAlCarritoSilencioso(idx); }
  try{ sonar('agregar'); }catch(e){}
  toastCarrito('вң… '+n+' x '+p.nombre+' al carrito');
  actualizarBadgeCarrito();
}
/* agrega sin toast ni sonido (para sumar de a varios) */
function agregarAlCarritoSilencioso(idx){
  var p=PRODUCTOS[idx]; if(!p)return;
  var c=cargarCarrito();
  var vr=(p.variantes && p.variantes.length)?(_varElegida||p.variantes[0]):'';
  var id=idProd(p)+(vr?'::'+vr:'');
  var ya=c.find(function(x){return x.id===id;});
  if(ya){ ya.cant=(ya.cant||1)+1; }
  else { c.push({id:id, nombre:p.nombre+(vr?' ('+vr+')':''), venta:p.venta, foto:p.foto||'', cant:1, variante:vr, escala:p.escala||null, porBulto:p.porBulto||0}); }
  c.forEach(function(x){
    if(x.escala && x.escala.length){
      var pr=x.venta;
      for(var j=0;j<x.escala.length;j++){ if((x.cant||1)>=x.escala[j].desde) pr=x.escala[j].precio; }
      x.precioAplicado=pr;
    }
  });
  guardarCarrito(c);
}

function agregarAlCarrito(idx){
  var p=PRODUCTOS[idx]; if(!p)return;
  var c=cargarCarrito();
  // рҹ‘• si tiene variantes, cada opciГіn es un Гӯtem distinto
  var vr = (p.variantes && p.variantes.length) ? (_varElegida || p.variantes[0]) : '';
  var id=idProd(p) + (vr ? '::'+vr : '');
  // рҹ“Ұ mayorista: arranca en el mГӯnimo del producto
  var paso = minimoProducto(p);
  var ya=c.find(function(x){return x.id===id;});
  if(ya){ ya.cant=(ya.cant||1)+paso; }
  else { c.push({ id:id, nombre:p.nombre + (vr ? ' ('+vr+')' : ''), venta:p.venta, foto:p.foto||'', cant:paso, variante:vr, escala:p.escala||null, porBulto:p.porBulto||0 }); }
  // recalcular precio unitario segГәn cantidad (escala mayorista)
  c.forEach(function(x){
    if(x.escala && x.escala.length){
      var pr=x.venta;
      for(var i=0;i<x.escala.length;i++){ if((x.cant||1) >= x.escala[i].desde) pr=x.escala[i].precio; }
      x.precioAplicado = pr;
    }
  });
  guardarCarrito(c);
  sonar('agregar');
  toastCarrito('вң… Agregado'+(paso>1?' ('+paso+' u.)':'')+(vr?' В· '+vr:''));
}
function quitarDelCarrito(id){
  var c=cargarCarrito().filter(function(x){return x.id!==id;});
  guardarCarrito(c); abrirCarrito();
}
function cambiarCant(id, delta){
  var c=cargarCarrito();
  var it=c.find(function(x){return x.id===id;});
  if(!it)return;
  it.cant=(it.cant||1)+delta;
  if(it.cant<1){ c=c.filter(function(x){return x.id!==id;}); }
  // рҹ“Ұ recalcular precio unitario segГәn la escala mayorista
  c.forEach(function(x){
    if(x.escala && x.escala.length){
      var pr=x.venta;
      for(var i=0;i<x.escala.length;i++){ if((x.cant||1) >= x.escala[i].desde) pr=x.escala[i].precio; }
      x.precioAplicado = pr;
    }
  });
  guardarCarrito(c); abrirCarrito();
}

/* BotГіn rГЎpido: pone un % en la categorГӯa sin tipear */
function setPctCat(i, v){
  var e=document.getElementById('pc_mk_'+i);
  if(e){ e.value=v; e.style.background='#F0FDF4'; setTimeout(function(){ e.style.background=''; },400); }

function guardarPorCategoria(){
  var cats = CONFIG.categorias || [];
  CONFIG.porCategoria = CONFIG.porCategoria || {};
  cats.forEach(function(cat,i){
    var mk=document.getElementById('pc_mk_'+i);
    var pb=document.getElementById('pc_pb_'+i);
    var mc=document.getElementById('pc_mc_'+i);
    CONFIG.porCategoria[cat] = {
      markup: mk?(parseFloat(mk.value)||0):0,
      porBulto: pb?(parseInt(pb.value)||0):0,
      minCant: mc?(parseInt(mc.value)||0):0
    };
  });
  guardarConfig();
  toastCarrito('вң… Ajustes guardados');
  abrirPorCategoria();
}
/* Redondeo inteligente: fino en productos baratos (golosinas, librerГӯa),
   grueso en caros (electro). AsГӯ el markup se respeta en todos los rubros. */
function redondearPrecio(v){
  if(v < 2000)   return Math.round(v/10)*10;      // golosinas, kiosco
  if(v < 20000)  return Math.round(v/50)*50;      // comida, librerГӯa
  if(v < 100000) return Math.round(v/100)*100;    // ropa, indumentaria
  return Math.round(v/500)*500;                   // electro
}
/* Markup a aplicar segГәn la categorГӯa del producto (si no tiene, usa el general) */
function markupDeCategoria(cat, costo){
  var d = (CONFIG.porCategoria||{})[cat];
  if(d && d.markup>0) return redondearPrecio(costo*(1+d.markup/100));
  return markupDeCosto(costo);   // el markup general por tramos
}

   Se puede copiar, mandar por WhatsApp o descargar como archivo. */
function armarListaPrecios(){
  var visibles=PRODUCTOS.filter(function(p){ return p.visible!==false; });
  var porCat={};
  visibles.forEach(function(p){ var c=catProd(p)||'Otros'; (porCat[c]=porCat[c]||[]).push(p); });
  var hoy=new Date().toLocaleDateString('es-AR');
  var txt='рҹ“Ӣ LISTA DE PRECIOS вҖ” '+(CONFIG.negocio||'Mi tienda')+'\n';
  txt+='Actualizada: '+hoy+'\n';
  if(esMayorista() && CONFIG.mayorista.minimoUnidades>0) txt+='Pedido mГӯnimo: '+CONFIG.mayorista.minimoUnidades+' unidades\n';
  txt+='в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n\n';
  Object.keys(porCat).sort().forEach(function(cat){
    txt+='в–Қ'+cat.toUpperCase()+'\n';
    porCat[cat].forEach(function(p){
      txt+='вҖў '+p.nombre+'\n';
      if(p.porBulto>1) txt+='   '+palabraBulto()+' x'+p.porBulto+' u.\n';
      if(p.escala && p.escala.length){
        txt+='   1+ : '+fmt(p.venta)+'\n';
        p.escala.forEach(function(t){ txt+='   '+t.desde+'+ : '+fmt(t.precio)+'\n'; });
      } else {
        txt+='   '+fmt(p.venta)+(p.minCant>1?'  (mГӯn. '+p.minCant+' u.)':'')+'\n';
      }
      if(p.sinStock) txt+='   вӣ” SIN STOCK\n';
      txt+='\n';
    });
  });
  txt+='в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n';
  if(CONFIG.whatsapp) txt+='рҹ“І Pedidos: '+CONFIG.whatsapp+'\n';
  txt+='рҹҗқ '+(CONFIG.negocio||'')+'\n';
  return txt;
}

function ajustarPreciosMasivo(signo){

  });
  toastCarrito((signo>0?'в–І Subidos ':'в–ј Bajados ')+pct+'% вҖ” revisГЎ y guardГЎ');

function guardarPreciosEditados(){

  PRODUCTOS.forEach(function(p,idx){

    }
  });

  guardarCatalogo();

function esMayorista(){ return !!(CONFIG && CONFIG.mayorista && CONFIG.mayorista.on); }
function palabraBulto(){ return (CONFIG && CONFIG.mayorista && CONFIG.mayorista.palabraBulto) || 'Bulto'; }
/* Precio unitario segГәn cuГЎnto lleva (usa la escala si el producto la tiene) */
function precioPorCantidad(p, cant){
  if(!p) return 0;
  if(!p.escala || !p.escala.length) return p.venta;
  var precio = p.venta;
  for(var i=0;i<p.escala.length;i++){
    if(cant >= p.escala[i].desde) precio = p.escala[i].precio;
  }
  return precio;
}
/* CuГЎntas unidades trae un bulto (1 si no es por bulto) */
function unidadesBulto(p){ return (p && p.porBulto>1) ? p.porBulto : 1; }
/* MГӯnimo que se puede llevar de ese producto */
function minimoProducto(p){ return (p && p.minCant>1) ? p.minCant : 1; }

function totalCarrito(){ return cargarCarrito().reduce(function(s,x){ return s + (x.precioAplicado||x.venta)*(x.cant||1); },0); }
/* рҹҡҡ Costo de envГӯo segГәn lo que configurГі el dueГұo. 0 = sin envГӯo o gratis. */
function costoEnvio(subtotal){
  var e = (CONFIG && CONFIG.envio) ? CONFIG.envio : null;
  if(!e || !e.costo) return 0;
  if(e.gratisDesde>0 && subtotal>=e.gratisDesde) return 0;
  return e.costo;
}
/* Si hay pedido mГӯnimo y no llega, devuelve cuГЎnto falta (0 = puede comprar) */
function faltaParaMinimo(subtotal){
  var e = (CONFIG && CONFIG.envio) ? CONFIG.envio : null;
  if(!e || !e.minimo) return 0;
  return Math.max(0, e.minimo - subtotal);
}
function cantCarrito(){ return cargarCarrito().reduce(function(s,x){ return s + (x.cant||1); },0); }

/* Busca el producto mГЎs parecido a lo que escribiГі */
function buscarParecido(texto){
  var t = normTxt(texto);
  if(!t) return null;
  var mejor=null, mejorPunta=0;
  (PRODUCTOS||[]).forEach(function(p, idx){
    if(p.visible===false || p.sinStock) return;
    var n = normTxt(p.nombre);
    var punta = 0;
    if(n === t) punta = 100;
    else if(n.indexOf(t) >= 0) punta = 80 - Math.abs(n.length - t.length)*0.1;
    else {
      // cuГЎntas palabras del pedido estГЎn en el nombre
      var pal = t.split(' ').filter(function(w){ return w.length>2; });
      if(!pal.length) return;
      var hit = pal.filter(function(w){ return n.indexOf(w)>=0; }).length;
      if(hit) punta = (hit/pal.length)*70;
    }
    if(punta > mejorPunta){ mejorPunta=punta; mejor={p:p, idx:idx, punta:punta}; }
  });
  return (mejor && mejor.punta >= 35) ? mejor : null;
}
function procesarPedidoRapido(){
  var txt=(document.getElementById('prTxt').value||'').trim();
  if(!txt){ alert('EscribГӯ lo que necesitГЎs.'); return; }
  var lineas = txt.split(/[\n,;]+/).map(function(l){ return l.trim(); }).filter(Boolean);
  var encontrados=[], noEncontrados=[];
  lineas.forEach(function(l){
    // "10 barrita aguila" вҶ’ cantidad 10, texto "barrita aguila"
    var m = l.match(/^(\d+)\s*[xX]?\s*(.+)$/) || l.match(/^(.+?)\s*[xX]\s*(\d+)$/);
    var cant=1, nombre=l;
    if(m){
      if(/^\d+$/.test(m[1])){ cant=parseInt(m[1]); nombre=m[2]; }
      else { nombre=m[1]; cant=parseInt(m[2]); }
    }
    var hit = buscarParecido(nombre);
    if(hit) encontrados.push({idx:hit.idx, p:hit.p, cant:cant});
    else noEncontrados.push(l);
  });
  var out=document.getElementById('prResultado');
  if(!encontrados.length){
    out.innerHTML='<div style="background:#FEF2F2;border:1.5px solid #FECACA;border-radius:12px;padding:14px;text-align:center"><div style="font-size:1.6rem">рҹӨ”</div><div style="font-size:.85rem;font-weight:800;color:#DC2626;margin-top:4px">No encontrГ© ninguno</div><div style="font-size:.75rem;color:#DC2626;margin-top:3px">ProbГЎ con el nombre como figura en el catГЎlogo.</div></div>';
    return;
  }
  var total = encontrados.reduce(function(s,e){ return s + (e.p.venta*e.cant); }, 0);
  out.innerHTML =
     '<div style="background:#F0FDF4;border:1.5px solid #A7F3D0;border-radius:12px;padding:13px;margin-bottom:10px">'
      +'<div style="font-size:.75rem;font-weight:900;color:#059669;margin-bottom:8px">вң… ENCONTRГү '+encontrados.length+' PRODUCTO'+(encontrados.length>1?'S':'')+'</div>'
      +encontrados.map(function(e){
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #D1FAE5">'
          +'<span style="font-size:.8rem;color:var(--txt);flex:1;min-width:0"><b>'+e.cant+'x</b> '+e.p.nombre+'</span>'
          +'<b style="font-size:.8rem;color:#059669;white-space:nowrap;margin-left:8px">'+fmt(e.p.venta*e.cant)+'</b></div>';
      }).join('')
      +'<div style="display:flex;justify-content:space-between;padding:9px 0 2px"><b style="color:var(--txt)">TOTAL</b><b style="font-size:1.05rem;color:#059669">'+fmt(total)+'</b></div>'
    +'</div>'
    +(noEncontrados.length
      ? '<div style="background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:12px;padding:11px;margin-bottom:10px">'
        +'<div style="font-size:.72rem;font-weight:900;color:#D97706;margin-bottom:4px">вҡ пёҸ NO ENCONTRГү ESTOS</div>'
        +noEncontrados.map(function(l){ return '<div style="font-size:.76rem;color:#92400E">вҖў '+l+'</div>'; }).join('')
        +'<div style="font-size:.7rem;color:#92400E;margin-top:5px">Los podГ©s buscar a mano o consultarnos.</div></div>'
      : '')
    +'<button onclick="confirmarPedidoRapido()" style="width:100%;background:#16A34A;color:#fff;border:none;border-radius:13px;padding:15px;font-size:.92rem;font-weight:900;cursor:pointer;font-family:inherit">рҹӣ’ Poner todo en el carrito</button>';
  window._prEncontrados = encontrados;
  try{ sonar('exito'); }catch(e){}
}

/* рҹ”Ғ El Гәltimo pedido de este cliente (para repetirlo) */
function ultimoPedidoDelCliente(){
  var d = (typeof datosCliente==='function') ? datosCliente() : null;
  if(!d || !d.wa) return null;
  var w = String(d.wa).replace(/[^0-9]/g,'');
  var mio = (PEDIDOS||[]).filter(function(p){
    return p.cliente && String(p.cliente.wa||'').replace(/[^0-9]/g,'')===w && p.items && p.items.length;
  });
  return mio.length ? mio[0] : null;
}
function repetirUltimoPedido(){
  var u = ultimoPedidoDelCliente();
  if(!u){ alert('TodavГӯa no tenГ©s pedidos anteriores.'); return; }
  var puestos=0, faltan=[];
  u.items.forEach(function(it){

    else faltan.push(it.nombre);

/* рҹ“Ұ Arma las lГӯneas del pedido agrupadas por categorГӯa (para el depГіsito) */
function lineasPorCategoria(carrito){
  // buscar la categorГӯa de cada Гӯtem del carrito
  var grupos = {};
  carrito.forEach(function(it){
    var cat = 'Otros';
    var base = String(it.nombre||'').replace(/\s*\([^)]*\)\s*$/,'').trim();  // saco la variante
    var prod = (PRODUCTOS||[]).find(function(p){ return p.nombre===base || p.nombre===it.nombre; });
    if(prod){ cat = catProd(prod) || 'Otros'; }
    (grupos[cat] = grupos[cat] || []).push(it);
  });
  var out = [];
  var cats = Object.keys(grupos).sort();
  var totalUnidades = 0;
  cats.forEach(function(cat){
    out.push('');
    out.push('в–Қ*' + cat.toUpperCase() + '*');
    grupos[cat].forEach(function(it){
      var n = it.cant || 1;
      totalUnidades += n;
      var precio = (it.precioAplicado || it.venta) * n;
      out.push('  вҳҗ ' + n + ' x ' + it.nombre + ' вҖ” ' + fmt(precio));
    });
  });
  out.push('');
  out.push('рҹ“Ұ *Total de bultos/unidades: ' + totalUnidades + '*');
  return out;
}

function pedirCarrito(yaTengoDatos){ sonar('exito');
  var c=cargarCarrito(); if(!c.length)return;
  var tot=totalCarrito();
  var falta=faltaParaMinimo(tot);
  if(falta>0){ alert('El pedido mГӯnimo es '+fmt(CONFIG.envio.minimo)+'. Te faltan '+fmt(falta)+'.'); return; }
  // рҹ“Ӣ si todavГӯa no tenemos sus datos, los pedimos primero
  //    (el asesor no necesita: Г©l ya eligiГі el cliente)
  var esAsesor = (rolEfectivo()==='admin' || rolEfectivo()==='revendedor');
  if(!yaTengoDatos && !esAsesor && !datosCliente()){ pedirDatosYEnviar(); return; }
  var env=costoEnvio(tot);
  // рҹ“Ұ Agrupado POR CATEGORГҚA: asГӯ quien arma el pedido en el depГіsito
  //    recorre una sola vez cada sector, sin ir y volver.
  var lineas = lineasPorCategoria(c);
  if(env>0) lineas.push('рҹҡҡ EnvГӯo вҖ” '+fmt(env));
  tot = tot + env;
  var cuotasL=cuotasActivas().map(function(n){ return 'рҹ’і '+n+' cuotas fijas de '+fmt(valorCuota(tot,n)); });
  // рҹ“Ӣ datos del cliente en el mensaje (para saber de quiГ©n es el pedido)
  var dc = datosCliente();
  var encabezado = '';
  if(dc){
    encabezado = '*PEDIDO DE:*\n'
      + 'рҹ‘Ө ' + dc.nombre + '\n'
      + (dc.loc ? 'рҹҸӘ ' + dc.loc + '\n' : '')
      + (dc.dir ? 'рҹ“Қ ' + dc.dir + '\n' : '')
      + '\n';
  }
  var msg='Hola! Quiero pedir esto рҹӣ’\n\n'+encabezado+lineas.join('\n')+'\n\n*TOTAL CONTADO: '+fmt(tot)+'*\n\n'+cuotasL.join('\n')+'\n\nВҝMe confirmГЎs disponibilidad? рҹҗқ';

  // guarda el pedido del carrito en el historial
  window._pedidoPendiente={ items:c.map(function(it){return {nombre:it.nombre, venta:it.venta, cant:it.cant||1};}), total:tot };

  var vends=(CONFIG.admins&&CONFIG.admins.length)?CONFIG.admins:((CONFIG.vendedores&&CONFIG.vendedores.length)?CONFIG.vendedores:[]);
  if(!vends.length){
    var wa=(CONFIG.whatsapp||'').replace(/[^0-9]/g,'');
    registrarPedidoPendiente('');
    window.open('https://wa.me/'+wa+'?text='+encodeURIComponent(msg),'_blank');
    return;
  }
  var _cli = (typeof _clienteDelPedido!=='undefined' && _clienteDelPedido) ? _clienteDelPedido : null;
  var html='<div style="font-weight:900;color:var(--az);font-size:.95rem;margin-bottom:4px">рҹ“Ө Enviar el pedido</div>'
    +(_cli ? '<div style="background:#F5F8FF;border-radius:10px;padding:10px;margin-bottom:10px"><div style="font-size:.7rem;color:var(--sub);font-weight:800">PEDIDO DE</div><div style="font-size:.88rem;font-weight:900;color:var(--az)">'+(_cli.nombre||'')+(_cli.loc?' В· '+_cli.loc:'')+'</div></div>' : '')
    +'<div style="font-size:.8rem;color:var(--sub);margin-bottom:14px">'+cantCarrito()+' producto'+(cantCarrito()===1?'':'s')+' В· <b style="color:var(--az)">'+fmt(tot)+'</b></div>'
    +'<div style="font-size:.66rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">ВҝA quiГ©n se lo mandamos?</div>';
  vends.forEach(function(v){
    html+='<button onclick="registrarPedidoPendiente(\''+v.nombre.replace(/'/g,"\\'")+'\');window.open(\'https://wa.me/'+String(v.wa).replace(/[^0-9]/g,'')+'?text='+encodeURIComponent(msg)+'\',\'_blank\');cerrarConsulta()" style="width:100%;background:#25D366;color:#fff;border:none;border-radius:12px;padding:13px;font-size:.88rem;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:8px">рҹ’¬ '+v.nombre+'</button>';
  });
  html+='<button onclick="cerrarConsulta()" style="width:100%;background:none;border:1.5px solid var(--line);color:var(--sub);border-radius:11px;padding:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px">Cancelar</button>';
  document.getElementById('ayudaBody').innerHTML=html;
  document.getElementById('ayudaOverlay').classList.add('on'); empujarPantalla('ayuda', cerrarConsulta);
}

/* El revendedor SOLO trabaja con precio de VENTA. Nunca ve costos ni markup. */
function calcRevendedor(){
  var cont=document.getElementById('revResultado'); if(!cont) return;
  var txt=(document.getElementById('revTxt')||{}).value||'';
  var lineas=txt.split('\n').filter(function(l){return l.trim();});
  if(!lineas.length){ cont.innerHTML='<div style="text-align:center;color:var(--sub);padding:18px;font-size:.82rem">PegГЎ un producto con su precio de venta. рҹҗқ</div>'; return; }

  var items=[];
  lineas.forEach(function(raw){
    var linea=raw.replace(/[*_#]/g,'').trim(); if(!linea) return;
    var nombre='', venta=0;
    if(linea.indexOf('|')>=0){
      var partes=linea.split('|');
      nombre=partes[0].trim();
      var mp=(partes[1]||'').match(/(\d[\d\.]*)/);
      if(mp) venta=parseInt(mp[1].replace(/\./g,''),10);
    } else {
      var md=linea.match(/\$\s*(\d[\d\.]{2,})/) || linea.match(/(\d[\d\.]{4,})/);
      if(md){ venta=parseInt(md[1].replace(/\./g,''),10); nombre=limpiarNombre(linea.replace(md[0],'')); }
    }
    if(venta && nombre && nombre.length>2) items.push({nombre:nombre, venta:venta});
  });
  if(!items.length){ cont.innerHTML='<div style="text-align:center;color:var(--sub);padding:18px;font-size:.82rem">No encontrГ© el precio. ProbГЎ: <b>Nombre | Precio</b></div>'; return; }

  var html='', msgs=[];
  items.forEach(function(it){
    var cuotasHtml='', waLines=[];
    cuotasActivas().forEach(function(n){
      var vc=valorCuota(it.venta,n);
      cuotasHtml+='<div style="background:rgba(255,255,255,.09);border-left:3px solid var(--nar);border-radius:9px;padding:9px 12px;display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:.78rem;font-weight:800;color:#fff">'+n+' cuotas fijas</span><span style="font-size:.95rem;font-weight:900;color:#ffb968">'+fmt(vc)+'</span></div>';
      waLines.push('рҹ’і '+n+' cuotas fijas de '+fmt(vc));
    });
    html+='<div style="background:linear-gradient(160deg,var(--az-osc),var(--az));border-radius:15px;padding:16px;color:#fff;margin-bottom:10px">'
      +'<div style="text-align:center;font-size:.88rem;font-weight:900;margin-bottom:5px">'+it.nombre+'</div>'
      +'<div style="text-align:center;font-size:1.5rem;font-weight:900;margin-bottom:12px">'+fmt(it.venta)+'<div style="font-size:.6rem;color:rgba(255,255,255,.6);font-weight:700">PRECIO CONTADO</div></div>'
      +cuotasHtml
      +'<div style="text-align:center;font-size:.64rem;color:rgba(255,255,255,.7);margin-top:8px">'+firmaTienda()+' рҹҗқ</div>'
      +'</div>';
    msgs.push('*'+it.nombre.toUpperCase()+'*\n\n'+waLines.join('\n')+'\n\nвһЎпёҸ Contado: '+fmt(it.venta));
  });
  html+='<button onclick="compartirRevendedor()" style="width:100%;background:#25D366;color:#fff;border:none;border-radius:13px;padding:14px;font-size:.9rem;font-weight:900;cursor:pointer;font-family:inherit">рҹ’¬ Compartir por WhatsApp</button>';
  cont.innerHTML=html;
  window._revMsg=msgs.join('\n\nвҖ”вҖ”вҖ”\n\n')+'\n'+firmaTienda()+' рҹҗқ';
}
function compartirRevendedor(){
  if(navigator.share){ navigator.share({text:window._revMsg}).catch(function(){ window.open('https://wa.me/?text='+encodeURIComponent(window._revMsg),'_blank'); }); }
  else window.open('https://wa.me/?text='+encodeURIComponent(window._revMsg),'_blank');
}

    // guarda la seГұal (una fila por tienda)

function renderPanelAmarango(senales, subs){
  var ahora=Date.now();
  var dia=86400000;

  // arma la lista cruzando suscriptores + seГұales
  var tiendas = subs.map(function(s){
    var sen = senales[s.tienda] || {};
    var dias = sen.ultimoIngreso ? Math.floor((ahora - sen.ultimoIngreso)/dia) : null;
    var estado, color, icono;
    if(s.estado!=='ok'){ estado='Bloqueada'; color='#9CA3AF'; icono='рҹ”’'; }
    else if(dias===null){ estado='Nunca entrГі'; color='#DC2626'; icono='вҡ пёҸ'; }
    else if(dias>14){ estado='AbandonГі'; color='#DC2626'; icono='рҹ”ҙ'; }
    else if(dias>5){ estado='EnfriГЎndose'; color='#EA580C'; icono='рҹҹ '; }
    else if((sen.productos||0)===0){ estado='Sin productos'; color='#EA580C'; icono='рҹҹ '; }
    else { estado='Activo'; color='#059669'; icono='рҹҹў'; }
    return {s:s, sen:sen, dias:dias, estado:estado, color:color, icono:icono};

  // ordena: los que necesitan ayuda primero
  var orden={'вҡ пёҸ':0,'рҹ”ҙ':1,'рҹҹ ':2,'рҹҹў':3,'рҹ”’':4};
  tiendas.sort(function(a,b){ return (orden[a.icono]||9)-(orden[b.icono]||9); });

  var activos=tiendas.filter(function(t){return t.icono==='рҹҹў';}).length;
  var riesgo=tiendas.filter(function(t){return t.icono==='рҹ”ҙ'||t.icono==='вҡ пёҸ';}).length;
  var facturaMes=subs.filter(function(s){return s.estado==='ok';}).reduce(function(sum,s){return sum+(parseFloat(s.monto)||0);},0);

  // resumen
  html+='<div style="display:flex;gap:7px;margin-bottom:14px">'

    +'</div>';

  if(riesgo){
    html+='<div style="background:#FEF2F2;border:1.5px solid #FECACA;border-radius:12px;padding:11px;margin-bottom:14px;font-size:.78rem;color:#DC2626;font-weight:700;text-align:center">вҡ пёҸ '+riesgo+' tienda(s) necesitan tu ayuda</div>';
  }

          +'<button onclick="window.open(\''+linkDeTienda(t.s.tienda)+'\',\'_blank\')" style="background:#F5F8FF;border:1.5px solid var(--line);color:var(--az);border-radius:9px;padding:9px 12px;font-size:.7rem;font-weight:800;cursor:pointer;font-family:inherit">рҹ‘ҒпёҸ Ver</button>'
        +'</div></div>';
    });
  }
  html+='<button onclick="abrirPanelDueno()" style="width:100%;background:none;border:1.5px solid var(--line);color:var(--az);border-radius:11px;padding:11px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px">вҖ№ Volver al panel</button>';
  document.getElementById('adminBody').innerHTML=html;

function yaHizoTour(){ try{ return localStorage.getItem(lsKey('ae_tour'))==='1'; }catch(e){ return true; } }
function marcarTourHecho(){ try{ localStorage.setItem(lsKey('ae_tour'),'1'); }catch(e){} }

function arrancarTour(){
  if(yaHizoTour()) return;
  if(rolActual()!=='admin') return;
  _tourPaso=0;
  mostrarPasoTour();
}

function mostrarPasoTour(){
  limpiarTour();
  if(_tourPaso>=TOUR.length){ terminarTour(); return; }

  var p=TOUR[_tourPaso];
  var el=document.querySelector(p.sel);
  // si el elemento no estГЎ (ej: la abeja si no es admin), salta al siguiente
  if(!el || el.offsetParent===null){ _tourPaso++; mostrarPasoTour(); return; }

  var r=el.getBoundingClientRect();

  // el fondo oscuro con el "agujero" que ilumina el elemento
  var fondo=document.createElement('div');
  fondo.id='tourFondo';
  fondo.style.cssText='position:fixed;inset:0;z-index:9990;pointer-events:auto';
  fondo.innerHTML='<svg width="100%" height="100%" style="position:absolute;inset:0">'
    +'<defs><mask id="tourMask">'
      +'<rect width="100%" height="100%" fill="white"/>'
      +'<rect x="'+(r.left-8)+'" y="'+(r.top-8)+'" width="'+(r.width+16)+'" height="'+(r.height+16)+'" rx="14" fill="black"/>'
    +'</mask></defs>'
    +'<rect width="100%" height="100%" fill="rgba(2,8,20,.82)" mask="url(#tourMask)"/>'
    +'</svg>';
  document.body.appendChild(fondo);

  // el marco que resalta
  var marco=document.createElement('div');
  marco.id='tourMarco';
  marco.style.cssText='position:fixed;left:'+(r.left-8)+'px;top:'+(r.top-8)+'px;width:'+(r.width+16)+'px;height:'+(r.height+16)+'px;'
    +'border:3px solid #FF7A00;border-radius:14px;z-index:9991;pointer-events:none;box-shadow:0 0 0 4px rgba(255,122,0,.25);animation:tourPulso 1.6s infinite';
  document.body.appendChild(marco);

  // el cartelito
  var arriba = p.pos==='arriba';
  var caja=document.createElement('div');
  caja.id='tourCaja';
  var top = arriba ? (r.top - 8 - 150) : (r.bottom + 20);
  if(top<70) top=r.bottom+20;
  if(top>window.innerHeight-170) top=r.top-8-150;
  caja.style.cssText='position:fixed;left:16px;right:16px;top:'+Math.max(70,top)+'px;z-index:9992;'
    +'background:#fff;border-radius:16px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,.35);font-family:-apple-system,BlinkMacSystemFont,sans-serif';
  caja.innerHTML=
     '<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">'
      +'<span style="flex:1;font-weight:900;color:#0B2D6B;font-size:1rem">'+p.tit+'</span>'
      +'<span style="font-size:.68rem;color:#9CA3AF;font-weight:700">'+(_tourPaso+1)+'/'+TOUR.length+'</span>'
    +'</div>'
    +'<div style="font-size:.86rem;color:#4B5563;line-height:1.5;margin-bottom:13px">'+p.txt+'</div>'
    +'<div style="display:flex;gap:8px">'
      +'<button onclick="saltarTour()" style="background:none;border:none;color:#9CA3AF;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;padding:10px 6px">Saltar</button>'
      +'<div style="flex:1"></div>'
      +'<button onclick="siguientePasoTour()" style="background:#FF7A00;color:#fff;border:none;border-radius:11px;padding:11px 22px;font-weight:900;cursor:pointer;font-family:inherit;font-size:.86rem">'
        +(_tourPaso===TOUR.length-1 ? 'ВЎListo! рҹҗқ' : 'Siguiente вҶ’')+'</button>'
    +'</div>';
  document.body.appendChild(caja);

  // la animaciГіn del pulso
  if(!document.getElementById('tourStyle')){
    var st=document.createElement('style');
    st.id='tourStyle';
    st.textContent='@keyframes tourPulso{0%,100%{box-shadow:0 0 0 4px rgba(255,122,0,.25)}50%{box-shadow:0 0 0 9px rgba(255,122,0,.1)}}';
    document.head.appendChild(st);
  }
}
function siguientePasoTour(){ _tourPaso++; mostrarPasoTour(); }
function saltarTour(){ terminarTour(); }
function terminarTour(){
  limpiarTour();
  marcarTourHecho();
  toastCarrito('рҹҗқ ВЎListo! Cualquier duda, entrГЎ a вҳ° MГЎs');
}
function limpiarTour(){
  ['tourFondo','tourMarco','tourCaja'].forEach(function(id){
    var e=document.getElementById(id); if(e) e.remove();
  });
}

function girarRuleta(){
  if(_girando) return;
  _girando=true;
  var premios=(CONFIG.ruletaPremios&&CONFIG.ruletaPremios.length) ? CONFIG.ruletaPremios : ['5% OFF','10% OFF','Segui participando'];
  var res=document.getElementById('ruletaResultado');
  var btn=document.getElementById('btnGirar');
  if(btn) btn.disabled=true;
  var vueltas=0;
  var t=setInterval(function(){
    var p=premios[Math.floor(Math.random()*premios.length)];
    if(res) res.innerHTML='<span style="font-size:1.1rem;font-weight:900;color:var(--az)">'+p+'</span>';
    vueltas++;
    if(vueltas>=18){

      var gano = !/sin premio|segu/i.test(premio);
      if(res) res.innerHTML='<div><div style="font-size:2rem;margin-bottom:4px">'+(gano?'рҹҺү':'рҹҳ…')+'</div>'
        +'<div style="font-size:1.15rem;font-weight:900;color:'+(gano?'#059669':'var(--sub)')+'">'+premio+'</div>'
        +(gano?'<div style="font-size:.72rem;color:var(--sub);margin-top:5px">MostrГЎ esto al comprar рҹҗқ</div>':'')+'</div>';
      try{ localStorage.setItem(lsKey('ae_ruleta_hoy'), new Date().toDateString()); }catch(e){}
      _girando=false;
    }
  }, 90);
}

function calcInversion(){
  var cont=document.getElementById('inv_resultado'); if(!cont) return;
  var costo=parseFloat((document.getElementById('inv_costo')||{}).value)||0;
  var envio=parseFloat((document.getElementById('inv_envio')||{}).value)||0;

  if(!costo){
    cont.innerHTML='<div style="text-align:center;color:var(--sub);padding:26px 20px;font-size:.85rem"><div style="font-size:2.4rem;margin-bottom:8px">рҹ“Ҳ</div>PonГ© el precio de costo y te muestro cuГЎnta plata tenГ©s que poner. рҹҗқ</div>';
    return;
  }

  // precio de venta con tu markup
  var venta = markupDeCosto(costo);
  var esCuotas = (_invPlan!=='contado');
  var n = esCuotas ? _invPlan : 1;

  // total que cobra y primera cuota
  var totalPlan, primeraCuota;
  if(!esCuotas){ totalPlan=venta; primeraCuota=venta; }
  else {
    var pct = (CONFIG.cuotas && CONFIG.cuotas[n]!=null) ? CONFIG.cuotas[n] : 0;
    totalPlan = Math.round(venta*(1+pct/100));
    primeraCuota = valorCuota(venta, n);
  }

  // comisiГіn del revendedor: 10% contado / 15% en cuotas
  var comisionTotal = Math.round(venta*(esCuotas?0.15:0.10)/500)*500;
  // la primera parte de la comisiГіn (se paga en partes)
  var partes;
  if(!esCuotas) partes=1;
  else if(n===2) partes=2;
  else { partes=3; if(Math.round(comisionTotal/3)<10000) partes=2; }
  var primeraParteComision = Math.round(comisionTotal/partes/500)*500;

  // рҹ’° LA FГ“RMULA: capital real que ponГ©s
  var capital = costo + primeraParteComision + envio - primeraCuota;
  if(capital<0) capital=0;

  var ganancia = totalPlan - costo - comisionTotal - envio;
  var roi = capital>0 ? Math.round(ganancia/capital*100) : 0;

  // inversores
  _inversores=[];
  var txt=(document.getElementById('inv_socios')||{}).value||'';
  txt.split('\n').forEach(function(l){
    var p=l.split(',');
    if(p.length<2) return;
    var nom=p[0].trim(), pc=parseFloat(p[1])||0;
    if(nom && pc>0) _inversores.push({nombre:nom, pct:pc});
  });

  var html=
    // la caja grande: cuГЎnta plata poner
     '<div style="background:linear-gradient(160deg,var(--az-osc),var(--az));border-radius:16px;padding:18px;color:#fff;margin-bottom:14px;text-align:center">'
      +'<div style="font-size:.66rem;font-weight:800;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.7px">Plata que tenГ©s que poner</div>'
      +'<div style="font-size:2.1rem;font-weight:900;margin:4px 0">'+fmt(capital)+'</div>'
      +'<div style="font-size:.74rem;color:#ffb968;font-weight:700">рҹ’Ў El cliente te adelanta '+fmt(primeraCuota)+' con la 1ra cuota</div>'
    +'</div>'
    // el desglose
    +'<div style="background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px">'
      +'<div style="font-weight:900;color:var(--az);font-size:.86rem;margin-bottom:9px">рҹ§® De dГіnde sale</div>'
      +filaInv('Costo del producto', fmt(costo), false)
      +(envio?filaInv('EnvГӯo', fmt(envio), false):'')
      +filaInv('1ra parte comisiГіn revendedor', fmt(primeraParteComision), false)
      +filaInv('вҲ’ El cliente te paga (1ra cuota)', 'вҲ’ '+fmt(primeraCuota), false, '#059669')
      +'<div style="border-top:1.5px solid var(--line);margin-top:8px;padding-top:8px">'
      +filaInv('CAPITAL REAL', fmt(capital), true)
      +'</div></div>'
    // la ganancia
    +'<div style="background:#F0FDF4;border:1.5px solid #A7F3D0;border-radius:14px;padding:14px;margin-bottom:12px">'
      +'<div style="font-weight:900;color:#059669;font-size:.86rem;margin-bottom:9px">рҹ’° Lo que ganГЎs</div>'
      +filaInv('Precio de venta', fmt(venta), false)
      +filaInv('Total que cobra ('+(esCuotas?n+' cuotas':'contado')+')', fmt(totalPlan), false)
      +filaInv('ComisiГіn revendedor ('+(esCuotas?'15':'10')+'%)', 'вҲ’ '+fmt(comisionTotal), false)
      +'<div style="border-top:1.5px solid #A7F3D0;margin-top:8px;padding-top:8px">'
      +filaInv('GANANCIA NETA', fmt(ganancia), true, '#059669')
      +(capital>0?'<div style="text-align:center;font-size:.78rem;color:#059669;font-weight:800;margin-top:6px">рҹ“Ҳ Rinde '+roi+'% sobre lo que pusiste</div>':'')
      +'</div></div>';

  // reparto entre inversores
  if(_inversores.length){
    var sumaPct=_inversores.reduce(function(s,i){return s+i.pct;},0);
    html+='<div style="background:#F5F8FF;border:1.5px solid #DDE7FA;border-radius:14px;padding:14px">'
      +'<div style="font-weight:900;color:var(--az);font-size:.86rem;margin-bottom:9px">рҹӨқ Reparto entre socios</div>';
    _inversores.forEach(function(inv){
      var pone=Math.round(capital*inv.pct/100);
      var gana=Math.round(ganancia*inv.pct/100);
      html+='<div style="background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:6px">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
          +'<span style="font-weight:900;color:var(--az);flex:1;font-size:.86rem">'+inv.nombre+'</span>'
          +'<span style="font-size:.72rem;font-weight:800;color:var(--sub)">'+inv.pct+'%</span></div>'
        +'<div style="display:flex;justify-content:space-between;font-size:.76rem">'
          +'<span style="color:var(--sub)">Pone: <b style="color:var(--az)">'+fmt(pone)+'</b></span>'
          +'<span style="color:var(--sub)">Gana: <b style="color:#059669">'+fmt(gana)+'</b></span></div>'
        +'</div>';
    });
    if(sumaPct!==100){
      html+='<div style="font-size:.72rem;color:#DC2626;font-weight:700;text-align:center;margin-top:5px">вҡ пёҸ Los porcentajes suman '+sumaPct+'% (deberГӯan sumar 100%)</div>';
    }
    html+='</div>';
  }
  cont.innerHTML=html;
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   рҹ’° COMISIONES DE REVENDEDORES вҖ” formato Amarango
   В· Contado  вҶ’ 10% del precio de venta
   В· Cuotas   вҶ’ 15% del precio de CONTADO (no del financiado)
   В· 2 cuotas вҶ’ se paga en 2 partes
   В· 4 o 6    вҶ’ se paga en 3 partes
   В· Si la parte es muy chica вҶ’ menos partes (no cobros insignificantes)
   Todo editable. Cada tienda pone sus nГәmeros.
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function calcularComision(venta, nCuotas){
  var c=CONFIG||{};
  var esContado = !nCuotas || nCuotas<=1;
  var pct = esContado ? (c.comContado!=null?c.comContado:10) : (c.comCuotas!=null?c.comCuotas:15);

  // вҡ пёҸ SIEMPRE sobre el precio de CONTADO (nunca sobre el financiado)
  var total = Math.round(venta * pct/100 / 500) * 500;

  // en cuГЎntas partes se paga
  var partes;
  if(esContado) partes = 1;
  else if(nCuotas === 2) partes = 2;
  else partes = 3;                    // 4 o 6 cuotas вҶ’ 3 partes

  // excepciГіn: si cada parte queda muy chica, se pagan en menos partes
  var minParte = c.comMinParte!=null ? c.comMinParte : 10000;
  if(partes === 3 && Math.round(total/3) < minParte) partes = 2;
  if(partes === 2 && Math.round(total/2) < minParte && !esContado) partes = 1;

  var porParte = Math.round(total/partes/500)*500;

  return { total: total, pct: pct, partes: partes, porParte: porParte, esContado: esContado };
}

function calcVistaComision(){

/* в•җв•җв•җв•җв•җв•җв•җ SUSCRIPTORES (libreta de control de la membresГӯa) в•җв•җв•җв•җв•җв•җв•җ
   Se guarda en Supabase (tabla 'amarango_subs'). Si la tabla no existe
   todavГӯa, funciona igual en el telГ©fono (localStorage) y avisa. */
var SUBS = [];
function subsCargar(cb){
  // primero lo del telГ©fono (rГЎpido)
  try{ SUBS = JSON.parse(localStorage.getItem('ae_subs')||'[]'); }catch(e){ SUBS=[]; }
  if(cb) cb();
  // despuГ©s la nube (si conecta)
  if(sb){
    sb.from('amarango_subs').select('datos').eq('id','lista').maybeSingle()
      .then(function(r){ if(r&&r.data&&r.data.datos){ SUBS=r.data.datos; try{localStorage.setItem('ae_subs',JSON.stringify(SUBS));}catch(e){} if(cb)cb(); } })
      .catch(function(){});
  }
}
function subsGuardar(){
  try{ localStorage.setItem('ae_subs', JSON.stringify(SUBS)); }catch(e){}
  if(sb){
    sb.from('amarango_subs').upsert({id:'lista', datos:SUBS}).then(function(){}).catch(function(){});
  }
}
function abrirSuscriptores(){ subsCargar(renderSubs); }

function guardarSub(i){
  var g=function(id){ var e=document.getElementById(id); return e?e.value.trim():''; };
  var tienda=g('sb_tienda').toLowerCase().replace(/[^a-z0-9_-]/g,'');
  var obj={ nombre:g('sb_nombre'), tienda:tienda, negocio:g('sb_negocio'), vende:g('sb_vende'), whatsapp:g('sb_whatsapp'), pagaHasta:g('sb_pagaHasta'), monto:g('sb_monto'), nota:g('sb_nota'), plan:(document.getElementById('sb_plan')?document.getElementById('sb_plan').value:'basico'), estado: i>=0?SUBS[i].estado:'ok' };
  if(!obj.nombre){ alert('Pone al menos el nombre.'); return; }
  if(!obj.tienda){ alert('Pone el CODIGO de su tienda. Sin eso no podes prenderle ni apagarle la tienda.'); return; }
  if(i>=0) SUBS[i]=obj; else SUBS.push(obj);
  subsGuardar(); renderSubs();
}
function toggleEstadoSub(i){ SUBS[i].estado = SUBS[i].estado==='ok'?'venc':'ok'; subsGuardar(); renderSubs(); }
function borrarSub(i){ if(confirm('ВҝBorrar este suscriptor?')){ SUBS.splice(i,1); subsGuardar(); renderSubs(); } }
function avisarSub(i){
  var s=SUBS[i]; if(!s.whatsapp) return;
  var msg = s.estado==='ok'
    ? 'Hola '+s.nombre+'! Te recuerdo que tu Amarango estГЎ activa рҹҗқ. ВЎA vender!'
    : 'Hola '+s.nombre+'! Tu suscripciГіn a Amarango venciГі. Para reactivarla, pasГЎ el pago y la habilito al toque рҹҗқ';
  window.open('https://wa.me/'+s.whatsapp.replace(/[^0-9]/g,'')+'?text='+encodeURIComponent(msg),'_blank');
}

var CONFIG = null;
function cargarConfig(cb){

  var _rubroLink='';
  try{ _rubroLink=(new URLSearchParams(window.location.search).get('r')||'').trim(); }catch(e){}

    var l=localStorage.getItem(lsKey('ae_config'));

      // рҹ”’ VERIFICACIГ“N: Вҝesta config es realmente de ESTA tienda?
      // (el bug viejo del cruce dejГі configs ajenas guardadas)
      if(c && c._tienda && c._tienda!==TIENDA){

        localStorage.removeItem(lsKey('ae_config'));
        localStorage.removeItem(lsKey('ae_tienda_catalogo'));   // el catГЎlogo tambiГ©n
        c=null;
      }
      if(c) CONFIG=c;
    }
  }catch(e){}
  if(!CONFIG){
    CONFIG=JSON.parse(JSON.stringify(CONFIG_DEFAULT));
    // Si NO es la tienda de Max вҶ’ arranca VACГҚA, sin marca ajena
    if(TIENDA!=='amarango'){
      CONFIG.negocio='Mi Tienda';

      CONFIG.logo='';

      var _qp=null;
      try{ _qp=new URLSearchParams(window.location.search); }catch(e){}
      var _pl = _qp ? (_qp.get('p')||'') : '';
      var _pr = _qp ? (_qp.get('pr')||'') : '';
      CONFIG.pin    = /^\d{4}$/.test(_pl) ? _pl : String(Math.floor(1000 + Math.random()*9000));
      CONFIG.pinRev = /^\d{4}$/.test(_pr) ? _pr : String(Math.floor(1000 + Math.random()*9000));
      // рҹҶ• si el link traГӯa ?r=rubro, le dejo las categorГӯas listas
      if(_rubroLink && PRESETS_RUBRO[_rubroLink]){

        if(pr.mayorista){ CONFIG.mayorista={on:true, palabraBulto:'Bulto', minimoUnidades:0, mostrarUnitario:true}; }
      }
    }
  }
  aplicarConfig();
  if(cb) cb();
  if(sb){
    sb.from('amarango_config').select('datos').eq('id',keyConfig()).maybeSingle()
      .then(function(r){
        if(r&&r.data&&r.data.datos){
          var d=r.data.datos;
          // рҹ”’ si la config de la nube es de otra tienda, la ignoro (contaminaciГіn del bug viejo)
          if(d._tienda && d._tienda!==TIENDA){ console.warn('Config en nube contaminada. Ignorada.'); return; }
          CONFIG=Object.assign(JSON.parse(JSON.stringify(CONFIG_DEFAULT)), d);
          CONFIG._tienda=TIENDA;
          try{localStorage.setItem(lsKey('ae_config'),JSON.stringify(CONFIG));}catch(e){}
          aplicarConfig(); render();
        }
      })
      .catch(function(){});

  document.documentElement.style.setProperty('--az', CONFIG.colorPrincipal);

  // рҹҺЁ los tonos derivados tambiГ©n siguen el color elegido (antes quedaban azules)
  document.documentElement.style.setProperty('--az2', aclararColor(CONFIG.colorPrincipal, 35));
  document.documentElement.style.setProperty('--az-osc', oscurecerColor(CONFIG.colorPrincipal, 45));

/* рҹҺЁ Tonos derivados del color principal (para degradГ©s y fondos) */
function _hex2rgb(h){
  h=(h||'#0B2D6B').replace('#','');
  if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)];
}
function _rgb2hex(r,g,b){
  var f=function(v){ v=Math.max(0,Math.min(255,Math.round(v))); return ('0'+v.toString(16)).slice(-2); };
  return '#'+f(r)+f(g)+f(b);
}
function aclararColor(hex, pct){
  var c=_hex2rgb(hex), p=pct/100;
  return _rgb2hex(c[0]+(255-c[0])*p, c[1]+(255-c[1])*p, c[2]+(255-c[2])*p);
}
function oscurecerColor(hex, pct){
  var c=_hex2rgb(hex), p=1-(pct/100);
  return _rgb2hex(c[0]*p, c[1]*p, c[2]*p);
}
/* в•җв•җв•җв•җв•җв•җв•җ FORMATOS DE CUOTA вҖ” cada tienda elige cГіmo mostrar el precio в•җв•җв•җв•җв•җв•җв•җ */
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   рҹ’° FORMATOS DE PRECIO вҖ” los que usan las grandes
   В· limpio    вҶ’ solo el precio (contado, lo mГЎs usado)
   В· ml        вҶ’ estilo Mercado Libre: precio grande, cuota abajo
   В· cajita    вҶ’ estilo FrГЎvega: la cuota destacada en una cajita

function precioTarjeta(p){
  // рҹ“Ұ MODO MAYORISTA: el precio del bulto grande + cuГЎnto sale la unidad.
  //    AsГӯ el comerciante calcula su ganancia de un vistazo, sin sacar cuentas.
  if(typeof esMayorista==='function' && esMayorista()){
    var enOf = p.precioAntes && parseFloat(p.precioAntes) > parseFloat(p.venta);
    var off = enOf ? Math.round((1 - p.venta/parseFloat(p.precioAntes))*100) : 0;
    var u = unidadesBulto(p);
    var porUnidad = u>1 ? Math.round(p.venta/u) : 0;
    return (enOf
        ? '<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">'
          +'<span style="font-size:.68rem;color:#9CA3AF;text-decoration:line-through">'+fmt(p.precioAntes)+'</span>'
          +'<span style="background:#DCFCE7;color:#059669;font-size:.58rem;font-weight:900;padding:2px 5px;border-radius:4px">'+off+'% OFF</span>'
          +'</div>' : '')
      +'<div style="font-size:1.18rem;font-weight:900;color:var(--az);line-height:1.1">'+fmt(p.venta)+'</div>'
      +(u>1
        ? '<div style="font-size:.68rem;color:var(--sub);font-weight:700;margin-top:1px">'+u+' u. В· <b style="color:#059669">'+fmt(porUnidad)+'</b> c/u</div>'
        : '<div style="font-size:.66rem;color:var(--sub);font-weight:700;margin-top:1px">por unidad</div>')
      +(p.escala && p.escala.length
        ? '<div style="font-size:.62rem;color:var(--nar);font-weight:800;margin-top:2px">рҹ“ү desde '+p.escala[0].desde+' u. a '+fmt(p.escala[0].precio)+'</div>'
        : '');
  }
  var f = (CONFIG && CONFIG.formatoCuota) || 'limpio';
  var mc = mejorCuota(p.venta);
  var enOferta = p.precioAntes && parseFloat(p.precioAntes) > parseFloat(p.venta);
  var pctOff = enOferta ? Math.round((1 - p.venta/parseFloat(p.precioAntes))*100) : 0;
  var sinCuotas = !mc || (CONFIG && CONFIG.modoVenta==='contado');

  // в”Җв”Җ рҹҸ·пёҸ LIMPIO: solo el precio (el mГЎs usado en el mundo)
  if(f==='limpio' || sinCuotas){
    return (enOferta
        ? '<div style="display:flex;align-items:center;gap:6px;margin-bottom:1px">'
          +'<span style="font-size:.72rem;color:#9CA3AF;text-decoration:line-through">'+fmt(p.precioAntes)+'</span>'
          +'<span style="background:#DCFCE7;color:#059669;font-size:.6rem;font-weight:900;padding:2px 6px;border-radius:4px">'+pctOff+'% OFF</span>'
          +'</div>'
        : '')
      +'<div style="font-size:1.35rem;font-weight:900;color:var(--txt);line-height:1.1;letter-spacing:-.5px">'+fmt(p.venta)+'</div>'
      +(mc && !(CONFIG&&CONFIG.modoVenta==='contado')
        ? '<div style="font-size:.72rem;color:var(--gr);font-weight:700;margin-top:2px">'+mc.n+' cuotas de '+fmt(mc.valor)+'</div>'
        : '<div style="height:6px"></div>');
  }

  // в”Җв”Җ рҹӣ’ MERCADO LIBRE: precio grande arriba, cuota verde abajo
  if(f==='ml'){
    return (enOferta
        ? '<div style="display:flex;align-items:center;gap:6px;margin-bottom:1px">'
          +'<span style="font-size:.72rem;color:#9CA3AF;text-decoration:line-through">'+fmt(p.precioAntes)+'</span>'
          +'<span style="background:#DCFCE7;color:#059669;font-size:.6rem;font-weight:900;padding:2px 6px;border-radius:4px">'+pctOff+'% OFF</span>'
          +'</div>'
        : '')
      +'<div style="font-size:1.4rem;font-weight:900;color:var(--txt);line-height:1.1;letter-spacing:-.6px">'+fmt(p.venta)+'</div>'
      +'<div style="font-size:.74rem;color:var(--gr);font-weight:800;margin-top:1px">en '+mc.n+' cuotas de '+fmt(mc.valor)+'</div>'
      +'<div style="height:5px"></div>';
  }

  // в”Җв”Җ рҹҸ¬ CAJITA (estilo FrГЎvega): la cuota en una cajita naranja
  if(f==='cajita'){
    return '<div style="background:#FFF6EE;border:1px solid #FFE0C2;border-radius:9px;padding:8px 10px;margin-bottom:6px">'
        +'<div style="font-size:.58rem;font-weight:900;color:var(--nar);text-transform:uppercase;letter-spacing:.4px">'+mc.n+' cuotas fijas de</div>'
        +'<div style="font-size:1.2rem;font-weight:900;color:var(--az);line-height:1.1">'+fmt(mc.valor)+'</div>'
      +'</div>'
      +'<div style="font-size:.72rem;color:var(--sub)">'
        +(enOferta?'<span style="text-decoration:line-through;color:#bbb">'+fmt(p.precioAntes)+'</span> ':'')
        +'Contado: <b style="color:var(--txt)">'+fmt(p.venta)+'</b></div>';
  }

  // в”Җв”Җ рҹ’і CUOTA GRANDE (el de siempre, para los que venden en cuotas)
  return '<div class="cuota-v">'+fmt(mc.valor)+'</div>'
    +'<div class="cuota-n">en '+mc.n+' cuotas fijas</div>'
    +'<div class="contado">'
      +(enOferta?'<span style="text-decoration:line-through;color:#bbb">'+fmt(p.precioAntes)+'</span> ':'')
      +'Contado: '+fmt(p.venta)+'</div>';
}

/* El link Гәnico de esta tienda (para compartir con los clientes) */
function linkTienda(){
  var ruta=window.location.pathname;
  // si estГЎ en una carpeta (/marcelo/), el link es la carpeta
  var enCarpeta = ruta.split('/').filter(Boolean).some(function(x){ return !/\.html?$/i.test(x); });
  if(enCarpeta){
    var partes=ruta.split('/').filter(Boolean);
    if(/\.html?$/i.test(partes[partes.length-1])) partes.pop();
    return window.location.origin + '/' + partes.join('/') + '/';
  }
  var base=window.location.origin+ruta;
  return TIENDA==='amarango' ? base : base+'?t='+TIENDA;
}
function copiarLink(){
  marcarCompartio();
  var l=linkTienda();
  if(navigator.clipboard){ navigator.clipboard.writeText(l).then(function(){ alert('вң… Link copiado. Ya lo podГ©s compartir.'); }).catch(function(){ prompt('CopiГЎ este link:', l); }); }
  else prompt('CopiГЎ este link:', l);
}
