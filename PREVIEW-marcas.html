<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--az:#0B2D6B;--nar:#FF7A00;--wh:#fff;--bor:#EBD9B4;--sub:#6B7280;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
body{background:#f4f6fb;padding:16px;max-width:480px;margin:0 auto}
.marcas-wrap{background:var(--wh);border:1px solid var(--bor);border-radius:14px;padding:11px 0 12px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 10px rgba(11,45,107,.05);}
.marcas-tit{font-size:.6rem;font-weight:800;color:var(--sub);letter-spacing:1.2px;text-align:center;margin-bottom:9px;text-transform:uppercase;}
.marcas-track{display:flex;gap:8px;overflow-x:auto;padding:0 12px;scrollbar-width:none;}
.marcas-track::-webkit-scrollbar{display:none;}
.marca-chip{flex-shrink:0;background:#F4F7FD;border:1px solid #DCE5F5;border-radius:9px;padding:7px 13px;font-size:.7rem;font-weight:900;color:var(--az);letter-spacing:.3px;white-space:nowrap;}
.banner{background:linear-gradient(135deg,var(--nar),#ff9a3d);color:#fff;border-radius:12px;padding:12px 16px;margin-bottom:10px;font-size:.82rem;font-weight:800;text-align:center;box-shadow:0 2px 8px rgba(255,122,0,.25);}
.card{background:#fff;border:1px solid #eee;border-radius:12px;padding:12px;margin-top:10px;font-size:.8rem;color:#666}
</style></head><body>
<div class="banner">🐝 ¡Bienvenido a AmarangoElectro!</div>
<div class="marcas-wrap">
  <div class="marcas-tit">✨ Trabajamos con las mejores marcas</div>
  <div class="marcas-track">
    <span class="marca-chip">SAMSUNG</span><span class="marca-chip">iPHONE</span><span class="marca-chip">XIAOMI</span>
    <span class="marca-chip">MOTOROLA</span><span class="marca-chip">JBL</span><span class="marca-chip">SONY</span>
    <span class="marca-chip">PLAYSTATION</span><span class="marca-chip">INFINIX</span><span class="marca-chip">PHILIPS</span>
    <span class="marca-chip">LUSQTOFF</span><span class="marca-chip">DAEWOO</span><span class="marca-chip">y muchas más</span>
  </div>
</div>
<div class="card">↑ Deslizá la banda de marcas con el dedo para ver todas. Abajo seguiría el catálogo normal.</div>
</body></html>
