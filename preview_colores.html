<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>
:root{--az:#0B2D6B;--nar:#FF7A00;--bg:#F4F1EA;--bor:#EBD9B4;--txt:#1A1A2E;--sub:#6B7280}
body{background:var(--bg);font-family:'Segoe UI',Roboto,sans-serif;padding:16px;margin:0;color:var(--txt);}
h2{color:var(--az);font-size:16px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.prod-card{background:#fff;border:1px solid var(--bor);border-top:3px solid var(--nar);border-bottom:3px solid var(--az);border-radius:14px;box-shadow:0 3px 14px rgba(11,45,107,.10);padding:12px;}
.prod-foto{width:100%;height:90px;border-radius:8px;background:#f0f2f8;margin-bottom:8px;display:flex;align-items:center;justify-content:center;font-size:2rem;}
.prod-nombre{font-size:13px;font-weight:800;color:var(--az);margin-bottom:4px;}
.prod-precio{font-size:16px;font-weight:900;color:var(--az);}
.btn{background:var(--nar);color:#fff;border:none;border-radius:8px;padding:8px;width:100%;font-weight:800;margin-top:8px;font-size:12px;}
</style></head><body>
<h2>Fondo tiza · borde naranja arriba, azul abajo, miel a los lados</h2>
<div class="grid">
<div class="prod-card"><div class="prod-foto">📱</div><div class="prod-nombre">iPhone 13 128GB</div><div class="prod-precio">$450.000</div><button class="btn">🛒 Comprar</button></div>
<div class="prod-card"><div class="prod-foto">📱</div><div class="prod-nombre">Samsung A54</div><div class="prod-precio">$320.000</div><button class="btn">🛒 Comprar</button></div>
</div>
</body></html>
