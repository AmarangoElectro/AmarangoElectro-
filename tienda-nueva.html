<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Tienda AmarangoElectro 🐝</title>
<meta name="theme-color" content="#0B2D6B">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   TIENDA NUEVA — Bloque 1 (catálogo prolijo, diseño sobrio)
   Header con degradé Amarango (como pidió Max).
   Cuotas 15/55/78 · categorías reales · compartir con foto.
   ============================================================ */
:root{
  --az:#0B2D6B; --az2:#1e5bc8; --nar:#FF7A00;
  --bg:#F7F8FA; --wh:#fff; --txt:#141824; --sub:#7A8291; --line:#ECEEF2; --gr:#10B981;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);padding-bottom:40px}

/* SISTEMA DE VISTAS (una puerta a la vez) */
.vista{display:none}
.vista.on{display:block}

/* BARRA INFERIOR — las puertas grandes tipo app */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid var(--line);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 14px rgba(0,0,0,.06)}
.tabbar button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-family:inherit;color:var(--sub);font-size:.62rem;font-weight:700;padding:4px 0}
.tabbar button .i{font-size:1.35rem;line-height:1}
.tabbar button.on{color:var(--nar)}
.tabbar button.admin-tab{color:#c0c6d0}

/* pantalla "en construcción" para las puertas que faltan */
.construccion{text-align:center;padding:70px 24px;color:var(--sub)}
.construccion .ci{font-size:3.2rem;margin-bottom:14px}
.construccion .ct{font-size:1.05rem;font-weight:900;color:var(--az);margin-bottom:6px}
.construccion .cs{font-size:.82rem;line-height:1.5}

/* HEADER con degradé (identidad Amarango, se mantiene) */
.top{position:sticky;top:0;z-index:100;background:linear-gradient(160deg,#020c2e 0%,var(--az) 55%,var(--az2) 100%);padding:13px 16px 15px;box-shadow:0 2px 12px rgba(11,45,107,.2)}
.brand{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.brand .bee{font-size:1.35rem}
.brand h1{color:#fff;font-size:1.05rem;font-weight:900;letter-spacing:.2px}
.brand .tag{color:#ffb968;font-size:.6rem;font-weight:600;margin-left:auto;font-style:italic}
.searchbar{display:flex;align-items:center;gap:9px;background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.searchbar span{font-size:1rem;opacity:.5}
.searchbar input{flex:1;border:none;outline:none;font-size:.9rem;font-family:inherit;background:transparent;color:var(--txt)}

/* CATEGORÍAS */
.cats{display:flex;gap:10px;overflow-x:auto;padding:14px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;min-width:62px}
.cat .ico{width:54px;height:54px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:1.55rem;border:1.5px solid var(--line);transition:all .18s}
.cat.on .ico{border-color:var(--az);box-shadow:0 0 0 3px rgba(11,45,107,.08)}
.cat span{font-size:.63rem;font-weight:700;color:var(--sub);text-align:center}
.cat.on span{color:var(--az)}

.section-h{padding:4px 16px 10px;font-size:.72rem;font-weight:900;color:var(--az);letter-spacing:.5px;text-transform:uppercase}

/* BARRA DE FILTROS */
.filtros{display:flex;gap:8px;padding:2px 14px 10px;align-items:center}
.filtros select,.filtros input{border:1.5px solid var(--line);border-radius:10px;padding:10px 11px;font-family:inherit;font-size:.76rem;color:var(--txt);outline:none;background:#fff}
.filtros select{flex:1.3;font-weight:600}
.filtros input{flex:1;min-width:0}
.filtros input:focus,.filtros select:focus{border-color:var(--nar)}
.f-oferta{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:10px 12px;font-size:.74rem;font-weight:800;color:var(--sub);cursor:pointer;font-family:inherit;white-space:nowrap}
.f-oferta.on{background:#FFF0E0;border-color:var(--nar);color:var(--nar)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px}

/* SALUDO por hora */
.saludo{margin:8px 14px 2px;display:flex;align-items:center;gap:10px}
.saludo .emo{font-size:1.6rem}
.saludo .txt .hola{font-size:1.02rem;font-weight:900;color:var(--az);line-height:1.1}
.saludo .txt .sub{font-size:.68rem;color:var(--sub);font-weight:600;margin-top:1px}

/* PRODUCTO DEL DÍA — tarjeta grande destacada */
.pdd{margin:6px 14px 4px;background:linear-gradient(160deg,#0a1a3a,var(--az));border-radius:18px;padding:16px;display:flex;gap:14px;align-items:center;position:relative;overflow:hidden;cursor:pointer;box-shadow:0 4px 16px rgba(11,45,107,.22)}
.pdd .tag{position:absolute;top:0;right:0;background:var(--nar);color:#fff;font-size:.56rem;font-weight:900;padding:5px 12px;border-radius:0 0 0 12px;letter-spacing:.5px}
.pdd .foto{width:96px;height:96px;flex:0 0 auto;border-radius:12px;background:#fff center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:2.4rem}
.pdd .info{flex:1;min-width:0}
.pdd .info .n{color:#fff;font-size:.92rem;font-weight:800;line-height:1.2;margin-bottom:6px}
.pdd .info .cv{color:#ffb968;font-size:1.5rem;font-weight:900;line-height:1}
.pdd .info .cn{color:var(--gr);font-size:.66rem;font-weight:700;margin-top:1px}
.pdd .info .ct{color:rgba(255,255,255,.55);font-size:.62rem;margin-top:3px}

/* DESTACADOS — fila horizontal */
.dest-row{display:flex;gap:11px;overflow-x:auto;padding:2px 14px 6px;scrollbar-width:none}
.dest-row::-webkit-scrollbar{display:none}
.dest-card{flex:0 0 auto;width:140px;background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;cursor:pointer}
.dest-card .dfoto{height:96px;background:#FAFBFC center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:2rem;border-bottom:1px solid var(--line);position:relative}
.dest-card .dstar{position:absolute;top:5px;left:5px;background:var(--nar);color:#fff;font-size:.5rem;font-weight:900;padding:2px 6px;border-radius:5px}
.dest-card .dbody{padding:8px 10px 10px}
.dest-card .dn{font-size:.68rem;font-weight:700;color:var(--txt);line-height:1.25;height:34px;overflow:hidden;margin-bottom:4px}
.dest-card .dcv{font-size:.9rem;font-weight:900;color:var(--nar)}
.dest-card .dcn{font-size:.55rem;color:var(--gr);font-weight:700}

/* TARJETA (sobria) */
.card{background:#fff;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--line);transition:transform .15s}
.card:active{transform:scale(.985)}
.card .ph{height:120px;background:#FAFBFC;display:flex;align-items:center;justify-content:center;font-size:2.6rem;position:relative;border-bottom:1px solid var(--line);cursor:pointer;background-size:cover;background-position:center}
.card .fav{position:absolute;top:6px;right:6px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);border:none;font-size:.9rem;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.15);line-height:1}
.card .badge{position:absolute;top:6px;left:6px;background:var(--nar);color:#fff;font-size:.52rem;font-weight:800;padding:3px 7px;border-radius:6px;letter-spacing:.2px}
.card .body{padding:10px 12px 12px;display:flex;flex-direction:column;flex:1}
.card .marca{font-size:.55rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.card .nom{font-size:.79rem;font-weight:700;color:var(--txt);line-height:1.3;margin:3px 0 7px;min-height:34px;cursor:pointer}
.card .cuota-v{font-size:1.15rem;font-weight:900;color:var(--nar);line-height:1.05}
.card .cuota-n{font-size:.6rem;font-weight:700;color:var(--gr);margin-bottom:2px}
.card .contado{font-size:.64rem;color:var(--sub);margin-bottom:8px}
.card .share{margin-top:auto;width:100%;background:#25D366;color:#fff;border:none;border-radius:9px;padding:9px;font-size:.72rem;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}

.estado{text-align:center;padding:44px 20px;color:var(--sub)}
.estado .e-i{font-size:2.6rem;margin-bottom:10px}
.setup{margin:14px;background:#FFF9F0;border:1.5px dashed var(--nar);border-radius:14px;padding:16px;font-size:.78rem;color:var(--az);line-height:1.55}
.setup b{color:var(--nar)}
.setup code{background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:.72rem}

/* DETALLE */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(2,8,20,.55);backdrop-filter:blur(3px);align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:520px;border-radius:22px 22px 0 0;max-height:88vh;overflow-y:auto;animation:up .28s cubic-bezier(.2,.9,.3,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-head{background:linear-gradient(160deg,#020c2e,var(--az));padding:18px;position:sticky;top:0;z-index:2}
.sheet-head .x{position:absolute;top:14px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.1rem;cursor:pointer}
.sheet-head .ph-big{width:100%;height:180px;border-radius:14px;background:#0a1a3a center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:3.5rem;margin-bottom:10px}
.sheet-head .nom{color:#fff;font-size:1.15rem;font-weight:900;text-align:center}
.sheet-body{padding:16px 16px 22px}
.precio-box{background:#fff;border-radius:14px;padding:14px;text-align:center;border:1px solid var(--line);margin-bottom:8px}
.precio-box .lbl{font-size:.62rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px}
.precio-box .val{font-size:1.7rem;font-weight:900;color:var(--az);margin-top:2px}
.cuota-title{font-size:.66rem;font-weight:900;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin:14px 2px 8px}
.cuota-card{border-radius:13px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cuota-card.c2{background:#FEF9C3;border-left:4px solid #EAB308}
.cuota-card.c4{background:#FFF0E0;border-left:4px solid var(--nar)}
.cuota-card.c6{background:#EDE9FE;border-left:4px solid #7C3AED}
.cuota-card .c-n{font-size:.88rem;font-weight:900;color:var(--az)}
.cuota-card .c-v{font-size:1.12rem;font-weight:900;color:var(--az)}
.retira{background:#EEF2FF;border-radius:11px;padding:11px 13px;font-size:.68rem;color:var(--az);font-weight:700;margin-top:6px;display:flex;gap:7px;align-items:flex-start}
.wa-btn{width:100%;margin-top:14px;background:#25D366;color:#fff;border:none;border-radius:13px;padding:14px;font-size:.9rem;font-weight:900;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <span class="bee" id="beeLogo" onclick="toqueAbeja()" style="cursor:pointer">🐝</span>
    <h1>AmarangoElectro</h1>
    <button id="favBtn" onclick="verFavoritos()" style="margin-left:auto;background:rgba(255,255,255,.15);border:none;border-radius:20px;padding:6px 12px;color:#fff;font-size:.8rem;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px">❤️ <span id="favCount">0</span></button>
  </div>
  <div class="searchbar">
    <span>🔍</span>
    <input id="buscador" placeholder="Buscar celular, TV, heladera..." oninput="render()">
  </div>
</div>

<div class="vista on" id="vista-tienda">
<div class="cats" id="cats"></div>
<div class="filtros" id="filtros" style="display:none">
  <select id="orden" onchange="render()">
    <option value="">Ordenar por…</option>
    <option value="barato">💵 Cuota más baja primero</option>
    <option value="caro">💰 Cuota más alta primero</option>
    <option value="oferta">🔥 Ofertas primero</option>
  </select>
  <input id="tope" type="number" inputmode="numeric" placeholder="Cuota hasta $" oninput="render()">
  <button id="btnOfertas" class="f-oferta" onclick="toggleSoloOfertas()">🔥 Ofertas</button>
</div>
<div id="saludo-wrap"></div>
<div id="destacados-wrap"></div>
<div class="section-h" id="section-h">Cargando…</div>
<div id="grid-wrap"></div>
</div><!-- fin vista-tienda -->

<!-- PANEL DEL DUEÑO (oculto — se entra tocando 5 veces la abeja + clave) -->
<div class="overlay" id="adminOverlay" onclick="if(event.target===this)cerrarAdmin()">
  <div class="sheet">
    <div class="sheet-head">
      <button class="x" onclick="cerrarAdmin()">✕</button>
      <div class="nom">🔒 Panel del dueño</div>
    </div>
    <div class="sheet-body" id="adminBody"></div>
  </div>
</div>

<!-- DETALLE -->
<div class="overlay" id="overlay" onclick="if(event.target===this)cerrar()">
  <div class="sheet">
    <div class="sheet-head">
      <button class="x" onclick="cerrar()">✕</button>
      <div class="ph-big" id="d-ph"></div>
      <div class="nom" id="d-nom"></div>
    </div>
    <div class="sheet-body">
      <div class="precio-box"><div class="lbl">💰 Precio contado</div><div class="val" id="d-precio"></div></div>
      <div class="cuota-title">📅 Elegí en cuántas cuotas</div>
      <div id="d-cuotas"></div>
      <div class="retira"><span>⭐</span><span>Retirás pagando solo la 1ra cuota ese mismo día.</span></div>
      <button class="wa-btn" onclick="compartirActual()">💬 Lo quiero · Pedir por WhatsApp</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   👉 PEGÁ ACÁ TU CLAVE DE SUPABASE (la misma que ya está en tu
   calculadora.html, en la línea que dice SB_KEY). Copiá y pegá
   entre las comillas. Sin la key, la tienda no baja productos.
   ═══════════════════════════════════════════════════════════ */
var SB_URL = "https://zctaukyrhsmpjkcddcqq.supabase.co";
var SB_KEY = "";   // se completa sola desde el cuadrito o desde la memoria del teléfono

/* Si ya se pegó antes en este teléfono, la recuerda */
try{ var _kGuardada=localStorage.getItem('ae_sb_key'); if(_kGuardada) SB_KEY=_kGuardada; }catch(e){}

/* ═══════ PUERTA OCULTA DEL DUEÑO ═══════
   Se entra tocando 5 veces la abeja del header + clave (PIN).
   El cliente nunca ve un botón de admin. */
var PIN_DUENO = "2580";   // clave por defecto (editable después desde config)
var _toquesAbeja = 0, _toqueTimer = null;

function toqueAbeja(){
  _toquesAbeja++;
  clearTimeout(_toqueTimer);
  _toqueTimer = setTimeout(function(){ _toquesAbeja = 0; }, 1500);
  if(_toquesAbeja >= 5){
    _toquesAbeja = 0;
    pedirClaveAdmin();
  }
}
function pedirClaveAdmin(){
  var pin = prompt("🔒 Clave del dueño:");
  if(pin === null) return;
  if(pin === PIN_DUENO){ abrirPanelDueno(); }
  else { alert("Clave incorrecta."); }
}
function abrirPanelDueno(){
  document.getElementById('adminBody').innerHTML =
     '<div style="display:grid;gap:10px">'
    +botonPanel('🎨','Armar placas','Sacá precios y armá placas para compartir','placas')
    +botonPanel('➕','Cargar producto','Subí productos nuevos a tu tienda','cargar')
    +botonPanel('👥','Suscriptores','Controlá quién está al día con la membresía','subs')
    +botonPanel('⚙️','Configuración','Tu marca, colores, cuotas y markup','config')
    +botonPanel('📊','Clientes / CRM','Seguimiento de ventas y cobros','crm')
    +'</div>'
    +'<div style="text-align:center;font-size:.66rem;color:var(--sub);margin-top:16px">🐝 Panel privado · solo lo ve el dueño</div>';
  document.getElementById('adminOverlay').classList.add('on');
}
function botonPanel(ico, titulo, sub, destino){
  return '<button onclick="abrirModuloDueno(\''+destino+'\')" style="width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:13px">'
    +'<span style="font-size:1.7rem">'+ico+'</span>'
    +'<span style="flex:1"><span style="display:block;font-size:.92rem;font-weight:900;color:var(--az)">'+titulo+'</span>'
    +'<span style="display:block;font-size:.7rem;color:var(--sub);margin-top:2px">'+sub+'</span></span>'
    +'<span style="color:var(--sub);font-size:1.1rem">›</span></button>';
}
function abrirModuloDueno(destino){
  if(destino==='subs'){ abrirSuscriptores(); return; }
  if(destino==='config'){ abrirConfig(); return; }
  if(destino==='placas'){ abrirPlacas(); return; }
  if(destino==='cargar'){ abrirCargar(); return; }
  // el resto por ahora en construcción — los llenamos de a uno en los próximos bloques
  var nombres={crm:'📊 Clientes / CRM'};
  document.getElementById('adminBody').innerHTML=
     '<div class="construccion" style="padding:50px 20px">'
    +'<div class="ci">🛠️</div>'
    +'<div class="ct">'+(nombres[destino]||destino)+'</div>'
    +'<div class="cs">Esta parte la sumamos en el próximo paso,<br>de a poco y probando cada una. 🐝</div>'
    +'<button onclick="abrirPanelDueno()" style="margin-top:18px;background:var(--az);color:#fff;border:none;border-radius:11px;padding:11px 20px;font-weight:800;cursor:pointer;font-family:inherit">‹ Volver al panel</button>'
    +'</div>';
}
function cerrarAdmin(){ document.getElementById('adminOverlay').classList.remove('on'); }

/* ═══════ SUSCRIPTORES (libreta de control de la membresía) ═══════
   Se guarda en Supabase (tabla 'amarango_subs'). Si la tabla no existe
   todavía, funciona igual en el teléfono (localStorage) y avisa. */
var SUBS = [];
function subsCargar(cb){
  // primero lo del teléfono (rápido)
  try{ SUBS = JSON.parse(localStorage.getItem('ae_subs')||'[]'); }catch(e){ SUBS=[]; }
  if(cb) cb();
  // después la nube (si conecta)
  if(sb){
    sb.from('amarango_subs').select('datos').eq('id','lista').maybeSingle()
      .then(function(r){ if(r&&r.data&&r.data.datos){ SUBS=r.data.datos; try{localStorage.setItem('ae_subs',JSON.stringify(SUBS));}catch(e){} if(cb)cb(); } })
      .catch(function(){});
  }
}
function subsGuardar(){
  try{ localStorage.setItem('ae_subs', JSON.stringify(SUBS)); }catch(e){}
  if(sb){
    sb.from('amarango_subs').upsert({id:'lista', datos:SUBS}).then(function(){}).catch(function(){});
  }
}
function abrirSuscriptores(){ subsCargar(renderSubs); }

function renderSubs(){
  var alDia = SUBS.filter(function(s){return s.estado==='ok';}).length;
  var venc = SUBS.filter(function(s){return s.estado!=='ok';}).length;
  var html = '<div style="display:flex;gap:8px;margin-bottom:14px">'
    +'<div style="flex:1;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:12px;padding:11px;text-align:center"><div style="font-size:1.4rem;font-weight:900;color:#059669">'+alDia+'</div><div style="font-size:.62rem;color:#059669;font-weight:700">AL DÍA ✅</div></div>'
    +'<div style="flex:1;background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:11px;text-align:center"><div style="font-size:1.4rem;font-weight:900;color:#DC2626">'+venc+'</div><div style="font-size:.62rem;color:#DC2626;font-weight:700">VENCIDOS 🔴</div></div>'
    +'</div>';

  html += '<button onclick="editarSub(-1)" style="width:100%;background:var(--nar);color:#fff;border:none;border-radius:12px;padding:13px;font-weight:900;cursor:pointer;font-family:inherit;margin-bottom:14px">➕ Agregar suscriptor</button>';

  if(!SUBS.length){
    html += '<div style="text-align:center;color:var(--sub);padding:24px;font-size:.82rem">Todavía no cargaste suscriptores.<br>Tocá «Agregar» para empezar tu lista. 🐝</div>';
  } else {
    SUBS.forEach(function(s, i){
      var ok = s.estado==='ok';
      html += '<div style="background:#fff;border:1px solid var(--line);border-left:4px solid '+(ok?'#10B981':'#EF4444')+';border-radius:12px;padding:12px;margin-bottom:9px">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><span style="font-weight:900;color:var(--az);flex:1">'+(s.nombre||'(sin nombre)')+'</span>'
        +'<span style="font-size:.62rem;font-weight:800;padding:3px 9px;border-radius:20px;background:'+(ok?'#ECFDF5':'#FEF2F2')+';color:'+(ok?'#059669':'#DC2626')+'">'+(ok?'AL DÍA':'VENCIDO')+'</span></div>'
        +(s.negocio?'<div style="font-size:.72rem;color:var(--sub)">🏪 '+s.negocio+(s.vende?' · '+s.vende:'')+'</div>':'')

/* Sube el logo, lo achica automáticamente (máx 240px) y lo guarda */
function subirLogo(ev){
  var file = ev.target.files && ev.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var max=240, w=img.width, h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>max){ w=Math.round(w*max/h); h=max; }
      var canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      var data=canvas.toDataURL('image/png');
      CONFIG.logo = data;
      // preview al toque
      var pv=document.getElementById('logoPreview');
      if(pv){ pv.style.background='url('+data+') center/cover'; pv.textContent=''; }
      alert('✅ Logo cargado. Tocá «Guardar cambios» para aplicarlo.');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function quitarLogo(){
  CONFIG.logo = '';
  abrirConfig();
}
function guardarConfigDesdeForm(){
  var g=function(id){ var e=document.getElementById(id); return e?e.value.trim():''; };

  abrirPanelDueno();
}

  for(var i=0;i<mk.length;i++){ if(costo<=mk[i].hasta) return Math.round(costo*(1+mk[i].pct/100)/500)*500; }

}

function detectarPrecioPlaca(txt){ var m=(txt||'').replace(/\./g,'').match(/\$?\s*(\d{3,})/); return m?parseInt(m[1],10):0; }
function detectarNombrePlaca(txt){
  var ls=(txt||'').split('\n').map(function(l){return l.replace(/[*_#🔥☕️💰💵🏷️]/g,'').trim();}).filter(Boolean);
  for(var i=0;i<ls.length;i++){ var l=ls[i]; if(/[a-záéíóúñ]/i.test(l) && !/^\W*\$?\s*\d/.test(l) && l.length>3 && l.length<55) return l; }
  return 'Producto';

function armarPlaca(){
  var lbls={costo:'🎨 Pegá el producto (con el COSTO)', venta:'🎨 Pegá el producto (con la VENTA)', usd:'🎨 Pegá el producto (con el precio en USD)'};

  var ventaFull=venta;

  var nombre=detectarNombrePlaca(txt);
  var cuotasHtml='', waLines=[];

    cuotasHtml+='<div style="background:rgba(255,255,255,.09);border-left:3px solid var(--nar);border-radius:10px;padding:10px 13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><span style="font-size:.8rem;font-weight:800;color:#fff">'+n+' cuotas fijas</span><span style="font-size:1.05rem;font-weight:900;color:#ffb968">'+fmt(vc)+'</span></div>';

  });
  var ventaHtml = _placaDesc>0
    ? '<span style="text-decoration:line-through;color:rgba(255,255,255,.45);font-size:1.1rem">'+fmt(ventaFull)+'</span> '+fmt(venta)+'<div style="font-size:.62rem;color:#ffb968;font-weight:700;margin-top:2px">🏷️ '+_placaDesc+'% OFF · CONTADO</div>'

function subirFotoProd(ev){

      if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>max){w=Math.round(w*max/h);h=max;}
      var cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);

var _masivoParsed=[];
function abrirPegadoMasivo(){
  document.getElementById('adminBody').innerHTML=
     '<div style="font-weight:900;color:var(--az);font-size:1rem;margin-bottom:8px">📋 Pegar lista completa</div>'

    +'<div style="background:#F5F8FF;border:1.5px solid #DDE7FA;border-radius:10px;padding:10px;margin-bottom:10px;display:flex;align-items:center;gap:8px">'
      +'<span style="font-size:.7rem;font-weight:800;color:var(--sub)">💵 Dólar hoy:</span>'
      +'<input type="number" id="masivoDolar" value="'+(CONFIG.dolar||1500)+'" oninput="parsearMasivo()" style="flex:1;border:1.5px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-weight:800;color:var(--az);outline:none;text-align:center">'
    +'</div>'
    +'<textarea id="masivoTxt" oninput="parsearMasivo()" placeholder="Pegá acá la lista de productos..." style="width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-family:inherit;font-size:.82rem;min-height:120px;outline:none;resize:vertical"></textarea>'
    +'<div id="masivoPreview" style="margin-top:12px"></div>'
    +'<button onclick="abrirCargar()" style="width:100%;background:none;border:1.5px solid var(--line);color:var(--az);border-radius:11px;padding:11px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:10px">‹ Volver</button>';
}
/* Parser: cada línea que tenga un precio es un producto */
function parsearMasivo(){
  var txt=document.getElementById('masivoTxt').value||'';
  var cot=parseFloat(document.getElementById('masivoDolar').value)||1500;
  var lineas=txt.split('\n');
  _masivoParsed=[];
  lineas.forEach(function(raw){
    var linea=raw.replace(/[*_#]/g,'').trim();
    if(!linea) return;
    var precio=0, esUsd=false;
    // formato 1: "110usd" o "110 usd" → dólares
    var mUsd=linea.match(/(\d{2,4})\s*usd/i);
    // formato 2: "-$185" o "$185" con 2-4 cifras → estos mayoristas lo usan para USD también
    var mGuionPeso=linea.match(/[-–]\s*\$?\s*(\d{2,4})(?!\d)/);
    // formato 3: precio en pesos grande (5+ cifras)
    var mPeso=linea.match(/\$?\s*(\d{5,})/);
    if(mUsd){ precio=parseInt(mUsd[1],10); esUsd=true; }
    else if(mPeso){ precio=parseInt(mPeso[1].replace(/\./g,''),10); esUsd=false; }
    else if(mGuionPeso){ precio=parseInt(mGuionPeso[1],10); esUsd=true; } // formato -$185 = USD en estas listas
    if(!precio) return; // línea sin precio = título, la salteo
    // nombre = la línea sin el precio ni palabras sueltas
    var nombre=linea.replace(/[-–]?\s*\$?\s*\d[\d\.]*\s*usd/i,'').replace(/[-–]\s*\$?\s*\d{2,4}(?!\d)/,'').replace(/\$?\s*\d{5,}/,'')
      .replace(/oferta\s*!*/i,'').replace(/nacional/i,'').replace(/racing edition/i,'').replace(/🇦🇷|📱|〽️|🔱|❗|!/g,'').trim();
    nombre=nombre.replace(/\s{2,}/g,' ').replace(/[-–]\s*$/,'').trim();
    if(nombre.length<3) return;
    var costo = esUsd ? Math.round(precio*cot) : precio;
    var venta = markupDeCosto(costo);
    var esOferta = /oferta/i.test(linea);
    _masivoParsed.push({ nombre:nombre, costo:costo, venta:venta, esUsd:esUsd, usd: esUsd?precio:null, oferta:esOferta, sospechoso:false });
  });
  // marcar precios sospechosos (muy fuera del rango del resto)
  if(_masivoParsed.length>3){
    var ventas=_masivoParsed.map(function(p){return p.venta;}).sort(function(a,b){return a-b;});
    var mediana=ventas[Math.floor(ventas.length/2)];
    _masivoParsed.forEach(function(p){ if(p.venta > mediana*5) p.sospechoso=true; });
  }
  renderMasivoPreview();
}
function renderMasivoPreview(){
  var cont=document.getElementById('masivoPreview');
  if(!_masivoParsed.length){ cont.innerHTML='<div style="text-align:center;color:var(--sub);padding:16px;font-size:.8rem">Pegá una lista y te muestro los productos detectados.</div>'; return; }
  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-weight:900;color:var(--az);font-size:.9rem">✅ '+_masivoParsed.length+' productos detectados</span></div>';
  _masivoParsed.forEach(function(p,i){
    html+='<div style="background:#fff;border:1px solid '+(p.sospechoso?'#EF4444':'var(--line)')+';border-radius:10px;padding:9px 11px;margin-bottom:6px;display:flex;align-items:center;gap:8px">'
      +'<div style="flex:1;min-width:0"><div style="font-size:.76rem;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.nombre+(p.oferta?' 🔥':'')+'</div>'
      +'<div style="font-size:.64rem;color:var(--sub)">'+(p.esUsd?'U$'+p.usd+' → ':'')+'Vende: <b style="color:var(--az)">'+fmt(p.venta)+'</b> · 6c '+fmt(valorCuota(p.venta,6))+'</div>'
      +(p.sospechoso?'<div style="font-size:.6rem;color:#EF4444;font-weight:700">⚠️ Precio raro, revisá</div>':'')+'</div>'
      +'<button onclick="quitarMasivo('+i+')" style="background:none;border:none;color:#EF4444;font-size:1rem;cursor:pointer;padding:4px">✕</button></div>';
  });
  html+='<button onclick="guardarMasivo()" style="width:100%;background:var(--nar);color:#fff;border:none;border-radius:12px;padding:14px;font-weight:900;cursor:pointer;font-family:inherit;margin-top:8px">💾 Cargar los '+_masivoParsed.length+' productos</button>';
  cont.innerHTML=html;
}
function quitarMasivo(i){ _masivoParsed.splice(i,1); renderMasivoPreview(); }
function guardarMasivo(){
  if(!_masivoParsed.length){ alert('No hay productos para cargar.'); return; }
  if(!confirm('¿Cargar '+_masivoParsed.length+' productos a tu tienda?')) return;
  _masivoParsed.forEach(function(p){
    var prod={ id:'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6), nombre:p.nombre, venta:p.venta, foto:'', categoria:'', visible:true };
    if(p.oferta) prod.precioAntes=Math.round(p.venta*1.15/500)*500; // precio "antes" estimado para mostrar el tachado
    PRODUCTOS.push(prod);
  });
  guardarCatalogo();
  alert('✅ '+_masivoParsed.length+' productos cargados. Ya están en tu tienda.');
  _masivoParsed=[];
  render();
  abrirPanelDueno();
}

/* ===== Cuotas reales de Max: 15/55/78, redondeo $1.000 ===== */
var PLANES = { 2:{on:true,pct:15}, 4:{on:true,pct:55}, 6:{on:true,pct:78} };
function valorCuota(venta,n){ return Math.round(venta*(1+PLANES[n].pct/100)/n/1000)*1000; }
function fmt(n){ return '$'+Math.round(n).toLocaleString('es-AR'); }
function cuotasActivas(){ return [2,4,6].filter(function(n){return PLANES[n].on;}); }
function mejorCuota(venta){ var a=cuotasActivas(); if(!a.length)return null; var n=a[a.length-1]; return {n:n, valor:valorCuota(venta,n)}; }

];
function categoriaDe(nombre){
  var n=(nombre||'').toLowerCase();
  if(/samsung|motorola|xiaomi|iphone|celular|smartphone/.test(n))return '📱 Celulares';
  if(/heladera|freezer|frio/.test(n))return '❄️ Heladeras';
  if(/cocina|anafe|horno|microonda/.test(n))return '🍳 Cocina';
  if(/tv|televis|smart tv|tcl|led/.test(n))return '📺 TV';
  if(/ventilador|turbo|aire|calefact|estufa|caloventor/.test(n))return '🌀 Climatización';
  if(/lavarrop|secarrop|lavavaj/.test(n))return '🧺 Lavado';
  if(/termo|pava|cafeter|licuad|batidor|freidora|yogurt|tostad|sandwich/.test(n))return '☕ Electro hogar';
  return '📦 Otros';
}
function catProd(p){ return p.categoria || categoriaDe(p.nombre); }
function marcaDe(nombre){
  var n=(nombre||'').toLowerCase();
  if(/samsung|galaxy/.test(n))return 'Samsung';
  if(/motorola|moto|edge/.test(n))return 'Motorola';
  if(/xiaomi|redmi|poco/.test(n))return 'Xiaomi';
  if(/iphone|apple/.test(n))return 'Apple';
  return '';
}
/* búsqueda tolerante a acentos */
function normTxt(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,''); }

  try{ var local=JSON.parse(localStorage.getItem('ae_tienda_catalogo')||'[]'); if(local.length){ PRODUCTOS=local; render(); } }catch(e){}
  // 2) baja lo último de la nube
  sb.from('tienda_catalogo').select('datos').eq('id','catalogo').maybeSingle()
    .then(function(r){
      if(r && r.data && r.data.datos){
        PRODUCTOS = r.data.datos.filter(function(p){ return p.visible!==false; });
        try{ localStorage.setItem('ae_tienda_catalogo', JSON.stringify(r.data.datos)); }catch(e){}
        actualizarFavCount();
        render();
      } else if(!PRODUCTOS.length){
        mostrarError('La nube respondió pero no hay productos cargados todavía.');
      }
    })
    .catch(function(){ if(!PRODUCTOS.length) mostrarError('No pude bajar el catálogo. Revisá la key o tu conexión.'); });
}

/* ===== Render ===== */
function render(){
  // categorías (solo las que tienen productos, + Todos)
  var catsConProd = {};
  PRODUCTOS.forEach(function(p){ catsConProd[catProd(p)]=true; });
  document.getElementById('cats').innerHTML = CATS.filter(function(c){ return c.k==='' || catsConProd[c.k]; }).map(function(c){
    return '<div class="cat'+(catActiva===c.k?' on':'')+'" onclick="setCat(\''+c.k.replace(/'/g,"\\'")+'\')">'
      +'<div class="ico">'+c.ico+'</div><span>'+c.txt+'</span></div>';
  }).join('');

  var q=normTxt(document.getElementById('buscador').value);
  var soloOfertas = window._soloOfertas || false;
  var tope = parseFloat(document.getElementById('tope') ? document.getElementById('tope').value : '') || 0;
  var orden = document.getElementById('orden') ? document.getElementById('orden').value : '';

  function enOferta(p){ return p.precioAntes && parseFloat(p.precioAntes)>parseFloat(p.venta); }
  function cuotaRef(p){ var mc=mejorCuota(p.venta); return mc?mc.valor:p.venta; }

  var lista=PRODUCTOS.filter(function(p){
    var okCat=!catActiva || catProd(p)===catActiva;
    var okQ=!q || normTxt(p.nombre).indexOf(q)>=0;
    var okOferta=!soloOfertas || enOferta(p);
    var okTope=!tope || cuotaRef(p)<=tope;
    var okFav=!viendoFavs || esFav(p);
    return okCat && okQ && okOferta && okTope && okFav;
  });

  // ordenar
  if(orden==='barato') lista.sort(function(a,b){ return cuotaRef(a)-cuotaRef(b); });
  else if(orden==='caro') lista.sort(function(a,b){ return cuotaRef(b)-cuotaRef(a); });
  else if(orden==='oferta') lista.sort(function(a,b){ return (enOferta(b)?1:0)-(enOferta(a)?1:0); });

  // mostrar barra de filtros una vez que hay productos
  document.getElementById('filtros').style.display = PRODUCTOS.length ? 'flex' : 'none';

  // Producto del día + Destacados: solo en la portada (sin buscar, sin filtrar, sin favoritos)
  var portada = !q && !catActiva && !soloOfertas && !tope && !orden && !viendoFavs;
  renderSaludo(portada);
  renderDestacados(portada);

  document.getElementById('section-h').textContent = viendoFavs ? '❤️ Mis favoritos ('+lista.length+')' : (q ? 'Resultados' : (catActiva||'Catálogo completo')+' ('+lista.length+')');

  var wrap=document.getElementById('grid-wrap');
  if(!lista.length){
    if(viendoFavs){
      wrap.innerHTML='<div class="estado"><div class="e-i">❤️</div>Todavía no marcaste favoritos.<br>Tocá el corazón en los productos que te gusten y los guardás acá.</div>';
    } else {
      wrap.innerHTML='<div class="estado"><div class="e-i">🐝</div>'+(q?'No encontramos eso. Probá otra palabra.':'No hay productos en esta categoría.')+'</div>';
    }
    return;
  }
  wrap.innerHTML='<div class="grid">'+lista.map(function(p){
    var idx=PRODUCTOS.indexOf(p);
    var mc=mejorCuota(p.venta);
    var marca=marcaDe(p.nombre);
    var phStyle = p.foto ? 'style="background-image:url(\''+p.foto+'\')"' : '';
    var phIco = p.foto ? '' : catProd(p).split(' ')[0];
    var enOferta = p.precioAntes && parseFloat(p.precioAntes)>parseFloat(p.venta);
    var pctOff = enOferta ? Math.round((1-p.venta/parseFloat(p.precioAntes))*100) : 0;
    return '<div class="card">'
      +'<div class="ph" '+phStyle+' onclick="verDetalle('+idx+')">'+phIco
        +(enOferta ? '<span class="badge">🔥 '+pctOff+'% OFF</span>' : '')
        +'<button class="fav" onclick="toggleFav('+idx+',event)">'+(esFav(p)?'❤️':'🤍')+'</button>'
      +'</div>'
      +'<div class="body">'
        +(marca?'<div class="marca">'+marca+'</div>':'<div class="marca">&nbsp;</div>')
        +'<div class="nom" onclick="verDetalle('+idx+')">'+p.nombre+'</div>'
        +(mc?'<div class="cuota-v">'+fmt(mc.valor)+'</div><div class="cuota-n">en '+mc.n+' cuotas fijas</div>':'')
        +'<div class="contado">'+(enOferta?'<span style="text-decoration:line-through;color:#bbb">'+fmt(p.precioAntes)+'</span> ':'')+'Contado: '+fmt(p.venta)+'</div>'
        +'<button class="share" onclick="compartir('+idx+')">📤 Compartir</button>'
      +'</div></div>';
  }).join('')+'</div>';
}
function setCat(k){ catActiva=(catActiva===k?'':k); render(); }

function toggleSoloOfertas(){
  window._soloOfertas = !window._soloOfertas;
  var b=document.getElementById('btnOfertas');
  if(b) b.classList.toggle('on', window._soloOfertas);
  render();
}

/* ===== FAVORITOS (guardados en el teléfono del cliente) ===== */
function idProd(p){ return p.id!=null ? String(p.id) : (p.nombre||''); }
function cargarFavs(){ try{ return JSON.parse(localStorage.getItem('ae_favoritos')||'[]'); }catch(e){ return []; } }
function guardarFavs(a){ try{ localStorage.setItem('ae_favoritos', JSON.stringify(a)); }catch(e){} }
function esFav(p){ return cargarFavs().indexOf(idProd(p))>=0; }
function toggleFav(idx, ev){
  if(ev){ ev.stopPropagation(); }
  var p=PRODUCTOS[idx]; if(!p)return;
  var favs=cargarFavs(); var id=idProd(p); var i=favs.indexOf(id);
  if(i>=0) favs.splice(i,1); else favs.push(id);
  guardarFavs(favs);
  actualizarFavCount();
  render();
}
function actualizarFavCount(){
  var c=document.getElementById('favCount'); if(c) c.textContent=cargarFavs().length;
}
var viendoFavs=false;
function verFavoritos(){
  viendoFavs=!viendoFavs;
  var b=document.getElementById('favBtn');
  if(b) b.style.background = viendoFavs ? 'var(--nar)' : 'rgba(255,255,255,.15)';
  render();
}

/* Saludo según la hora del día */
function renderSaludo(mostrar){
  var wrap=document.getElementById('saludo-wrap');
  if(!mostrar){ wrap.innerHTML=''; return; }
  var h=new Date().getHours();
  var emo, hola, sub;
  if(h>=6 && h<13){ emo='🌅'; hola='¡Buenos días!'; sub='Arrancá el día equipando tu casa en cuotas fijas'; }
  else if(h>=13 && h<20){ emo='☀️'; hola='¡Buenas tardes!'; sub='Mirá lo nuevo y calculá tus cuotas al toque'; }
  else { emo='🌙'; hola='¡Buenas noches!'; sub='Tranqui, elegí lo tuyo y te lo llevás en cuotas'; }
  wrap.innerHTML='<div class="saludo"><span class="emo">'+emo+'</span>'
    +'<div class="txt"><div class="hola">'+hola+'</div><div class="sub">'+sub+'</div></div></div>';
}

/* Producto del día (marcado con delDia) + Destacados (marcado con destacado) */
function renderDestacados(mostrar){
  var wrap=document.getElementById('destacados-wrap');
  if(!mostrar){ wrap.innerHTML=''; return; }
  var html='';

  // Producto del día
  var pdd=PRODUCTOS.find(function(p){ return p.delDia; });
  if(pdd){
    var idx=PRODUCTOS.indexOf(pdd);
    var mc=mejorCuota(pdd.venta);
    var foto = pdd.foto ? 'style="background-image:url(\''+pdd.foto+'\')"' : '';
    var ico = pdd.foto ? '' : catProd(pdd).split(' ')[0];
    html+='<div class="pdd" onclick="verDetalle('+idx+')">'
      +'<span class="tag">🌟 PRODUCTO DEL DÍA</span>'
      +'<div class="foto" '+foto+'>'+ico+'</div>'
      +'<div class="info"><div class="n">'+pdd.nombre+'</div>'
      +(mc?'<div class="cv">'+fmt(mc.valor)+'</div><div class="cn">en '+mc.n+' cuotas fijas</div>':'')
      +'<div class="ct">Contado: '+fmt(pdd.venta)+'</div></div></div>';
  }

  // Destacados (excluyo el del día para no repetir)
  var dest=PRODUCTOS.filter(function(p){ return p.destacado && !p.delDia; });
  if(dest.length){
    html+='<div class="section-h" style="padding-top:12px">⭐ Destacados de la semana</div>';
    html+='<div class="dest-row">'+dest.map(function(p){
      var idx=PRODUCTOS.indexOf(p);
      var mc=mejorCuota(p.venta);
      var foto = p.foto ? 'style="background-image:url(\''+p.foto+'\')"' : '';
      var ico = p.foto ? '' : catProd(p).split(' ')[0];
      return '<div class="dest-card" onclick="verDetalle('+idx+')">'
        +'<div class="dfoto" '+foto+'><span class="dstar">⭐</span>'+ico+'</div>'
        +'<div class="dbody"><div class="dn">'+p.nombre+'</div>'
        +(mc?'<div class="dcv">'+fmt(mc.valor)+'</div><div class="dcn">'+mc.n+' cuotas fijas</div>':'')
        +'</div></div>';
    }).join('')+'</div>';
  }

  wrap.innerHTML=html;
}

/* ===== Detalle ===== */
var actualIdx=null;
function verDetalle(idx){
  var p=PRODUCTOS[idx]; if(!p)return; actualIdx=idx;
  var ph=document.getElementById('d-ph');
  if(p.foto){ ph.style.backgroundImage='url('+p.foto+')'; ph.textContent=''; }
  else { ph.style.backgroundImage='none'; ph.textContent=catProd(p).split(' ')[0]; }
  document.getElementById('d-nom').textContent=p.nombre;
  document.getElementById('d-precio').textContent=fmt(p.venta);
  document.getElementById('d-cuotas').innerHTML=cuotasActivas().map(function(n){
    return '<div class="cuota-card c'+n+'"><span class="c-n">'+n+' cuotas fijas</span><span class="c-v">'+fmt(valorCuota(p.venta,n))+'</span></div>';
  }).join('');
  document.getElementById('overlay').classList.add('on');
}
function cerrar(){ document.getElementById('overlay').classList.remove('on'); }

/* ===== Compartir con foto (misma lógica que tu tienda) ===== */
function armarMensaje(p){
  var lines=cuotasActivas().map(function(n){ return '💳 '+n+' cuotas fijas de '+fmt(valorCuota(p.venta,n)); });
  return '*'+(p.nombre||'PRODUCTO').toUpperCase()+'*\n\n'+lines.join('\n')+'\n\n➡️ Contado: '+fmt(p.venta)+'\n@AmarangoElectro 🐝';
}
function compartir(idx){
  var p=PRODUCTOS[idx]; if(!p)return;
  var msg=armarMensaje(p);
  if(p.foto && navigator.share){
    fetch(p.foto).then(function(r){return r.blob();}).then(function(blob){
      var file=new File([blob],'producto.jpg',{type:blob.type||'image/jpeg'});
      if(navigator.canShare && navigator.canShare({files:[file]})){ return navigator.share({files:[file], text:msg}); }
      return navigator.share({text:msg});
    }).catch(function(){ soloTexto(msg); });
    return;
  }
  if(navigator.share){ navigator.share({title:p.nombre, text:msg}).catch(function(){soloTexto(msg);}); }
  else soloTexto(msg);
}
function compartirActual(){ if(actualIdx!=null) compartir(actualIdx); }
function soloTexto(msg){ window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'); }

/* ===== Estados vacíos ===== */
function mostrarSetup(){
  document.getElementById('cats').innerHTML='';
  document.getElementById('section-h').textContent='';
  document.getElementById('grid-wrap').innerHTML='<div class="setup">'
    +'<div style="font-size:1rem;font-weight:900;margin-bottom:4px">🔑 Un solo paso para conectar tu tienda</div>'
    +'<div style="margin:10px 0">Pegá acá abajo tu clave de Supabase (la copiás de tu <b>calculadora.html</b>, línea que dice <code>SB_KEY</code>). Queda guardada en este teléfono, no la tenés que poner nunca más.</div>'
    +'<input id="keyInput" placeholder="Pegá tu key acá (empieza con eyJ...)" style="width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-family:inherit;font-size:.82rem;outline:none;margin-bottom:10px">'
    +'<button onclick="guardarKey()" style="width:100%;background:var(--nar);color:#fff;border:none;border-radius:11px;padding:13px;font-size:.9rem;font-weight:900;cursor:pointer;font-family:inherit">✅ Conectar tienda</button>'
    +'<div style="font-size:.66rem;color:var(--sub);margin-top:10px;text-align:center">La key es la misma que ya usás en tu calculadora 🐝</div>'
    +'</div>';
}
function guardarKey(){
  var v=(document.getElementById('keyInput').value||'').trim();
  if(!v){ alert('Pegá la key primero.'); return; }
  if(v.indexOf('eyJ')!==0){ if(!confirm('Esa key no parece del formato habitual (suele empezar con "eyJ"). ¿La pego igual?')) return; }
  try{ localStorage.setItem('ae_sb_key', v); }catch(e){}
  SB_KEY=v;
  document.getElementById('grid-wrap').innerHTML='<div class="estado"><div class="e-i">🐝</div>Conectando y bajando tus productos…</div>';
  conectar();
}
function mostrarError(txt){
  document.getElementById('grid-wrap').innerHTML='<div class="estado"><div class="e-i">😕</div>'+txt+'</div>';
}

/* arranque */
conectar();
</script>
